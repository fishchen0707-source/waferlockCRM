<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAFERLOCK 客服語音通話</title>
  <style>
    :root { --purple:#48086B; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; background:linear-gradient(160deg,#1c0330,#48086B); color:#fff; }
    .card { width:92%; max-width:380px; text-align:center; padding:30px 22px; }
    .wl-wm { display:inline-block; height:20px; width:160px; max-width:74%; background:#fff; -webkit-mask:url(/img/waferlock.svg) no-repeat center/contain; mask:url(/img/waferlock.svg) no-repeat center/contain; }
    h1 { font-size:16px; margin:12px 0 2px; }
    .who { color:#d9c7ea; font-size:13px; margin-bottom:22px; }
    .orb { width:120px; height:120px; border-radius:50%; margin:0 auto 20px; background:radial-gradient(circle at 50% 40%,#b06bd8,#6a1597); box-shadow:0 0 0 0 rgba(176,107,216,.6); }
    .orb.ring { animation:pulse 1s infinite; }
    .orb.live { animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(176,107,216,.5);} 70%{box-shadow:0 0 0 24px rgba(176,107,216,0);} 100%{box-shadow:0 0 0 0 rgba(176,107,216,0);} }
    .state { font-size:16px; min-height:24px; margin-bottom:18px; }
    button { font-family:inherit; cursor:pointer; border:none; border-radius:26px; padding:12px 24px; font-size:15px; font-weight:700; margin:4px; }
    .stop { background:#e5484d; color:#fff; }
    .mute { background:rgba(255,255,255,.16); color:#fff; }
    .start { background:#fff; color:var(--purple); }
    .hint { color:#c9b3df; font-size:11px; margin-top:16px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="card">
    <span class="wl-wm" role="img" aria-label="WAFERLOCK"></span>
    <h1>真人語音通話</h1>
    <div class="who" id="who">與顧客通話中</div>
    <div class="orb" id="orb"></div>
    <div class="state" id="state">準備撥號…</div>
    <div id="controls"></div>
    <div class="hint">顧客需點開您發送的接聽連結並允許麥克風，才會接通。建議戴耳機避免回音。</div>
    <div class="hint">📝 通話中請確認顧客的<b>姓名與聯絡電話</b>；如需後續跟進，記得回收件匣的「顧客資料」補登並開立工單。</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/rtc-client.js"></script>
  <script>
  (function () {
    // 信令與 TURN 憑證都掛在既有 Supabase（anon key 前端公開，與專案其餘頁面一致）
    var SUPABASE_URL = 'https://nkyanyjgfrmovjoqevro.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5reWFueWpnZnJtb3Zqb3FldnJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODIxMTMsImV4cCI6MjA5NzI1ODExM30.LPnQyceYS7Z1-rlqUtXm3B8dGBOqnmnavTV-PAOSPZ8';
    var FN = SUPABASE_URL + '/functions/v1/';
    var qs = new URLSearchParams(location.search);
    var room = qs.get('room') || '', name = qs.get('name') || '', conv = qs.get('conv') || '';
    var stateEl = document.getElementById('state'), orb = document.getElementById('orb'), controls = document.getElementById('controls');
    if (name) document.getElementById('who').textContent = name + ' ・ 與顧客通話';
    var call = null, muted = false;
    function setState(s) { stateEl.textContent = s; }
    if (!room) { setState('⚠️ 通話房間無效'); return; }

    function inCallUI() {
      controls.innerHTML = '<button class="mute" id="mute">🔇 靜音</button><button class="stop" id="stop">⏹ 掛斷</button>';
      document.getElementById('mute').onclick = function () { muted = !muted; call.setMute(muted); this.textContent = muted ? '🔊 取消靜音' : '🔇 靜音'; };
      document.getElementById('stop').onclick = function () { if (call) call.hangup(); finish(); };
    }
    function finish(reason) { orb.className = 'orb'; setState((reason === 'failed' || reason === 'ice-failed') ? '⚠️ 跨網路無法直連（需 TURN 中繼）' : '通話已結束'); controls.innerHTML = '<button class="start" onclick="window.close()">關閉視窗</button>'; }
    function onStatus(s, d) {
      if (s === 'mic') setState('請允許麥克風權限…');
      else if (s === 'connecting' || s === 'signaling') setState('連線中…');
      else if (s === 'ringing') { setState('📞 撥號中，等待顧客接聽…'); orb.className = 'orb ring'; }
      else if (s === 'connected') { setState('🔴 通話中・錄音中'); orb.className = 'orb live'; }
      else if (s === 'ended') { finish(d); }
      else if (s === 'error') { setState('⚠️ ' + (d || '發生問題')); }
    }
    // 把錄音(webm) 解碼→降成 16kHz 單聲道 WAV，供 Gemini 彙整（webm 留存回放小；WAV 只給 AI、不留存）
    async function blobToWav16kMono(blob) {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        var buf = await ac.decodeAudioData(await blob.arrayBuffer());
        var target = 16000, ch0 = buf.getChannelData(0), ratio = buf.sampleRate / target, outLen = Math.floor(ch0.length / ratio);
        var pcm = new Int16Array(outLen);
        for (var i = 0; i < outLen; i++) { var s = Math.max(-1, Math.min(1, ch0[Math.floor(i * ratio)])); pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF; }
        try { ac.close(); } catch (e) {}
        var bytes = new ArrayBuffer(44 + pcm.length * 2), v = new DataView(bytes);
        function wr(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
        wr(0, 'RIFF'); v.setUint32(4, 36 + pcm.length * 2, true); wr(8, 'WAVE'); wr(12, 'fmt ');
        v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
        v.setUint32(24, target, true); v.setUint32(28, target * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
        wr(36, 'data'); v.setUint32(40, pcm.length * 2, true);
        var off = 44; for (var i = 0; i < pcm.length; i++) { v.setInt16(off, pcm[i], true); off += 2; }
        return new Blob([v], { type: 'audio/wav' });
      } catch (e) { return null; }
    }
    async function onRec(blob, durationSec) {
      try {
        var wav = await blobToWav16kMono(blob);
        var fd = new FormData();
        fd.append('audio', blob, 'call.webm');
        if (wav) fd.append('wav', wav, 'call.wav');
        fd.append('conv', conv); fd.append('name', name); fd.append('durationSec', String(durationSec || 0));
        await fetch(FN + 'rtc-recording', { method: 'POST', headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }, body: fd }); // 階段3 才部署此 Edge Function
      } catch (e) {}
    }
    function dial() {
      inCallUI(); setState('連線中…');
      fetch(FN + 'rtc-config', { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }).then(function (r) { return r.json(); }).catch(function () { return {}; }).then(function (cfg) {
        call = WLCall({ room: room, role: 'agent', iceServers: cfg.iceServers, onStatus: onStatus, record: true, onRecording: onRec, supabaseUrl: SUPABASE_URL, supabaseKey: SUPABASE_KEY });
        call.start();
      });
    }
    dial(); // 開啟即自動撥號
  })();
  </script>
</body>
</html>
