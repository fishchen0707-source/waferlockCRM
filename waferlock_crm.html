                    <button style={{padding:'5px 11px',background:'#FEF3C7',color:'#92400E',border:'none',borderRadius:5,fontSize:11,fontWeight:700,cursor:'pointer'}} onClick={()=>openComplaint(cur)}>📞 新增立案</button>
                    <button style={{padding:'5px 11px',background:'#D1FAE5',color:'#065F46',border:'none',borderRadius:5,fontSize:11,fontWeight:700,cursor:'pointer'}} onClick={()=>openCase(cur)}>🔧 新增派工</button>
                  </div>
                </div>
                <div className="igrid">
                  <div className="iitem"><label>聯絡電話</label><span>{cur.phone}</span></div>
                  <div className="iitem"><label>電子信箱</label><span style={{fontSize:11.5}}>{cur.email||'—'}</span></div>
                  <div className="iitem" style={{gridColumn:'1/-1'}}><label>地址</label><span>{cur.address||'待填寫'}</span></div>
                  <div className="iitem" style={{gridColumn:'1/-1'}}>
                    <label>歸屬集團 / 建案</label>
                    {cur.projectId
                      ? <span>🏢 {(db.groups||[]).find(g=>g.id===cur.groupId)?.name||'—'} › {(db.projects||[]).find(p=>p.id===cur.projectId)?.name||cur.projectId}</span>
                      : <span style={{color:'var(--g400)'}}>尚未歸屬（散客）</span>}
                  </div>
                  <div className="iitem">
                    <label>購買通路</label>
                    {ch ? <span className={`ch-badge ${ch.type}`}>{ch.icon} {ch.label}</span> : <span>—</span>}
                  </div>
                  <div className="iitem">
                    <label>登錄方式</label>
                    <span>{cur.regType==='auto'?'🤖 師傅自動登錄':'📱 客戶DIY掃碼'}</span>
                    <div style={{fontSize:10,color:'var(--g400)',marginTop:1}}>{cur.regDate}</div>
                  </div>
                  <div className="iitem"><label>安裝產品</label><span>{PRODUCTS[cur.productId]?.name||cur.productId||'—'}</span></div>
                  <div className="iitem"><label>產品序號</label><span style={{fontSize:10.5,fontFamily:'JetBrains Mono'}}>{cur.serialNo||'—'}</span></div>
                  <div className="iitem" style={{gridColumn:'1/-1'}}>
                    <label>保固狀態（剩餘 {p}%）</label>
                    <div className="wbar"><div className={`wfill ${p>50?'ok':p>20?'warn':'bad'}`} style={{width:`${p}%`}}/></div>
                    <span style={{fontSize:11.5,color:p>0?'var(--ok)':'var(--err)',display:'block',marginTop:3}}>
                      {p>0?`✅ 保固至 ${cur.warrantyEnd}`:`❌ 保固已到期（${cur.warrantyEnd||'—'}）`}
                    </span>
                  </div>
                </div>
              </div>
              {/* ── 立案紀錄 ── */}
              {(()=>{
                const complaints=(cur.complaintIds||[]).map(id=>(db.complaints||{})[id]).filter(Boolean).reverse();
                return(
                  <div className="ct-sec">
                    <div className="ct-sec-title">
                      <span>📞 客訴立案紀錄</span>
                      <span style={{marginLeft:'auto',fontSize:10.5,background:'var(--g100)',padding:'1px 7px',borderRadius:8,color:'var(--g500)'}}>{complaints.length} 筆</span>
                    </div>
                    {complaints.length===0
                      ?<div style={{textAlign:'center',color:'var(--g400)',fontSize:11.5,padding:'10px 0'}}>尚無立案紀錄</div>
                      :complaints.map(ct=>(
                        <div key={ct.id} className={`ctcard ${ct.status}`}>
                          <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:700,fontSize:12}}>{ct.cat1}{ct.cat2?` › ${ct.cat2}`:''}{ct.cat3?` › ${ct.cat3}`:''}</div>
                              <div style={{fontSize:10,color:'var(--g400)',marginTop:1}}>{ct.id} · {ct.callChannel} · {ct.date}</div>
                              {ct.process&&<div style={{marginTop:5,fontSize:11.5,color:'var(--g700)',lineHeight:1.5,background:'var(--g50)',borderRadius:4,padding:'4px 7px'}}>{ct.process}</div>}
                            </div>
                            <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
                              <span className={`ct-sb ${ct.status}`}>{COMPLAINT_STATUS_LABEL[ct.status]}</span>
                              {ct.status!=='closed'&&<button onClick={()=>closeComplaint(ct.id)}
                                style={{padding:'3px 9px',background:'var(--ok)',color:'#fff',border:'none',borderRadius:4,fontSize:10,fontWeight:700,cursor:'pointer'}}>結案</button>}
                            </div>
                          </div>
                          {/* 追蹤歷程 */}
                          {(ct.timeline||[]).length>0&&(
                            <div className="ct-timeline">
                              {ct.timeline.map((tl,i)=>(
                                <div key={i} className="ct-tl-item">
                                  <div className={`ct-tl-dot ${i===ct.timeline.length-1?'ok':''}`}/>
                                  <div className="ct-tl-time">{tl.ts}</div>
                                  <div style={{flex:1,color:'var(--g700)'}}>{tl.note}</div>
                                </div>
                              ))}
                            </div>
                          )}
                          {/* 新增追蹤備註 */}
                          {ct.status!=='closed'&&(
                            followingCtId===ct.id
                              ?<div style={{marginTop:8,display:'flex',gap:6}}>
                                  <textarea className="ct-follow-input" value={followText} onChange={e=>setFollowText(e.target.value)} placeholder="輸入追蹤備註..."/>
                                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                    <button className="ct-follow-btn" onClick={()=>addFollowup(ct.id,followText)}>儲存</button>
                                    <button onClick={()=>{setFollowingCtId(null);setFollowText('');}} style={{padding:'5px 8px',background:'var(--g100)',color:'var(--g600)',border:'none',borderRadius:4,fontSize:11,cursor:'pointer'}}>取消</button>
                                  </div>
                                </div>
                              :<button onClick={()=>{setFollowingCtId(ct.id);setFollowText('');}} style={{marginTop:7,padding:'4px 10px',background:'#EDE9FE',color:'var(--purple)',border:'none',borderRadius:4,fontSize:10.5,fontWeight:600,cursor:'pointer'}}>+ 新增追蹤備註</button>
                          )}
                        </div>
                      ))
                    }
                  </div>
                );
              })()}

              {/* ── 派工紀錄 ── */}
              <div className="sec-t">🔧 派工紀錄（{repairs.length} 筆）</div>
              {repairs.length===0
                ? <div className="empty" style={{height:100}}><div style={{fontSize:26,opacity:.3}}>📋</div><div style={{fontSize:12,marginTop:8}}>尚無派工紀錄</div></div>
                : repairs.map(r=>{const isHL=r.id===highlightedOrderId; return(
                  <div key={r.id} ref={isHL?hlRef:null} className={`rcard ${r.urgency==='urgent'?'urgent':r.status}`} style={isHL?{outline:'2px solid var(--brand)',outlineOffset:2}:{}}>
                    <div className="rch">
                      <div>
                        <div style={{fontSize:12,fontWeight:700}}>{r.type} — {r.issue}</div>
                        <div className="rid">{r.id}</div>
                        <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                          {r.warrantyIn!=null&&<span style={{fontSize:9.5,padding:'1px 6px',borderRadius:8,fontWeight:700,
                            background:r.warrantyIn?'#D1FAE5':'#FEE2E2',color:r.warrantyIn?'#065F46':'#991B1B'}}>
                            {r.warrantyIn?'✅ 保固內':'⚠️ 保固外'}</span>}
                          {r.handlingUnit&&<span style={{fontSize:9.5,padding:'1px 6px',borderRadius:8,fontWeight:600,background:'#EDE9FE',color:'#5B21B6'}}>{r.handlingUnit}</span>}
                          {(r.site||r.unit)&&<span style={{fontSize:9.5,padding:'1px 6px',borderRadius:8,fontWeight:600,background:'#FEF3C7',color:'#92400E'}}>🏗️ {[r.site,r.unit].filter(Boolean).join(' ')}</span>}
                        </div>
                      </div>
                      <span className={`sb ${r.urgency==='urgent'?'urgent':r.status}`}>
                        {r.urgency==='urgent'?'🚨緊急':r.status==='done'?'✅完成':r.status==='dispatched'?'🚗處理中':'⏳待處理'}
                      </span>
                    </div>
                    <div className="rb">
                      <div><span>📅 報修日期</span><br/><strong>{r.date}</strong></div>
                      <div><span>🏠 空間</span><br/><strong>{r.space}</strong></div>
                      <div><span>👷 師傅</span><br/><strong>{WORKERS.find(w=>w.id===r.workerId)?.name||'未指派'}</strong></div>
                      <div><span>⏰ 預約</span><br/><strong>{r.scheduledDate||'未排定'}</strong></div>
                      {r.status==='dispatched'&&r.etaText&&<div><span>🚗 預計抵達</span><br/><strong style={{color:'var(--accent)'}}>{r.etaText}{r.etaSource==='manual'?'（手動）':''}</strong></div>}
                      {r.desc&&<div style={{gridColumn:'1/-1'}}><span>💬 描述</span><br/><strong>{r.desc}</strong></div>}
                      {r.note&&<div style={{gridColumn:'1/-1'}}><span>📝 備註</span><br/><strong style={{color:'var(--g700)'}}>{r.note}</strong></div>}
                    </div>
                    {r.receiptNo&&<div style={{marginTop:6,fontSize:10.5,padding:'5px 9px',background:'#EFF6FF',borderRadius:5,color:'var(--accent)',fontWeight:700}}>📋 簽收單號：{r.receiptNo}</div>}
                    {r.arrivalPushed&&<div style={{marginTop:6,fontSize:10.5,color:'var(--accent)',padding:'4px 8px',background:'#EFF6FF',borderRadius:4}}>✅ 師傅抵達通知已推播</div>}
                    {r.rating!=null&&<div style={{marginTop:5,display:'flex',alignItems:'center',gap:4}}><div className="stars">{stars(r.rating)}</div><span style={{fontSize:10.5,color:'var(--g400)'}}>客戶評分 {r.rating}</span></div>}
                    {r.status!=='done'&&<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
                      {r.status==='pending'&&<button onClick={()=>openRepairDispatch(r)} style={{padding:'5px 12px',background:'#EDE9FE',color:'#5B21B6',border:'none',borderRadius:4,fontSize:11,fontWeight:700,cursor:'pointer'}}>📅 排程派工</button>}
                      {r.status==='dispatched'&&<button onClick={()=>setClosingRepair(r)} style={{padding:'5px 12px',background:'var(--ok)',color:'#fff',border:'none',borderRadius:4,fontSize:11,fontWeight:700,cursor:'pointer'}}>✅ 完工結案</button>}
                    </div>}
                  </div>
                )})
              }

              {/* ── 安裝工單 ── */}
              <div className="sec-t">🛠️ 安裝工單（{curInstalls.length} 筆）</div>
              {curInstalls.length===0
                ?<div className="empty" style={{height:80}}><div style={{fontSize:22,opacity:.3}}>🛠️</div><div style={{fontSize:12,marginTop:6}}>尚無安裝工單</div></div>
                :curInstalls.map(o=>{const isHLo=o.id===highlightedOrderId; return(
                  <div key={o.id} ref={isHLo?hlRef:null} className={`rcard ${o.status==='done'?'done':o.status==='failed'?'urgent':'dispatched'}`} style={isHLo?{outline:'2px solid var(--brand)',outlineOffset:2}:{}}>
                    <div className="rch">
                      <div>
                        <div style={{fontSize:12,fontWeight:700}}>安裝 — {PRODUCTS[o.productId]?.name||o.productId||'—'}</div>
                        <div className="rid">{o.id}</div>
                      </div>
                      <span className={`sb ${o.status==='done'?'done':o.status==='failed'?'urgent':o.status==='pending'?'pending':'dispatched'}`}>{STEPLABEL[o.status]}</span>

                    <div className="rb">
                      <div><span>🔑 負責師傅</span><br/><strong>{LOCKSMITHS.find(s=>s.id===o.locksmithId)?.name||'未指派'}</strong></div>
                      <div><span>👷 派工師傅</span><br/><strong>{(db.workers||[]).find(w=>w.id===o.workerId)?.name||WORKERS.find(w=>w.id===o.workerId)?.name||'未排程'}</strong></div>
                      {o.schedDate&&<div><span>⏰ 預約</span><br/><strong>{o.schedDate} {String(o.schedStart||0).padStart(2,'0')}:00</strong></div>}
                      {o.serialNo&&<div><span>📋 序號</span><br/><strong style={{fontFamily:'JetBrains Mono',fontSize:10}}>{o.serialNo}</strong></div>}
                    </div>
                    {o.status==='done'&&<div style={{fontSize:11,color:'var(--ok)',fontWeight:700,marginTop:4}}>✅ 完工 {o.completedDate}　·　保固至 {o.warrantyEnd}</div>}
                    {o.status==='failed'&&<div style={{fontSize:11,color:'var(--err)',fontWeight:700,marginTop:4}}>❌ 已回報客服處理</div>}

function SchedulePage(){
  const {db}=useContext(Ctx);
  const [region,setRegion]=useState('central');

  const [sel,setSel]=useState(null);

    if(!b)return null;
    if(b.refType==='install'){ const o=db.installs?.[b.refId]; return o?{...o,_type:'install'}:null; }
    const r=db.repairs?.[b.refId]; return r?{...r,_type:'repair'}:null;
  };
  return(
    <div className="rapage">
      <div className="ra-hdr"><h2>📅 工務時刻表</h2></div>

      <div className="sched-wrap">
        {list.length?(
          <table className="sched">
            <thead><tr><th>時間</th>{list.map(w=><th key={w.id}>{w.name}<div style={{fontSize:9,fontWeight:400,opacity:.7}}>{w.type==='internal'?'原廠工務':'配合鎖店'}</div></th>)}</tr></thead>
            <tbody>{SLOT_HOURS.map(h=>(
              <tr key={h}>
                <td className="wk">{hourLabel(h)}</td>
                {list.map(w=>{
                  const b=(db.bookings||[]).find(x=>x.workerId===w.id&&x.date===date&&x.hour===h);
                  if(!b) return <td key={w.id}></td>;
                  return <td key={w.id} className={'busy'+(b.refType==='install'?' inst':'')} style={{cursor:'pointer'}}
                    title={`點擊查看案件 ${b.refId}`} onClick={()=>{const cc=caseOf(b); cc?setSel(cc):alert('找不到對應案件（'+b.refId+'）');}}>
                    <div style={{fontWeight:700,fontSize:11}}>{b.refType==='install'?'🛠️ 安裝':'🔧 維修'}</div>
                    <div style={{fontSize:9.5,opacity:.8,fontFamily:'JetBrains Mono',marginTop:1}}>{b.refId}</div>
                  </td>;
                })}
              </tr>
            ))}</tbody>
          </table>
        ):<div style={{color:'var(--g400)',fontSize:13,padding:'30px 0',textAlign:'center'}}>此區尚無師傅</div>}
      </div>
      <div style={{fontSize:11,color:'var(--g500)',marginTop:8}}>🟦 維修（1 格）　🟪 安裝（2 格）　空白＝可約　·　點格子可查看案件與異動紀錄</div>
      {sel&&(
        <div style={{position:'fixed',inset:0,top:48,zIndex:40}}>
          <div onClick={()=>setSel(null)} style={{position:'absolute',inset:0,background:'rgba(15,39,68,.25)'}}/>

const CASE_STATUS={
  pending:  {label:'待處理',bg:'#FEF3C7',fg:'#B45309'},
  dispatched:{label:'已派工',bg:'#DBEAFE',fg:'#1D4ED8'},
  arrived:  {label:'已到場',bg:'#EDE9FE',fg:'#6D28D9'},
  installed:{label:'待驗收',bg:'#CFFAFE',fg:'#0E7490'},
  done:     {label:'已完成',bg:'#D1FAE5',fg:'#065F46'},
  failed:   {label:'失敗',  bg:'#FEE2E2',fg:'#991B1B'},
  following:{label:'追蹤中',bg:'#DBEAFE',fg:'#1D4ED8'},
  closed:   {label:'已結案',bg:'#D1FAE5',fg:'#065F46'},
};
const maskName=name=>{
  if(!name)return'—';
  if(name.length<=2)return name[0]+'*';
  return name[0]+'*'.repeat(name.length-2)+name[name.length-1];
};
const maskPhone=phone=>{
  if(!phone)return'—';
  if(phone.length<7)return phone;
  return phone.slice(0,4)+'***'+phone.slice(-3);
};

function CaseDetailPanel({c,onClose,onOpenFull}){
  const {db}=useContext(Ctx);
  const customers=db.customers||[];
  const repairs=db.repairs||{};
  const installs=db.installs||{};
  const complaints=db.complaints||{};
  const cust=customers.find(x=>x.wfId===c.wfId)||(c.phone?customers.find(x=>x.phone===c.phone):null);
  const keyWf=cust?cust.wfId:c.wfId;
  const keyPhone=cust?cust.phone:c.phone;
  // 聚合以客編為主（電話非唯一，避免同號不同住所混在一起）；無客編時才退回電話
  const match = keyWf ? (r=>r.wfId===keyWf) : (r=>keyPhone&&r.phone===keyPhone);
  const custRepairs=Object.values(repairs).filter(match);
  const custInstalls=Object.values(installs).filter(match);
  const custComplaints=Object.values(complaints).filter(match);
  const p=cust?pctW(cust.installDate,cust.warrantyMonths||36):0;
  const prod=cust?PRODUCTS[cust.productId]:null;
  const timeline=[
    ...custInstalls.map(o=>({...o,_k:'i',_date:o.createdDate||'',_label:'安裝件'})),
    ...custRepairs.map(r=>({...r,_k:'r',_date:r.date||'',_label:'維修件'})),
    ...custComplaints.map(ct=>({...ct,_k:'c',_date:ct.date||'',_label:'客訴件'})),
  ].sort((a,b)=>b._date.localeCompare(a._date));
  const ST=CASE_STATUS;
  // 案件異動紀錄（repair/install 用 history；complaint 用 timeline）
  const fmtTs=ts=>{ if(!ts)return'—'; if(typeof ts==='number'||/^\d+$/.test(String(ts))){const d=new Date(Number(ts)); return d.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});} return String(ts); };
  const hist = c._type==='complaint'
    ? (c.timeline||[]).map(t=>({ts:t.ts,by:t.by,action:t.note}))
    : (c.history||[]);
  return(
    <div style={{width:360,background:'#fff',borderLeft:'1px solid #E2E8F0',overflowY:'auto',flexShrink:0,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#0F2744'}}>
        <div><div style={{fontSize:10.5,color:'rgba(255,255,255,.45)',marginBottom:2}}>{c._type==='customer'?'客戶總覽':'案件詳情'}</div><div style={{fontSize:13,fontWeight:700,color:'#fff'}}>{c._type==='customer'?(cust?.name||c.name||c.id):c.id}</div></div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:6,padding:'5px 11px',cursor:'pointer',fontSize:14,color:'#fff'}}>✕</button>
      </div>
      {c._type!=='customer'&&(
      <div style={{padding:'13px 16px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>
        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
          <span style={{background:c._type==='install'?'#EDE9FE':c._type==='complaint'?'#FEF3C7':'#E0F2FE',color:c._type==='install'?'#5B21B6':c._type==='complaint'?'#B45309':'#0369A1',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>
            {c._type==='install'?'安裝件':c._type==='complaint'?'客訴件':'維修件'}
          </span>
          {ST[c.status]&&<span style={{background:ST[c.status].bg,color:ST[c.status].fg,fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>{ST[c.status].label}</span>}
          {c.urgency==='urgent'&&<span style={{background:'#FEE2E2',color:'#991B1B',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>🚨 緊急</span>}
        </div>
        {c._type==='repair'&&<div style={{fontSize:12,color:'#334155'}}><b>{c.type}</b> — {c.issue}</div>}
        {c._type==='install'&&<div style={{fontSize:12,color:'#334155'}}>安裝 {PRODUCTS[c.productId]?.name||c.productId||'門鎖'}</div>}
        {c._type==='complaint'&&<div style={{fontSize:12,color:'#334155'}}>{c.cat1}{c.cat2?` / ${c.cat2}`:''}</div>}
        <div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>📍 {c.address||c.building||c.district||'—'}</div>
        <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>
          📅 {c.date||c.createdDate||'—'}
          {c.schedDate&&<span style={{marginLeft:8}}>🗓️ 約工 {c.schedDate}{c.schedStart!=null?` ${String(c.schedStart).padStart(2,'0')}:00`:''}</span>}
        </div>
      </div>
      )}
      {cust?(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0'}}>
          <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:8,letterSpacing:.5}}>客戶資料</div>
          <div style={{fontSize:12.5,lineHeight:1.9,color:'#334155'}}>
            <div>👤 <b>{cust.name}</b>　{cust.phone}</div>
            <div>🏠 {cust.address||cust.district||'—'}</div>
            {prod&&<div>📦 {prod.name}</div>}
            {cust.serialNo&&<div style={{fontFamily:'monospace',fontSize:11,color:'#64748B'}}>SN: {cust.serialNo}</div>}
            {cust.installDate&&<div>📅 安裝 {cust.installDate}</div>}
          </div>
          {cust.installDate&&(
            <div style={{marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                <span style={{color:'#64748B'}}>保固進度</span>
                <span style={{fontWeight:700,color:p>50?'#10B981':p>20?'#F59E0B':'#EF4444'}}>{p}% 剩餘</span>
              </div>
              <div style={{background:'#E2E8F0',borderRadius:9,height:6}}>
                <div style={{background:p>50?'#10B981':p>20?'#F59E0B':'#EF4444',width:p+'%',height:'100%',borderRadius:9}}/>
              </div>
              <div style={{fontSize:10,color:'#94A3B8',marginTop:3}}>保固至 {cust.warrantyEnd||'—'}</div>
            </div>
          )}
          {onOpenFull&&<button onClick={()=>onOpenFull(cust.wfId)}
            style={{width:'100%',marginTop:12,background:'#0F2744',color:'#fff',border:'none',borderRadius:7,padding:'8px',fontSize:12,fontWeight:700,cursor:'pointer'}}>📋 查看完整客戶資料 →</button>}
        </div>
      ):(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0'}}>
          <div style={{fontSize:10,color:'#94A3B8',marginBottom:4}}>尚無保固登錄資料</div>
          <div style={{fontSize:12.5,color:'#334155'}}><b>{c.name}</b>　{c.phone}</div>
        </div>
      )}
      {c._type!=='customer'&&hist.length>0&&(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0',background:'#F8FAFC'}}>
          <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:8,letterSpacing:.5}}>📝 本案異動紀錄（{hist.length}）</div>
          {hist.slice().reverse().map((h,i)=>(
            <div key={i} style={{display:'flex',gap:8,fontSize:11.5,padding:'5px 0',borderBottom:i<hist.length-1?'1px dashed #E2E8F0':'none'}}>
              <span style={{color:'#94A3B8',whiteSpace:'nowrap',fontVariantNumeric:'tabular-nums'}}>{fmtTs(h.ts)}</span>
              <span style={{flex:1,color:'#334155'}}>{h.action||'—'}</span>
              <span style={{color:'#0F2744',fontWeight:600,whiteSpace:'nowrap'}}>{h.by||'—'}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{padding:'13px 16px',flex:1}}>
        <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:12,letterSpacing:.5}}>所有歷程（{timeline.length} 件）</div>
        {timeline.length===0?<div style={{color:'#94A3B8',fontSize:12}}>無歷程紀錄</div>:timeline.map((item,i)=>{
          const col=item._k==='i'?'#7C3AED':item._k==='c'?'#F59E0B':'#0EA5E9';
          const st=ST[item.status]||{};
          return(
            <div key={item.id+'-'+i} style={{borderLeft:`3px solid ${col}`,paddingLeft:12,marginBottom:14,position:'relative'}}>
              <div style={{position:'absolute',left:-6,top:3,width:9,height:9,borderRadius:'50%',background:col}}/>
              <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:2}}>{item._label} {item.id}</div>
              <div style={{fontSize:11,color:'#475569'}}>
                {item._date}
                {item._k==='r'&&item.type&&<span style={{marginLeft:6}}>{item.type}</span>}
                {item._k==='r'&&item.issue&&<span style={{marginLeft:4,color:'#64748B'}}>— {item.issue.slice(0,20)}{item.issue.length>20?'…':''}</span>}
                {item._k==='c'&&item.cat1&&<span style={{marginLeft:6,color:'#64748B'}}>{item.cat1}</span>}
              </div>
              {st.label&&<span style={{background:st.bg,color:st.fg,fontSize:9.5,fontWeight:700,padding:'1px 6px',borderRadius:8,marginTop:2,display:'inline-block'}}>{st.label}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── 新增客戶主檔（不依附工單，讓客戶成為旅程起點）───
function CreateCustomerModal({onClose}){
  const {db,updateDB,toast,setPage,setCrmTarget}=useContext(Ctx);
  const [name,setName]=useState('');
  const [phone,setPhone]=useState('');
  const [channel,setChannel]=useState('lock_shop');
  const [groupId,setGroupId]=useState('');
  const [projectId,setProjectId]=useState('');
  const [address,setAddress]=useState('');
  const [zip,setZip]=useState('');
  const [addrOpen,setAddrOpen]=useState(false);
  const doCreate=async()=>{
    if(!name.trim()){toast('缺少姓名','請填寫客戶姓名','warn');return;}
    if(!address){toast('缺少地址','地址為客編識別唯一鍵，必填','warn');return;}
    const key=custKey(name,address);
    const exist=(db.customers||[]).find(c=>custKey(c.name,c.address)===key);
    if(exist){
      toast('客戶已存在',`${exist.name}（${exist.wfId}）已在系統中，將為您開啟詳情`,'warn');
      setCrmTarget(exist.wfId); setPage('crm'); onClose(); return;
    }
    const wfId='WF'+String(Date.now()).slice(-8);
    const newCust={wfId,name:name.trim(),phone:phone.trim(),address,zip,channel,
      groupId:groupId||null,projectId:projectId||null,
      regType:'manual',regDate:today(),
      installDate:null,warrantyMonths:null,warrantyEnd:null,
      tags:['已登錄'],repairIds:[],complaintIds:[]};
    updateDB(prev=>({...prev,customers:[...(prev.customers||[]),newCust]}));
    toast('✅ 客戶主檔已建立',`${name.trim()}｜${wfId}`,'ok');
    setCrmTarget(newCust.wfId); setPage('crm'); onClose();
  };
  const ov={position:'fixed',inset:0,background:'rgba(0,0,0,.55)',zIndex:1200,display:'flex',alignItems:'center',justifyContent:'center'};
  const box={background:'#fff',borderRadius:12,padding:24,width:460,maxWidth:'95vw',maxHeight:'90vh',overflowY:'auto'};
  return(
    <div style={ov} onClick={e=>e.target===e.currentTarget&&onClose()}>
      {addrOpen&&<AddressPicker initial={{address,zip}} onConfirm={r=>{setAddress(r.address);setZip(r.zip);setAddrOpen(false);}} onClose={()=>setAddrOpen(false)}/>}
      <div style={box}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:16,borderBottom:'1px solid var(--g100)',paddingBottom:10}}>👤 新增客戶主檔</div>
        <div className="mf2">
          <div className="mf"><label>姓名 <span style={{color:'var(--err)'}}>*</span></label><input value={name} onChange={e=>setName(e.target.value)} placeholder="客戶姓名"/></div>
          <div className="mf"><label>電話</label><input value={phone} onChange={e=>setPhone(e.target.value)} placeholder="0912-345-678"/></div>
        </div>
        <div className="mf"><label>地址 <span style={{color:'var(--err)'}}>*</span></label>
          <div style={{display:'flex',gap:6,alignItems:'stretch'}}>
            <div style={{flex:1,minHeight:34,border:'1px solid var(--g200)',borderRadius:5,padding:'7px 10px',fontSize:12.5,background:'var(--g50)',display:'flex',alignItems:'center',color:address?'var(--g700)':'var(--g400)'}}>
              {address?`${zip?zip+' ':''}${address}`:'尚未選取地址'}
            </div>
            <button type="button" onClick={()=>setAddrOpen(true)} style={{padding:'0 14px',background:'var(--brand)',color:'#fff',border:'none',borderRadius:5,fontSize:12,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>🔎 選取地址</button>
          </div>
        </div>
        <div className="mf"><label>購買通路</label>
          <select value={channel} onChange={e=>{setChannel(e.target.value);if(e.target.value!=='builder'){setGroupId('');setProjectId('');}}}>
            {Object.entries(CHANNELS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        {channel==='builder'&&(
          <div className="mf2">
            <div className="mf"><label>所屬集團</label>
              <select value={groupId} onChange={e=>{setGroupId(e.target.value);setProjectId('');}}>
                <option value="">— 選集團 —</option>
                {(db.groups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
              </select>
            </div>
            <div className="mf"><label>所屬建案</label>
              <select value={projectId} onChange={e=>setProjectId(e.target.value)} disabled={!groupId}>
                <option value="">— 選建案 —</option>
                {(db.projects||[]).filter(p=>p.groupId===groupId).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
          </div>
        )}
        <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:18,paddingTop:12,borderTop:'1px solid var(--g100)'}}>
          <button onClick={onClose} style={{padding:'8px 18px',background:'var(--g100)',border:'none',borderRadius:7,fontSize:13,fontWeight:600,cursor:'pointer'}}>取消</button>
          <button onClick={doCreate} style={{padding:'8px 22px',background:'var(--brand)',color:'#fff',border:'none',borderRadius:7,fontSize:13,fontWeight:700,cursor:'pointer'}}>建立客戶主檔</button>
        </div>
      </div>
    </div>
  );
}

function HomePage(){
  const {db,updateDB,toast,currentRole,setPage,setCrmTarget}=useContext(Ctx);
  const [search,setSearch]=useState('');
  const [typeFilter,setTypeFilter]=useState('all');
  const [dept,setDept]=useState('all');
  const [selected,setSelected]=useState(null);
  const [results,setResults]=useState(null); // null=案件池模式, array=客戶搜尋結果
  const [custModal,setCustModal]=useState(false);
  const installs=Object.values(db.installs||{});
  const repairs=Object.values(db.repairs||{});
  const complaints=Object.values(db.complaints||{});
  const DONE_STATUS=['done','closed','failed'];
  const isOpen=c=>!DONE_STATUS.includes(c.status);
  const allCases=[
    ...installs.filter(isOpen).map(o=>({...o,_type:'install',_date:o.createdTs||0})),
    ...repairs.filter(isOpen).map(r=>({...r,_type:'repair',_date:new Date(r.date||0).getTime()||0})),
    ...complaints.filter(isOpen).map(ct=>({...ct,_type:'complaint',_date:new Date(ct.date||0).getTime()||0})),
  ].sort((a,b)=>b._date-a._date);
  const filtered=allCases.filter(c=>{
    if(typeFilter!=='all'&&c._type!==typeFilter)return false;
    if(dept!=='all'&&c._type==='complaint'&&c.department!==dept)return false;
    return true;
  });
  const openCustomer=wfId=>{ setCrmTarget(wfId); setPage('crm'); };
  const doSearch=()=>{
    const term=search.trim();
    if(!term){ setResults(null); return; }
    const lo=term.toLowerCase();
    const customers=db.customers||[];
    const cntCases=c=>[
      ...installs.filter(o=>(c.wfId&&o.wfId===c.wfId)||(c.phone&&o.phone===c.phone)),
      ...repairs.filter(r=>(c.wfId&&r.wfId===c.wfId)||(c.phone&&r.phone===c.phone)),
      ...complaints.filter(t=>(c.wfId&&t.wfId===c.wfId)||(c.phone&&t.phone===c.phone)),
    ].length;
    // 1. 已登錄客戶（模糊比對 姓名/電話/編號/序號/地址）
    const matched=customers.filter(c=>
      (c.name||'').toLowerCase().includes(lo)||(c.phone||'').includes(term)||
      (c.wfId||'').toLowerCase().includes(lo)||(c.serialNo||'').toLowerCase().includes(lo)||
      (c.address||'').includes(term)
    ).map(c=>({...c,_registered:true,_caseCount:cntCases(c)}));
    // 2. 未登錄但有案件的電話（去重，建立候選）
    const known=new Set(matched.map(c=>c.phone));
    const allRaw=[
      ...installs.map(o=>({...o,_type:'install'})),
      ...repairs.map(r=>({...r,_type:'repair'})),
      ...complaints.map(t=>({...t,_type:'complaint'})),
    ];
    const extra={};
    allRaw.forEach(c=>{
      const hit=(c.phone||'').includes(term)||(c.name||'').includes(term)||
        (c.id||'').toLowerCase().includes(lo)||(c.address||'').includes(term)||(c.building||'').includes(term);
      if(!hit)return;
      const key=c.phone||c.id;
      if(known.has(c.phone))return;
      if(!extra[key]) extra[key]={wfId:null,name:c.name,phone:c.phone,address:c.address||c.building||c.district,_registered:false,_caseCount:0,_anchor:c};
      extra[key]._caseCount++;
    });
    setResults([...matched,...Object.values(extra)]);
  };
  const typeLabelMap={install:'安裝件',repair:'維修件',complaint:'客訴件'};
  const typeBg={install:'#EDE9FE',repair:'#E0F2FE',complaint:'#FEF3C7'};
  const typeFg={install:'#5B21B6',repair:'#0369A1',complaint:'#B45309'};
  const typeBar={install:'#7C3AED',repair:'#0EA5E9',complaint:'#F59E0B'};
  const ST=CASE_STATUS;
  const pend=allCases.filter(c=>c.status==='pending').length;
  const urg=repairs.filter(r=>r.urgency==='urgent'&&r.status!=='done').length;
  // 需整理案件：無客編、客編不存在、或「案件地址+姓名」與其所綁客編對不上（含先前用電話誤併）
  const custList=db.customers||[];
  const isTempCust=c=>(c.tags||[]).includes('待整理');
  const caseAddr=x=>x.building||x.address||x.district;
  const custByWf={}; custList.forEach(c=>{custByWf[c.wfId]=c;});
  const needFix=x=>{
    if(!x.wfId||!custByWf[x.wfId])return true;
    const ck=custKey(x.name||x.contactName,caseAddr(x));
    const ok=custKey(custByWf[x.wfId].name,custByWf[x.wfId].address);
    return !!(ck&&ok&&ck!==ok);
  };
  const orphanCnt=installs.filter(needFix).length+repairs.filter(needFix).length+complaints.filter(needFix).length;
  // 依「地址+姓名」重新歸戶（冪等）：歸到既有同 key 客編，無則新建；最後清掉無案件引用的待整理孤兒客編
  const runBackfill=()=>{
    let customers=[...custList];
    const keyMap={}; customers.forEach(c=>{const k=custKey(c.name,c.address); if(k&&!keyMap[k])keyMap[k]=c.wfId;});
    let seq=0,created=0,fixed=0;
    const resolve=(name,address,phone)=>{
      const k=custKey(name,address);
      if(k&&keyMap[k])return keyMap[k];
      const wfId='WF'+String(Date.now()).slice(-6)+String(seq++).padStart(2,'0');
      customers.push({wfId,name:name||'(未具名)',phone:phone||'',address:address||'',regType:'backfill',regDate:today(),
        installDate:null,warrantyMonths:null,warrantyEnd:null,tags:['待整理'],repairIds:[],complaintIds:[]});
      if(k)keyMap[k]=wfId; created++; return wfId;
    };
    const fix=coll=>{const out={...coll};Object.values(out).forEach(x=>{
      if(needFix(x)){
        const wf=resolve(x.name||x.contactName,caseAddr(x),x.phone||x.contactPhone);
        if(wf!==x.wfId)fixed++;
        out[x.id]={...x,wfId:wf};
      }});return out;};
    const repairsN=fix(db.repairs||{});
    const installsN=fix(db.installs||{});
    const complaintsN=fix(db.complaints||{});
    if(created===0&&fixed===0){toast('✅ 已全部歸戶','沒有需要整理的案件','ok');return;}
    // 清理無任何案件引用的待整理孤兒客編（正式客戶即使無案件也保留）
    const used=new Set();
    [repairsN,installsN,complaintsN].forEach(coll=>Object.values(coll).forEach(x=>x.wfId&&used.add(x.wfId)));
    const orphanWf=customers.filter(c=>!used.has(c.wfId)&&isTempCust(c)).map(c=>c.wfId);
    customers=customers.filter(c=>used.has(c.wfId)||!isTempCust(c));
    updateDB({...db,customers,repairs:repairsN,installs:installsN,complaints:complaintsN});
    if(orphanWf.length) sb.from('customers').delete().in('wf_id',orphanWf).then(()=>{}).catch(e=>console.error('清除孤兒客編失敗:',e));
    toast('🔗 依地址重新歸戶完成',`新建 ${created} 個客編、調整 ${fixed} 筆案件`,'ok');
  };
  return(
    <div style={{display:'flex',height:'calc(100vh - 48px)',overflow:'hidden'}}>
      <div style={{width:'20%',minWidth:190,maxWidth:260,background:'#1E293B',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'14px 12px',borderBottom:'1px solid #334155'}}>
          <div style={{fontSize:9.5,color:'rgba(255,255,255,.35)',fontWeight:700,letterSpacing:.5,marginBottom:7}}>🔍 客戶查詢</div>
          <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="輸入電話 / 姓名 / 案號"
            style={{width:'100%',background:'#334155',border:'1px solid #475569',borderRadius:7,padding:'7px 10px',color:'#F1F5F9',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:7}}/>
          <button onClick={doSearch}
            style={{width:'100%',background:'#38BDF8',color:'#0F2744',border:'none',borderRadius:7,padding:'7px',fontSize:12,fontWeight:700,cursor:'pointer'}}>🔍 搜尋客戶</button>
          <button onClick={()=>setCustModal(true)}
            style={{width:'100%',background:'#10B981',color:'#fff',border:'none',borderRadius:7,padding:'7px',fontSize:12,fontWeight:700,cursor:'pointer',marginTop:6}}>＋ 新增客戶主檔</button>
          {results!==null&&<button onClick={()=>{setSearch('');setResults(null);}}
            style={{width:'100%',background:'transparent',color:'#94A3B8',border:'1px solid #475569',borderRadius:7,padding:'5px',fontSize:11,fontWeight:600,cursor:'pointer',marginTop:6}}>← 返回案件列表</button>}
        </div>

function LoginScreen({onLogin}){
  const [acc,setAcc]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!acc.trim()||!pin.trim()){setErr('請輸入帳號與密碼');return;}
    setBusy(true);setErr('');
    const {data}=await sb.from('crm_users').select('*').eq('account',acc.trim()).eq('pin',pin.trim()).eq('active',true).maybeSingle();
    setBusy(false);
    if(!data){setErr('帳號或密碼錯誤');return;}
    onLogin({id:data.id,name:data.name,role:data.role});
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F2744'}}>
      <div style={{background:'#fff',borderRadius:14,padding:'34px 30px',width:330,boxShadow:'0 12px 40px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:22,fontWeight:800,color:'#0F2744'}}>🔒 WAFERLOCK CRM</div>
          <div style={{fontSize:12.5,color:'#64748B',marginTop:4}}>請輸入帳號與密碼登入</div>
        </div>
        <label style={{fontSize:11.5,fontWeight:700,color:'#475569'}}>帳號</label>
        <input value={acc} onChange={e=>setAcc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="例：admin"
          style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none',margin:'4px 0 12px',boxSizing:'border-box'}}/>
        <label style={{fontSize:11.5,fontWeight:700,color:'#475569'}}>密碼</label>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••"
          style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none',margin:'4px 0 6px',boxSizing:'border-box'}}/>
        {err&&<div style={{color:'#EF4444',fontSize:12,margin:'6px 0'}}>{err}</div>}
        <button onClick={go} disabled={busy}
          style={{width:'100%',marginTop:14,background:'#38BDF8',color:'#0F2744',border:'none',borderRadius:8,padding:'11px',fontSize:14,fontWeight:800,cursor:'pointer',opacity:busy?.6:1}}>
          {busy?'登入中…':'登入'}
        </button>
      </div>
    </div>
  );
}

function GroupProjectPage(){
  const {db,setPage,setCrmTarget}=useContext(Ctx);
  const [selGroup,setSelGroup]=useState(null);
  const [selProject,setSelProject]=useState(null);
  const groups=db.groups||[];
  const projects=db.projects||[];
  const customers=db.customers||[];
  const TYPE_LABEL={b2b_build:'建案',b2b_op:'營運單位',b2c:'散客'};

  const projOfGroup=gid=>projects.filter(p=>p.groupId===gid);
  const custOfProject=pid=>customers.filter(c=>c.projectId===pid);
  const custOfGroup=gid=>customers.filter(c=>c.groupId===gid);
  const casesOfCust=c=>{
    const reps=(c.repairIds||[]).map(id=>(db.repairs||{})[id]).filter(Boolean);
    const cts=(c.complaintIds||[]).map(id=>(db.complaints||{})[id]).filter(Boolean);
    return {reps,cts};
  };

  // Layer 3：建案詳情（客戶 + 案件）
  if(selProject){
    const pj=selProject;
    const grp=groups.find(g=>g.id===pj.groupId);
    const custs=custOfProject(pj.id);
    return(
      <div style={{padding:18}}>
        <button className="crm-back" onClick={()=>setSelProject(null)}>← 返回 {grp?.name||'集團'} 的建案列表</button>
        <div className="card" style={{marginTop:10}}>
          <div style={{fontSize:18,fontWeight:800}}>🏗️ {pj.name}</div>
          <div style={{color:'var(--g500)',fontSize:12,marginTop:3}}>{grp?.name||'—'} · {TYPE_LABEL[pj.type]||pj.type} · {pj.address}</div>
          <div style={{display:'flex',gap:18,marginTop:10,fontSize:12}}>
            <div><span style={{color:'var(--g400)'}}>規劃數量</span><br/><strong>{pj.totalQty||0}</strong></div>
            <div><span style={{color:'var(--g400)'}}>已歸屬客戶</span><br/><strong>{custs.length}</strong></div>
            <div><span style={{color:'var(--g400)'}}>SLA</span><br/><strong>{pj.slaLevel||'normal'}</strong></div>
          </div>
        </div>
        <div className="sec-t" style={{marginTop:16}}>👥 已歸屬客戶與案件（{custs.length} 戶）</div>
        {custs.length===0
          ? <div className="empty" style={{height:120}}><div style={{fontSize:26,opacity:.3}}>🏠</div><div style={{fontSize:12,marginTop:8}}>此建案尚無歸屬客戶（至客戶詳情頁點「🏢 歸屬建案」）</div></div>
          : custs.map(c=>{
            const {reps,cts}=casesOfCust(c);
            return(
              <div key={c.wfId} className="card" style={{marginBottom:8}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{c.name} <span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--g400)'}}>{c.wfId}</span></div>
                    <div style={{fontSize:11,color:'var(--g500)',marginTop:1}}>{c.address||'—'}{c.unit?` · ${c.unit}`:''}</div>
                  </div>
                  <button onClick={()=>{setCrmTarget(c.wfId);setPage('crm');}}
                    style={{padding:'5px 11px',background:'#EFF6FF',color:'var(--accent)',border:'none',borderRadius:5,fontSize:11,fontWeight:700,cursor:'pointer'}}>查看完整 CRM →</button>
                </div>
                <div style={{display:'flex',gap:6,marginTop:7,flexWrap:'wrap'}}>
                  {reps.length===0&&cts.length===0&&<span style={{fontSize:11,color:'var(--g400)'}}>尚無案件</span>}
                  {reps.map(r=><span key={r.id} style={{fontSize:10.5,padding:'2px 8px',borderRadius:9,background:'#D1FAE5',color:'#065F46',fontWeight:600}}>🔧 {r.id} {r.type}</span>)}
                  {cts.map(ct=><span key={ct.id} style={{fontSize:10.5,padding:'2px 8px',borderRadius:9,background:'#FEF3C7',color:'#92400E',fontWeight:600}}>📞 {ct.id} {ct.cat1}</span>)}
                </div>
              </div>
            );
          })}
      </div>
    );
  }

  // Layer 2：某集團的建案列表
  if(selGroup){
    const prjs=projOfGroup(selGroup.id);
    return(
      <div style={{padding:18}}>
        <button className="crm-back" onClick={()=>setSelGroup(null)}>← 返回集團列表</button>
        <div style={{fontSize:18,fontWeight:800,marginTop:10}}>🏢 {selGroup.name}</div>
        <div style={{color:'var(--g500)',fontSize:12,marginTop:2}}>{selGroup.note||''}　共 {prjs.length} 個建案 · 已歸屬 {custOfGroup(selGroup.id).length} 戶</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10,marginTop:14}}>
          {prjs.map(p=>{
            const n=custOfProject(p.id).length;
            return(
              <div key={p.id} className="card" style={{cursor:'pointer'}} onClick={()=>setSelProject(p)}>
                <div style={{fontWeight:700,fontSize:14}}>🏗️ {p.name}</div>
                <div style={{fontSize:11,color:'var(--g500)',marginTop:3}}>{TYPE_LABEL[p.type]||p.type} · {p.address}</div>
                <div style={{fontSize:11,marginTop:6,display:'flex',gap:12}}>
                  <span style={{color:'var(--g400)'}}>規劃 <strong style={{color:'var(--g700)'}}>{p.totalQty||0}</strong></span>
                  <span style={{color:'var(--g400)'}}>歸屬 <strong style={{color:n>0?'var(--accent)':'var(--g700)'}}>{n}</strong> 戶</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // Layer 1：集團列表
  return(
    <div style={{padding:18}}>
      <div style={{fontSize:18,fontWeight:800}}>🏢 集團 / 建案</div>
      <div style={{color:'var(--g500)',fontSize:12,marginTop:2}}>B2B 集團 → 建案階層。點集團查看旗下建案，再點建案檢視已歸屬客戶與案件。</div>
      {groups.length===0
        ? <div className="empty" style={{height:160,marginTop:14}}><div style={{fontSize:26,opacity:.3}}>🏢</div><div style={{fontSize:12,marginTop:8}}>尚無集團資料（請先於 Supabase 執行 supabase_md5_seed.sql）</div></div>
        : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10,marginTop:14}}>
            {groups.map(g=>{
              const pc=projOfGroup(g.id).length, cc=custOfGroup(g.id).length;
              return(
                <div key={g.id} className="card" style={{cursor:'pointer'}} onClick={()=>setSelGroup(g)}>
                  <div style={{fontWeight:700,fontSize:15}}>🏢 {g.name}</div>
                  <div style={{fontSize:11,color:'var(--g500)',marginTop:3}}>{g.note||''}</div>
                  <div style={{fontSize:11,marginTop:7,display:'flex',gap:12}}>
                    <span style={{color:'var(--g400)'}}>建案 <strong style={{color:'var(--g700)'}}>{pc}</strong></span>
                    <span style={{color:'var(--g400)'}}>歸屬 <strong style={{color:cc>0?'var(--accent)':'var(--g700)'}}>{cc}</strong> 戶</span>
                  </div>
                </div>
              );
            })}
          </div>}
    </div>
  );
}

function App(){
  const [page,setPage] = useState('home');
  const [crmTarget,setCrmTarget] = useState(null); // 首頁搜尋→跳 CRM 指定客戶 wfId
  const [highlightedOrderId,setHighlightedOrderId] = useState(null);
  const hashApplied = useRef(false);
  const [currentUser,setCurrentUser] = useState(()=>{try{return JSON.parse(localStorage.getItem('wl_crm_user'))||null;}catch(e){return null;}});
  const [adminView,setAdminView] = useState('管理員(全知)'); // admin 切換視角
  const isAdmin = currentUser?.role==='admin';
  const currentRole = isAdmin ? adminView : (currentUser?.role||'管理員(全知)');
  const doLogin=(u)=>{ setCurrentUser(u); localStorage.setItem('wl_crm_user',JSON.stringify(u)); };
  const doLogout=()=>{ localStorage.removeItem('wl_crm_user'); setCurrentUser(null); };
  const [db,setDB] = useState(EMPTY_DB);
  const [loading,setLoading] = useState(true);
  const [toasts,setToasts] = useState([]);
  const [synced,setSynced] = useState(false);
  const [newIds,setNewIds] = useState([]);
  const prevDbRef = useRef(EMPTY_DB);

  const toast = useCallback((title,body,type='ok')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,title,body,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  // 初始載入
  useEffect(()=>{
    loadFromSupabase().then(data=>{
      setDB(data);
      prevDbRef.current = data;
      setLoading(false);
      setSynced(true);
    });
  },[]);

  // Hash deep link：登入後 + db 載入後解析一次，導向對應工單/客戶
  useEffect(()=>{
    if(!currentUser||!db.customers||hashApplied.current) return;
    hashApplied.current=true;
    const hash=window.location.hash.slice(1);
    if(!hash) return;
    const slash=hash.indexOf('/');
    const type=slash===-1?hash:hash.slice(0,slash);
    const id=slash===-1?'':hash.slice(slash+1);
    if(type==='crm'&&id){ setCrmTarget(id); setPage('crm'); }
    else if(type==='repair'&&id){
      const r=Object.values(db.repairs||{}).find(x=>x.id===id);
      if(r?.wfId){ setCrmTarget(r.wfId); setHighlightedOrderId(id); setPage('crm'); }
    } else if(type==='install'&&id){
      const o=Object.values(db.installs||{}).find(x=>x.id===id);
      if(o?.wfId){ setCrmTarget(o.wfId); setHighlightedOrderId(id); setPage('crm'); }
    }
  },[currentUser,db.customers]);

  const updateDB = useCallback(updater=>{
    setDB(prev=>{
      const next = typeof updater==='function' ? updater(prev) : updater;
      const withVer = {...next, version:(next.version||0)+1};
      syncToSupabase(prevDbRef.current, withVer).then(()=>setSynced(true));
      prevDbRef.current = withVer;
      return withVer;
    });
  },[]);

  // Supabase Realtime 跨分頁與跨裝置同步
  useEffect(()=>{
    const channel = sb.channel('db-realtime')
      .on('postgres_changes',{event:'*',schema:'public'},()=>{
        loadFromSupabase().then(data=>{
          setDB(prev=>{
            const prevSet=new Set((prev.customers||[]).map(c=>c.wfId));
            const added=(data.customers||[]).filter(c=>!prevSet.has(c.wfId));
            if(added.length>0){
              setNewIds(p=>[...p,...added.map(c=>c.wfId)]);
              toast('🎉 新客戶保固登錄',added.map(c=>c.name).join('、')+' 已完成登錄','ok');
              setTimeout(()=>setNewIds(p=>p.filter(id=>!added.map(c=>c.wfId).includes(id))),6000);
            }
            const prevRids=new Set(Object.keys(prev.repairs||{}));
            const newRids=Object.keys(data.repairs||{}).filter(id=>!prevRids.has(id));
            if(newRids.length>0){
              const r=data.repairs[newRids[0]];
              if(r) toast(r.urgency==='urgent'?'🚨 緊急報修':'📋 新報修案件',`${r.name} — ${r.issue}`,r.urgency==='urgent'?'err':'warn');
            }
            const prevCtIds=new Set(Object.keys(prev.complaints||{}));
            const newCtIds=Object.keys(data.complaints||{}).filter(id=>!prevCtIds.has(id));
            if(newCtIds.length>0){
              const ct=data.complaints[newCtIds[0]];
              if(ct) toast('📞 新客訴單',`${ct.name} — ${ct.cat1}`,'ok');
            }
            prevDbRef.current = data;
            return data;
          });
          setSynced(true);
        });
      })
      .subscribe(status=>setSynced(status==='SUBSCRIBED'));
    return ()=>sb.removeChannel(channel);
  },[toast]);

  if(loading) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,color:'var(--g500)'}}>
      <div style={{fontSize:32}}>🔄</div>
      <div style={{fontSize:14,fontWeight:600}}>連接 Supabase 雲端資料庫中...</div>
    </div>
  );

  if(!currentUser) return <LoginScreen onLogin={doLogin}/>;


  return(
    <Ctx.Provider value={{db,updateDB,toast,newIds,currentRole,currentUser,setPage,crmTarget,setCrmTarget,highlightedOrderId,setHighlightedOrderId}}>
      <nav className="nav">
        <div className="nav-logo">🔒 WAFERLOCK <span>CRM</span></div>
        <button className={`nbtn ${page==='home'||page==='crm'?'on':''}`} onClick={()=>{setPage('home');window.history.replaceState(null,'',location.pathname+location.search);}}>🏠 首頁 / 客戶查詢</button>
        <button className={`nbtn ${page==='schedule'?'on':''}`} onClick={()=>{setPage('schedule');window.history.replaceState(null,'',location.pathname+location.search);}}>📅 工務時刻表</button>
        <button className={`nbtn ${page==='groups'?'on':''}`} onClick={()=>{setPage('groups');window.history.replaceState(null,'',location.pathname+location.search);}}>🏢 集團/建案</button>
        <div className="sync-area">
          {isAdmin
            ? <select value={adminView} onChange={e=>setAdminView(e.target.value)} style={{fontSize:11,padding:'2px 4px',borderRadius:4,marginRight:10}}>
                <option value="管理員(全知)">👑 管理員(全知)</option>
                {COMPLAINT_DEPARTMENTS.map(d=><option key={d} value={d}>🏢 {d}</option>)}
              </select>
            : <span style={{fontSize:11,marginRight:10}}>🏢 {currentRole}</span>}
          <span style={{fontSize:11,fontWeight:700,marginRight:8}}>👤 {currentUser.name}</span>
          <button onClick={doLogout} style={{padding:'3px 8px',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',borderRadius:4,color:'#fff',fontSize:10,cursor:'pointer',marginRight:10}}>登出</button>
          <div className={`sdot ${synced?'live':'off'}`}/>
          <span>{synced?'即時同步中':'離線模式'}</span>
          <span style={{fontSize:9,marginLeft:2}}>v{db.version||0}</span>
        </div>
        <button onClick={async ()=>{
          if(confirm('確定清除所有資料嗎？(此動作將清空 Supabase 雲端資料)')){
            setLoading(true);
            try {
              await Promise.all([
                sb.from('customers').delete().neq('wf_id', ''),
                sb.from('repairs').delete().neq('id', ''),
                sb.from('complaints').delete().neq('id', ''),
                sb.from('installs').delete().neq('id', ''),
                sb.from('conversations').delete().neq('id', ''),
                sb.from('config').delete().neq('key', ''),
              ]);
            } catch(e) { console.error(e); }
            window.location.reload();
          }
        }}
          style={{padding:'3px 8px',background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:4,color:'#FCA5A5',fontSize:10,cursor:'pointer',marginLeft:6}}>
          重置
        </button>
      </nav>
      <div className="page">
        {page==='home'&&<HomePage/>}
        {page==='crm'&&<CRMPage/>}
        {page==='schedule'&&<SchedulePage/>}
        {page==='groups'&&<GroupProjectPage/>}
      </div>
      <Toasts items={toasts}/>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
