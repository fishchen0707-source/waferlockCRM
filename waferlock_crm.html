<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAFERLOCK CRM 客戶資料</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0F2744;--accent:#38BDF8;--ok:#10B981;--warn:#F59E0B;--err:#EF4444;--purple:#8B5CF6;
  --w:#fff;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;
}
body{font-family:'Noto Sans TC',sans-serif;background:#EEF2F7;color:var(--g800);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:2px}
.nav{position:fixed;top:0;left:0;right:0;height:48px;background:var(--brand);z-index:999;display:flex;align-items:center;padding:0 14px;gap:4px}
.nav-logo{color:#fff;font-weight:700;font-size:13px;margin-right:10px;display:flex;align-items:center;gap:6px}
.nav-logo span{background:var(--accent);color:var(--brand);font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px}
.nbtn{padding:5px 12px;border-radius:5px;font-size:11.5px;font-weight:500;border:none;color:rgba(255,255,255,.65);background:transparent;transition:all .15s}
.nbtn.on{background:var(--accent);color:var(--brand);font-weight:700}
.nbtn:hover:not(.on){background:rgba(255,255,255,.1);color:#fff}
.nbadge{background:var(--err);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:3px}
.sync-area{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot.live{background:var(--ok);animation:blink 2s infinite}
.sdot.off{background:var(--g400)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.page{padding-top:48px;min-height:100vh}
.toasts{position:fixed;top:56px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:#fff;border-radius:8px;padding:9px 13px;box-shadow:0 4px 12px rgba(0,0,0,.15);border-left:3px solid var(--accent);min-width:210px;font-size:12px;animation:tin .25s ease}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--err)}.toast.warn{border-color:var(--warn)}
.toast-t{font-weight:700;font-size:12.5px;margin-bottom:1px}
@keyframes tin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes newglow{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 3px rgba(16,185,129,.4)}}
.new-glow{animation:newglow 1s ease 4}
.new-badge{position:absolute;top:7px;right:7px;background:var(--ok);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:8px;animation:blink .8s infinite}
/* CRM */
.crmlayout{display:flex;height:calc(100vh - 48px)}
.crmsb{width:270px;background:#fff;border-right:1px solid var(--g200);display:flex;flex-direction:column;flex-shrink:0}
.crm-sa{padding:12px}
.crm-sa h3{font-size:13.5px;font-weight:700;margin-bottom:8px}
.crm-si{width:100%;border:1px solid var(--g200);border-radius:5px;padding:7px 10px;font-size:12px;outline:none;margin-bottom:5px;font-family:inherit}
.crm-si:focus{border-color:var(--accent)}
.crm-sb-btn{width:100%;background:var(--accent);color:var(--brand);border:none;border-radius:5px;padding:7px;font-size:12px;font-weight:700}
.crm-list{flex:1;overflow-y:auto;border-top:1px solid var(--g100)}
.ci{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--g100);transition:background .12s;position:relative}
.ci:hover{background:var(--g50)}.ci.on{background:#EFF6FF;border-left:3px solid var(--accent)}
.ci-name{font-size:12.5px;font-weight:700;margin-bottom:1px}
.ci-meta{font-size:11px;color:var(--g500)}
.ci-wfid{font-size:9.5px;color:var(--g400);font-family:'JetBrains Mono',monospace;margin-top:1px}
.ci-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.ctag{font-size:9.5px;padding:1px 5px;border-radius:8px;font-weight:700}
.ctag.ok{background:#D1FAE5;color:#065F46}.ctag.exp{background:#FEE2E2;color:#991B1B}
.ctag.new{background:#DBEAFE;color:#1E40AF}.ctag.builder{background:#FEF3C7;color:#92400E}.ctag.vip{background:#EDE9FE;color:#5B21B6}
.crmmain{flex:1;overflow-y:auto;padding:18px;background:#EEF2F7}
/* CRM Redesign */
.crm-layer1{padding:40px 20px;display:flex;flex-direction:column;align-items:center;max-width:1000px;margin:0 auto}
.crm-search-hero{width:100%;max-width:600px;margin-bottom:30px;text-align:center}
.crm-search-hero h2{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--brand)}
.crm-big-search{width:100%;padding:14px 22px;font-size:15px;border:2px solid var(--g200);border-radius:30px;outline:none;transition:border-color .2s;box-shadow:0 4px 12px rgba(0,0,0,.05);font-family:inherit}
.crm-big-search:focus{border-color:var(--accent)}
.crm-site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;width:100%}
.site-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid var(--g200);position:relative}
.site-card:hover{transform:translateY(-3px);box-shadow:0 8px 16px rgba(0,0,0,.08);border-color:var(--accent)}
.site-card .sc-name{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.site-card .sc-addr{font-size:12px;color:var(--g600);margin-bottom:10px;line-height:1.5;min-height:36px}
.site-card .sc-meta{font-size:11px;color:var(--g400);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--g100);padding-top:10px}
.crm-layer2{padding:20px;max-width:1100px;margin:0 auto}
.crm-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1px solid var(--g200);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;color:var(--g700);transition:background .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.crm-back:hover{background:var(--g50)}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.c-ph{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.c-av{width:52px;height:52px;background:linear-gradient(135deg,var(--brand),#1E4080);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;flex-shrink:0}
.c-name{font-size:18px;font-weight:700;margin-bottom:2px}
.c-wfid{font-size:10.5px;color:var(--g400);font-family:'JetBrains Mono',monospace}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iitem label{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
.iitem span{font-size:12.5px}
.ch-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.ch-badge.online{background:#DBEAFE;color:#1E40AF}.ch-badge.offline{background:#D1FAE5;color:#065F46}.ch-badge.builder{background:#FEF3C7;color:#92400E}
.wbar{background:var(--g100);border-radius:3px;height:5px;margin:3px 0}
.wfill{height:100%;border-radius:3px}
.wfill.ok{background:var(--ok)}.wfill.warn{background:var(--warn)}.wfill.bad{background:var(--err)}
.sec-t{font-size:12.5px;font-weight:700;color:var(--g700);margin:0 0 8px;display:flex;align-items:center;gap:5px}
.rcard{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:3px solid var(--g300)}
.rcard.pending{border-color:var(--warn)}.rcard.dispatched{border-color:var(--accent)}.rcard.done{border-color:var(--ok)}.rcard.urgent{border-color:var(--err);background:#FFF8F8}
.rch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.rid{font-size:9.5px;color:var(--g400);font-family:'JetBrains Mono',monospace;margin-top:1px}
.sb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.sb.pending{background:#FEF3C7;color:#92400E}.sb.dispatched{background:#DBEAFE;color:#1E40AF}
.sb.done{background:#D1FAE5;color:#065F46}.sb.urgent{background:#FEE2E2;color:#991B1B}
.rb{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px}
.rb span{color:var(--g500)}.rb strong{color:var(--g800)}
.stars{display:flex;gap:1px;font-size:13px}
.sy{color:#F59E0B}.se{color:var(--g300)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--g400)}
/* Repair admin */
.rapage{padding:18px}
.ra-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ra-hdr h2{font-size:17px;font-weight:700}
.rtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.rtab{padding:6px 13px;border-radius:5px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--g200);background:#fff;white-space:nowrap;transition:all .15s}
.rtab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tc{display:inline-block;color:#fff;font-size:9px;padding:1px 4px;border-radius:6px;margin-left:3px}
.tc.pend{background:var(--warn)}.tc.dis{background:var(--accent)}.tc.done{background:var(--ok)}.tc.urg{background:var(--err)}
.rtable{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.rth{display:grid;grid-template-columns:90px 105px 80px 1fr 65px 115px 95px 60px 110px;background:var(--g700);color:#fff;font-size:10.5px;font-weight:700;padding:9px 12px;gap:0}
.rtr{display:grid;grid-template-columns:90px 105px 80px 1fr 65px 115px 95px 60px 110px;padding:10px 12px;border-bottom:1px solid var(--g100);font-size:11.5px;align-items:center;gap:0;transition:background .1s}
.rtr:hover{background:var(--g50)}
.rtr.urg-row{animation:urgpulse 2s ease-in-out infinite}
@keyframes urgpulse{0%,100%{background:transparent}50%{background:#FFF5F5}}
.cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.dpbtn{padding:3px 9px;background:var(--accent);color:var(--brand);border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer}
.donebtn{padding:3px 9px;background:var(--ok);color:#fff;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer}
.pulse-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--g100);padding:3px 8px;border-radius:8px;color:var(--g500)}
.pdot{width:5px;height:5px;background:var(--ok);border-radius:50%;animation:blink 2s infinite}
.urg-alert{background:#FEE2E2;border:1px solid var(--err);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:center;justify-content:center;padding:16px}
.mob{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mob h3{font-size:15px;font-weight:700;margin-bottom:14px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:11px;color:var(--g500);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.mf input,.mf select{width:100%;border:1px solid var(--g200);border-radius:5px;padding:7px 10px;font-size:12.5px;outline:none;font-family:inherit}
.mf input:focus,.mf select:focus{border-color:var(--accent)}
.mf2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mact button{padding:7px 16px;border-radius:5px;font-size:12.5px;border:none;font-weight:600;cursor:pointer}
.mact .cancel{background:var(--g100);color:var(--g600)}
.mact .confirm{background:var(--accent);color:var(--brand)}
/* Work order (電子工單) */
.wo-sec{margin-bottom:12px}
.wo-sec>label{display:block;font-size:11px;color:var(--g500);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sigpad{border:1px dashed var(--g300);border-radius:6px;width:100%;background:var(--g50);touch-action:none;cursor:crosshair}
.sig-clear{margin-top:4px;padding:3px 10px;background:var(--g100);color:var(--g600);border:none;border-radius:4px;font-size:10.5px;font-weight:600}
.photo-add{display:inline-block;padding:6px 12px;background:#EFF6FF;color:var(--accent);border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer}
.photo-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.thumb{width:54px;height:54px;border-radius:6px;background-size:cover;background-position:center;position:relative;border:1px solid var(--g200)}
.thumb span{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--err);color:#fff;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.charge-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;font-size:12px}
.charge-row .ci-del{color:var(--err);cursor:pointer;font-weight:700}
.charge-add{display:flex;gap:6px;margin-top:5px}
.charge-add input{flex:1;border:1px solid var(--g200);border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.charge-add button{padding:6px 12px;background:var(--g700);color:#fff;border:none;border-radius:5px;font-size:11.5px;font-weight:600}
.wo-total{text-align:right;font-size:13px;font-weight:700;margin-top:6px}
.wo-check{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:6px 8px;border-radius:5px;background:var(--g50);margin-bottom:5px;cursor:pointer}
.wo-check input{width:16px;height:16px}
/* Install module */
.ical{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.icard{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:3px solid var(--g300)}
.icard.pending{border-color:var(--warn)}.icard.arrived{border-color:var(--accent)}.icard.installed{border-color:var(--purple)}.icard.done{border-color:var(--ok)}.icard.failed{border-color:var(--err)}
.istep{display:flex;gap:4px;margin:10px 0}
.istep .dot{flex:1;height:4px;border-radius:2px;background:var(--g200)}
.istep .dot.on{background:var(--accent)}
.iact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.iact button{padding:6px 12px;border:none;border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer}
.iact .primary{background:var(--accent);color:var(--brand)}
.iact .danger{background:#FEE2E2;color:var(--err)}
/* 客訴單 (Complaint Ticket) */
.ct-sec{margin-bottom:16px}
.ct-sec-title{font-size:12px;font-weight:700;color:var(--g600);margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:6px}
.ctcard{background:#fff;border-radius:9px;padding:12px;border-left:3px solid var(--g300);box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:8px;transition:box-shadow .15s}
.ctcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.ctcard.pending{border-color:var(--warn)}.ctcard.following{border-color:var(--purple)}.ctcard.closed{border-color:var(--ok)}
.ct-sb{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.ct-sb.pending{background:#FEF3C7;color:#92400E}
.ct-sb.following{background:#EDE9FE;color:#5B21B6}
.ct-sb.closed{background:#D1FAE5;color:#065F46}
.ct-timeline{margin-top:8px;padding:8px;background:var(--g50);border-radius:6px;border:1px solid var(--g100)}
.ct-tl-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;font-size:11px}
.ct-tl-item:last-child{margin-bottom:0}
.ct-tl-dot{width:7px;height:7px;border-radius:50%;background:var(--g300);flex-shrink:0;margin-top:3px}
.ct-tl-dot.ok{background:var(--ok)}
.ct-tl-time{color:var(--g400);font-size:10px;white-space:nowrap;flex-shrink:0}
.ct-follow-input{width:100%;border:1px dashed var(--g300);border-radius:5px;padding:6px 9px;font-size:11.5px;outline:none;resize:vertical;font-family:inherit;min-height:50px;background:var(--g50)}
.ct-follow-input:focus{border-color:var(--purple);background:#fff}
/* 客訴單列表頁 */
.ctpage{padding:18px 20px;max-width:1200px;margin:0 auto}
.ct-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct-hdr h2{font-size:17px;font-weight:700}
.cttabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--g200);padding-bottom:1px}
.cttab{padding:6px 16px;border:none;background:none;font-size:12px;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:4px}
.cttab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.ct-table{width:100%;border-collapse:collapse;font-size:11.5px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ct-table th{background:var(--g50);padding:8px 12px;text-align:left;font-size:10.5px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--g200)}
.ct-table td{padding:9px 12px;border-bottom:1px solid var(--g100);vertical-align:top}
.ct-table tr:last-child td{border-bottom:none}
.ct-table tr:hover td{background:var(--g50)}
.ct-expand{background:var(--g50);border-bottom:2px solid var(--g200)}
.ct-expand td{padding:12px 16px}
.ct-process-box{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:10px;font-size:12px;color:var(--g700);margin-bottom:8px;line-height:1.6}
.ct-add-follow{display:flex;gap:6px;margin-top:8px}
.ct-add-follow textarea{flex:1;border:1px solid var(--g300);border-radius:5px;padding:7px;font-size:12px;outline:none;resize:vertical;font-family:inherit;min-height:44px}
.ct-add-follow textarea:focus{border-color:var(--purple)}
.ct-close-btn{padding:6px 14px;background:var(--ok);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.ct-follow-btn{padding:6px 14px;background:var(--purple);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
/* 全頁工單 + 排程 */
.fullsheet{position:fixed;inset:0;background:var(--g100);z-index:6000;overflow-y:auto}
.fs-top{position:sticky;top:0;background:var(--brand);color:#fff;display:flex;align-items:center;gap:10px;padding:12px 16px;z-index:2}
.fs-top h3{font-size:15px;font-weight:700}.fs-top .sp{margin-left:auto;display:flex;gap:8px}
.fs-body{max-width:860px;margin:0 auto;padding:16px}
.fs-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.fs-card h4{font-size:13px;font-weight:700;color:var(--g700);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.region-tabs,.wk-list{display:flex;gap:6px;flex-wrap:wrap}
.region-tabs button{padding:7px 16px;border:1px solid var(--g200);border-radius:7px;background:#fff;font-size:13px;font-weight:600;cursor:pointer}
.region-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.wk-chip{padding:8px 12px;border:1px solid var(--g200);border-radius:8px;background:#fff;font-size:12.5px;cursor:pointer;text-align:left}
.wk-chip.on{border-color:var(--accent);background:#EFF6FF}
.wk-chip .t{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}

const EMPTY_DB = {customers:[],repairs:{},complaints:{},installs:{},conversations:[],workers:[],bookings:[],groups:[],projects:[],wfCounter:0,version:0};

async function loadFromSupabase(){
  try{
    const [custsRes,repairsRes,ctRes,installRes,convRes,cfgRes,wkRes,bkRes,grpRes,prjRes] = await Promise.all([
      sb.from('customers').select('*'),
      sb.from('repairs').select('*'),
      sb.from('complaints').select('*'),
      sb.from('installs').select('*'),
      sb.from('conversations').select('*'),
      sb.from('config').select('*'),
      sb.from('workers').select('*'),
      sb.from('bookings').select('*'),
      sb.from('groups').select('*'),
      sb.from('projects').select('*'),
    ]);
    const customers = (custsRes.data||[]).map(dbToCust);
    const repairs = Object.fromEntries((repairsRes.data||[]).map(r=>[r.id,dbToRepair(r)]));
    const complaints = Object.fromEntries((ctRes.data||[]).map(r=>[r.id,dbToCt(r)]));
    const installs = Object.fromEntries((installRes.data||[]).map(r=>[r.id,dbToInstall(r)]));
    const conversations = (convRes.data||[]).map(dbToConv);
    const workers = (wkRes.data||[]).filter(w=>w.active!==false).map(dbToWorker);
    const bookings = (bkRes.data||[]).map(dbToBooking);
    const groups = (grpRes.data||[]).map(dbToGroup);
    const projects = (prjRes.data||[]).map(dbToProject);
    const wfCounter = parseInt((cfgRes.data||[]).find(c=>c.key==='wf_counter')?.value||'0');
    return {customers,repairs,complaints,installs,conversations,workers,bookings,groups,projects,wfCounter,version:0};
  }catch(e){ console.error('loadFromSupabase error:',e); return EMPTY_DB; }
}

async function syncToSupabase(prev,next){
  try{
    const changedCusts=(next.customers||[]).filter(c=>{
      const old=(prev.customers||[]).find(p=>p.wfId===c.wfId);
      return !old||JSON.stringify(old)!==JSON.stringify(c);
    });
    if(changedCusts.length>0) await sb.from('customers').upsert(changedCusts.map(custToDb));
    const changedRepairs=Object.values(next.repairs||{}).filter(r=>{
      const old=(prev.repairs||{})[r.id];
      return !old||JSON.stringify(old)!==JSON.stringify(r);
    });
    if(changedRepairs.length>0) await sb.from('repairs').upsert(changedRepairs.map(repairToDb));
    const changedCts=Object.values(next.complaints||{}).filter(ct=>{
      const old=(prev.complaints||{})[ct.id];
      return !old||JSON.stringify(old)!==JSON.stringify(ct);
    });
    if(changedCts.length>0) await sb.from('complaints').upsert(changedCts.map(ctToDb));
    const changedInstalls=Object.values(next.installs||{}).filter(o=>{
      const old=(prev.installs||{})[o.id];
      return !old||JSON.stringify(old)!==JSON.stringify(o);
    });
    if(changedInstalls.length>0) await sb.from('installs').upsert(changedInstalls.map(installToDb));
    const changedConvs=(next.conversations||[]).filter(c=>{
      const old=(prev.conversations||[]).find(p=>p.id===c.id);
      return !old||JSON.stringify(old)!==JSON.stringify(c);
    });
    if(changedConvs.length>0) await sb.from('conversations').upsert(changedConvs.map(convToDb));
    if(next.wfCounter!==prev.wfCounter){
      await sb.from('config').upsert({key:'wf_counter',value:String(next.wfCounter)});
    }
  }catch(e){ console.error('syncToSupabase error:',e); }
}

// 照片上傳 Supabase Storage（取代 base64 入庫）：回傳 public URL 陣列
async function uploadPhotos(files, folder){
  const urls=[];
  for(const f of files){
    const ext=(f.name?.split('.').pop()||'jpg').toLowerCase();
    const path=`${folder}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const {error}=await sb.storage.from('work-photos').upload(path,f,{contentType:f.type||'image/jpeg',upsert:false});
    if(error){ console.error('uploadPhotos error:',error.message); alert('照片上傳失敗：'+error.message); continue; }
    urls.push(sb.storage.from('work-photos').getPublicUrl(path).data.publicUrl);
  }
  return urls;
}

function SignaturePad({onChange}){
  const ref=useRef(null);
  const drawing=useRef(false);
  const pos=e=>{const c=ref.current,r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{drawing.current=true;const ctx=ref.current.getContext('2d');const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!drawing.current)return;const ctx=ref.current.getContext('2d');const p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#0F2744';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();e.preventDefault();};
  const end=()=>{if(!drawing.current)return;drawing.current=false;onChange(ref.current.toDataURL());};
  const clear=()=>{const c=ref.current;c.getContext('2d').clearRect(0,0,c.width,c.height);onChange(null);};
  return(<div>
    <canvas ref={ref} width={392} height={110} className="sigpad"
      onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
      onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
    <button type="button" className="sig-clear" onClick={clear}>清除簽名</button>
  </div>);
}

function PhotoUpload({photos,setPhotos,folder}){
  const [busy,setBusy]=useState(false);
  const onFiles=async e=>{
    const files=[...e.target.files];
    e.target.value='';
    if(!files.length) return;
    setBusy(true);
    const urls=await uploadPhotos(files,folder||'misc');
    setPhotos(p=>[...p,...urls]);
    setBusy(false);
  };
  return(<div>
    <label className="photo-add">{busy?'⏳ 上傳中…':'📷 上傳照片'}<input type="file" accept="image/*" multiple disabled={busy} style={{display:'none'}} onChange={onFiles}/></label>
    <div className="photo-thumbs">
      {photos.map((src,i)=>(
        <div key={i} className="thumb" style={{backgroundImage:`url(${src})`}}>
          <span onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))}>×</span>
        </div>
      ))}
    </div>
  </div>);
}

  const [note,setNote]=useState('');
  const [auditNote,setAuditNote]=useState('');
  const [chargeRows,setChargeRows]=useState([]);
  const [wj,setWj]=useState(warrantyIn?'in':'out'); // in / out / in_excluded
  const [excl,setExcl]=useState('');
  const [v,setV]=useState({s1:false,s2:false,s3:false});
  const [taught,setTaught]=useState(false);
  const [receiptNo,setReceiptNo]=useState(null);
  const chargeable = wj!=='in';
  const total=chargesTotal(chargeRows);
  const genReceiptNo=()=>{
    const d=new Date();
    const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const rnd=Math.floor(1000+Math.random()*9000);
    return `SR-${ds}-${rnd}`;
  };
  const submit=()=>{
    if(!sig){alert('請完成客戶簽名');return;}
    if(photos.length===0){alert('請至少上傳一張現場照片');return;}
    if(mode==='repair'&&wj==='in_excluded'&&!excl.trim()){alert('「保內但不保固」需填寫原因');return;}
    if(mode==='repair'&&chargeable&&normCharges(chargeRows).length===0){alert('需收費案件請填寫收費品項');return;}
    if(mode==='install'&&!(v.s1&&v.s2&&v.s3)){alert('請完成三項驗收確認');return;}
    if(mode==='install'&&!taught){alert('請確認已完成現場操作教學');return;}
    const rno=genReceiptNo();
    setReceiptNo(rno);
    onSubmit({photos,signature:sig,note,auditNote,charges:normCharges(chargeRows),total,verify:v,taught,receiptNo:rno,warrantyJudgment:wj,excludeReason:excl.trim()});

        <div className="wo-sec"><label>🔎 稽核備註（內部用，不對客戶顯示）</label><textarea value={auditNote} onChange={e=>setAuditNote(e.target.value)} rows={2} style={{width:'100%',border:'1px dashed var(--g300)',borderRadius:5,padding:'7px 10px',fontSize:12,outline:'none',resize:'vertical',fontFamily:'inherit',background:'var(--g50)'}} placeholder="內部稽核說明、異常記錄..."/></div>
        <div className="wo-sec"><label>客戶簽名驗收</label><SignaturePad onChange={setSig}/></div>
        {receiptNo&&<div style={{marginTop:8,padding:'6px 10px',background:'#EFF6FF',borderRadius:6,fontSize:11.5,color:'var(--accent)',fontWeight:700}}>📋 簽收單號：{receiptNo}</div>}

        <div className="mact"><button className="cancel" onClick={onClose}>取消</button><button className="confirm" onClick={submit}>{mode==='install'?'確認驗收 + 保固登錄':'簽收結案'}</button></div>
      </div>
    </div>
  );
}

// ─── 排程時段選擇器（維修 span=1 / 安裝 span=2）───
function SlotPicker({workers,bookings,region,setRegion,workerId,setWorkerId,date,setDate,start,setStart,span}){
  const list = workersByRegion(workers,region);
  const occ = workerId ? occupiedHours(bookings,workerId,date) : new Set();
  const canStart = (h)=>{ for(let i=0;i<span;i++){ if(h+i>21) return false; if(occ.has(h+i)) return false; } return true; };
  return (<>
    <div className="fs-card"><h4>① 區域</h4>
      <div className="region-tabs">{REGIONS.map(([v,l])=>
        <button key={v} className={region===v?'on':''} onClick={()=>{setRegion(v);setWorkerId('');setStart(null);}}>{l}</button>)}</div>
    </div>
    <div className="fs-card"><h4>② 指派師傅（{REGION_LABEL[region]||'—'}）</h4>
      <div className="wk-list">{list.length?list.map(w=>
        <button key={w.id} className={`wk-chip ${workerId===w.id?'on':''}`} onClick={()=>{setWorkerId(w.id);setStart(null);}}>
          {w.name}<span className={`t ${w.type==='internal'?'in':'ex'}`}>{w.type==='internal'?'原廠工務':'配合鎖店'}</span>
        </button>):<div style={{color:'var(--g400)',fontSize:12}}>此區尚無師傅</div>}</div>
    </div>
    <div className="fs-card"><h4>③ 日期 / ④ 時段（{span===2?'安裝佔 2 小時，選起始格':'維修佔 1 小時'}）</h4>
      <input type="date" value={date} onChange={e=>{setDate(e.target.value);setStart(null);}}
        style={{border:'1px solid var(--g200)',borderRadius:6,padding:'7px 10px',fontSize:13}}/>
      {!workerId
        ? <div style={{color:'var(--g400)',fontSize:12,marginTop:8}}>請先選師傅</div>
        : <div className="slotgrid">{SLOT_HOURS.map(h=>{
            const taken=occ.has(h); const ok=canStart(h); const selected=start!=null&&h>=start&&h<start+span;
            return <div key={h}
              className={`slot ${selected?'sel':''} ${taken?'taken':''}`}
              style={(!taken&&!ok)?{opacity:.35,cursor:'not-allowed'}:{}}
              onClick={()=>{ if(ok) setStart(h); }}>{hourLabel(h)}</div>;
          })}</div>}
    </div>
  </>);
}

// ─── 收費品項（數量×單價 + 贈品，二層選單：安裝型號 / 維修品項）───
function ChargeTable({rows,setRows}){
  const total = rows.reduce((s,r)=>s+(r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)),0);
  const upd=(i,k,v)=>setRows(p=>p.map((r,j)=>j===i?{...r,[k]:v}:r));
  const setCat=(i,cat)=>setRows(p=>p.map((r,j)=>j===i?{...r,category:cat,item:''}:r));
  const sel={width:'100%',fontSize:11,border:'1px solid var(--g200)',borderRadius:4,padding:'3px 4px'};
  return (<>
    <table className="ctbl"><thead><tr><th>類別</th><th>品項</th><th>數量</th><th>單價</th><th>小計</th><th>贈品</th><th></th></tr></thead>
    <tbody>{rows.map((r,i)=><tr key={i}>
      <td style={{minWidth:62}}>
        <select value={r.category||''} onChange={e=>setCat(i,e.target.value)} style={sel}>
          <option value="">— 類別 —</option>
          <option value="安裝">安裝</option>
          <option value="維修">維修</option>
        </select>
      </td>
      <td>
        {r.category==='安裝'?(
          <select value={r.item||''} onChange={e=>upd(i,'item',e.target.value)} style={sel}>
            <option value="">— 選型號 —</option>
            {Object.entries(INSTALL_MODELS).map(([series,models])=>(
              <optgroup key={series} label={series}>
                {models.map(m=><option key={m} value={m}>{m}</option>)}
              </optgroup>
            ))}
          </select>
        ):r.category==='維修'?(
          <>
            <select value={CHARGE_PRESETS.includes(r.item)?r.item:''} onChange={e=>e.target.value&&upd(i,'item',e.target.value==='其他'?'':e.target.value)}
              style={{...sel,marginBottom:3}}>
              <option value="">— 選品項 —</option>
              {CHARGE_PRESETS.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <input value={r.item} onChange={e=>upd(i,'item',e.target.value)} placeholder="或手打品項"/>
          </>
        ):(
          <input value={r.item||''} onChange={e=>upd(i,'item',e.target.value)} placeholder="請先選類別" disabled/>
        )}
      </td>
      <td><input className="num" type="number" value={r.qty} onChange={e=>upd(i,'qty',e.target.value)}/></td>
      <td><input className="num" type="number" value={r.gift?0:r.price} disabled={r.gift} onChange={e=>upd(i,'price',e.target.value)}/></td>
      <td>$ {r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)}</td>
      <td style={{textAlign:'center'}}><input type="checkbox" checked={!!r.gift} onChange={e=>upd(i,'gift',e.target.checked)}/></td>
      <td className="del" onClick={()=>setRows(p=>p.filter((_,j)=>j!==i))}>×</td>
    </tr>)}</tbody></table>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
      <button onClick={()=>setRows(p=>[...p,{category:'',item:'',qty:1,price:0,gift:false}])}
        style={{padding:'6px 12px',background:'var(--g100)',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer'}}>＋ 新增品項</button>
      <div style={{fontWeight:700}}>合計 $ {total}</div>
    </div>
  </>);
}
const chargesTotal = rows => rows.reduce((s,r)=>s+(r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)),0);
const normCharges = rows => rows.filter(r=>r.item&&r.item.trim()).map(r=>({item:r.item.trim(),qty:Number(r.qty)||0,price:r.gift?0:(Number(r.price)||0),gift:!!r.gift,amount:r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)}));

// ─── 地址選取畫面（中華郵政風格：縣市→鄉鎮自動帶 3 碼，其餘自行輸入）───
function AddressPicker({initial, onConfirm, onClose}){
  const cities=Object.keys(TW_ZIP3);
  const [city,setCity]=useState(initial?.city||'');
  const [dist,setDist]=useState(initial?.dist||'');
  const [road,setRoad]=useState(initial?.road||''); // 路/街/段/巷/弄
  const [bldg,setBldg]=useState(initial?.bldg||''); // 棟（選填）
  const [no,setNo]=useState(initial?.no||'');        // 號
  const [floor,setFloor]=useState(initial?.floor||'');// 樓
  const [sub,setSub]=useState(initial?.sub||'');      // 之
  const dists=city?Object.keys(TW_ZIP3[city]):[];
  const zip=(city&&dist)?TW_ZIP3[city][dist]:'';
  const tail=[no&&`${no}號`,floor&&`${floor}樓`,sub&&`之${sub}`].filter(Boolean).join('');
  const fullAddr=`${city}${dist}${road}${bldg?` ${bldg}棟`:''}${tail}`;
  const confirm=()=>{
    if(!city||!dist){ alert('請選擇縣市與鄉鎮市區'); return; }
    onConfirm({zip, address:fullAddr, city, dist, road, bldg, no, floor, sub,
      site:bldg, unit:tail});

  return(
    <div className="mo" style={{zIndex:60}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mob" style={{maxWidth:480}}>
        <h3>🔎 選取地址</h3>
        <div className="mf2">
          <div className="mf"><label>縣市 <span style={{color:'var(--err)'}}>*</span></label>
            <select value={city} onChange={e=>{setCity(e.target.value);setDist('');}}>
              <option value="">— 請選擇 —</option>
              {cities.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="mf"><label>鄉鎮市區 <span style={{color:'var(--err)'}}>*</span></label>
            <select value={dist} onChange={e=>setDist(e.target.value)} disabled={!city}>
              <option value="">— 請選擇 —</option>
              {dists.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
        </div>
        {zip&&<div style={{margin:'2px 0 10px',fontSize:12,color:'var(--accent)',fontWeight:700}}>📮 郵遞區號：{zip}</div>}
        <div className="mf"><label>路 / 街 / 段 / 巷 / 弄</label>
          <input value={road} onChange={e=>setRoad(e.target.value)} placeholder="例：安富二街、中山路一段123巷"/>
        </div>
        <div className="mf2">
          <div className="mf"><label>棟（選填）</label><input value={bldg} onChange={e=>setBldg(e.target.value)} placeholder="例：A"/></div>
          <div className="mf"><label>號</label><input value={no} onChange={e=>setNo(e.target.value)} placeholder="例：90"/></div>
        </div>
        <div className="mf2">
          <div className="mf"><label>樓（選填）</label><input value={floor} onChange={e=>setFloor(e.target.value)} placeholder="透天/一樓可空白"/></div>
          <div className="mf"><label>之（選填）</label><input value={sub} onChange={e=>setSub(e.target.value)} placeholder="例：2"/></div>
        </div>
        <div style={{background:'var(--g50)',borderRadius:6,padding:'8px 10px',fontSize:12.5,marginTop:4}}>
          <span style={{color:'var(--g400)'}}>完整地址：</span><strong>{fullAddr||'（請先選縣市/鄉鎮）'}</strong>
        </div>
        <div className="mact"><button className="cancel" onClick={onClose}>取消</button><button className="confirm" onClick={confirm}>確認地址</button></div>
      </div>
    </div>
  );
}

// ─── 統一工單建立表單（安裝 + 維修 一個版本）───
function WorkOrderForm({initialCategory='install', lockedCustomer=null, onClose}){
  const {db,updateDB,toast,currentUser}=useContext(Ctx);
  const lc=lockedCustomer;
  const isInWar=(c)=> !!(c && c.productId && c.installDate && pctW(c.installDate, c.warrantyMonths||36)>0);
  const [f,setF]=useState(()=>({
    category:initialCategory, category2:'',
    name:lc?.name||'', phone:lc?.phone||'', address:lc?.address||'', zip:'',
    tenantType:'owner', landlordConfirmed:false, sourceChannel:'', communityNote:'',
    site:lc?.site||'', unit:lc?.unit||'', qty:1, workHours:initialCategory==='install'?2:1,
    timeRange:'', scheduledDate:'', hiRisk:false, hardJob:false, bomber:false, note:'',
    channel:lc?.channel||'lock_shop', productId:lc?.productId||'L376', serialNo:'', locksmithId:'S1',
    groupId:lc?.groupId||'', projectId:lc?.projectId||'',
    type:'電子鎖', issue:'', space:'大門', urgency:'normal',
    handlingUnit:(lc&&isInWar(lc))?'原廠工務':'配合鎖店', desc:'',
  }));
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const cat=f.category;
  const workers=db.workers||[];
  const [chargeRows,setChargeRows]=useState([]);
  // 品項表「安裝」列選型號時自動回填 productId（供保固計算用）
  React.useEffect(()=>{
    const row=chargeRows.find(r=>r.category==='安裝'&&r.item);
    if(row) setF(p=>({...p,productId:row.item.split('/')[0]}));
  },[chargeRows]);
  const [addrPicker,setAddrPicker]=useState(false);
  const [schedOpen,setSchedOpen]=useState(false);
  const [region,setRegion]=useState('central');
  const [sw,setSw]=useState('');
  const [sd,setSd]=useState(todayISO());
  const [start,setStart]=useState(null);
  const span=Math.max(1,Math.ceil(Number(f.workHours)||(cat==='install'?2:1)));
  const noteWithFlags=()=>[f.note,f.hiRisk?'⚠️高風險維修':'',f.hardJob?'困難施工':'',f.bomber?'💣轟炸戶':''].filter(Boolean).join(' / ');

  const submit=async()=>{
    if(!f.name.trim()){ toast('請填客戶姓名','','warn'); return; }
    if(!f.address.trim()){ toast('請填地址','請用「選取地址」選擇縣市/鄉鎮','warn'); return; }
    if(f.tenantType==='tenant'&&!f.landlordConfirmed){ toast('租客需房東確認','請先勾選已取得房東確認','warn'); return; }
    if(schedOpen&&(!sw||start==null)){ toast('排程未完成','請選師傅與時段，或收合排程','warn'); return; }
    const common={
      tenantType:f.tenantType, landlordConfirmed:f.landlordConfirmed,
      sourceChannel:f.sourceChannel, communityNote:f.communityNote, zip:f.zip,
      category2:f.category2, timeRange:f.timeRange, qty:Number(f.qty)||1,
      workHours:Number(f.workHours)||null, flagBomber:f.bomber,
      site:f.site, unit:f.unit, note:noteWithFlags(),
      charges:normCharges(chargeRows), chargeTotal:chargesTotal(chargeRows),
    };
    if(cat==='install') await submitInstall(common); else await submitRepair(common);
  };

  // 建單時若有開排程並選好師傅/時段：先佔格（衝突則中止），回傳排程欄位
  const tryBook=async(refType,id)=>{
    if(!(schedOpen&&sw&&start!=null)) return {ok:true,fields:{}};
    const ok=await bookSlots(sw,sd,start,span,refType,id);
    if(!ok){ toast('時段衝突','該師傅此時段已被佔用，請改時段','err'); return {ok:false}; }
    return {ok:true,fields:{workerId:sw,schedDate:sd,schedStart:start,schedSpan:span,
      scheduledDate:`${sd} ${String(start).padStart(2,'0')}:00-${String(start+span).padStart(2,'0')}:00`}};
  };

  const submitInstall=async(common)=>{
    const id='IW'+Date.now();
    const bk=await tryBook('install',id); if(!bk.ok) return;
    const key=custKey(f.name,f.address);
    const exist=(db.customers||[]).find(c=>custKey(c.name,c.address)===key);
    const wfId=exist?exist.wfId:'WF'+String(Date.now()).slice(-8);
    const isNew=!exist;
    updateDB(prev=>{
      let customers=prev.customers||[];
      if(isNew) customers=[...customers,{wfId,name:f.name.trim(),phone:f.phone.trim(),address:f.address,zip:f.zip,channel:f.channel,
        groupId:f.groupId||null,projectId:f.projectId||null,
        productId:f.productId,serialNo:f.serialNo,regType:'auto',regDate:today(),
        installDate:null,warrantyMonths:null,warrantyEnd:null,tags:['待安裝'],repairIds:[],complaintIds:[]}];
      else if(f.groupId) customers=customers.map(c=>c.wfId===wfId?{...c,groupId:f.groupId,projectId:f.projectId||c.projectId}:c);
      const order=pushHist({id,name:f.name.trim(),phone:f.phone.trim(),address:f.address,channel:f.channel,
        productId:f.productId,serialNo:f.serialNo,locksmithId:f.locksmithId,wfId,scheduledDate:f.scheduledDate,
        status:'pending',createdDate:today(),createdTs:Date.now(),arrivalPushed:false,...common,...bk.fields},
        currentUser?.name,'建立安裝工單'+(bk.fields.workerId?'＋排程':''));
      return {...prev,customers,installs:{...prev.installs,[id]:order}};
    });
    toast('📋 安裝工單已建立',isNew?`${f.name}｜已建立客編 ${wfId}`:`${f.name}｜歸入既有客編 ${wfId}`,'ok');
    onClose();
  };

  const submitRepair=async(common)=>{
    if(!f.issue.trim()){ toast('請填問題描述','問題描述不可空白','warn'); return; }
    const rid=(await sb.rpc('next_case_no',{p_prefix:'R'})).data || ('R-'+Date.now());
    const bk=await tryBook('repair',rid); if(!bk.ok) return;
    const key=custKey(f.name,f.address);
    const exist=lc || (db.customers||[]).find(c=>custKey(c.name,c.address)===key);
    const wfId=exist?exist.wfId:'WF'+String(Date.now()).slice(-8);
    const isNew=!exist;
    const wIn2=exist?isInWar(exist):false;
    const newRepair=pushHist({id:rid,wfId,name:f.name,phone:f.phone,
      district:exist?.district||'',area:exist?.area||'',building:f.address,date:today(),
      type:f.type,issue:f.issue.trim(),space:f.space,status:bk.fields.workerId?'dispatched':'pending',urgency:f.urgency,workerId:null,
      scheduledDate:f.scheduledDate,desc:f.desc,contactName:f.name,contactPhone:f.phone,
      handlingUnit:f.handlingUnit,warrantyIn:wIn2,createdBy:currentUser?.name||'CRM 客服',
      createdAt:today()+' '+now(),unread:false,arrivalPushed:false,rating:null,receiptNo:null,
      auditNote:'',slaLevel:f.hiRisk?'high':'normal',...common,...bk.fields},currentUser?.name,'建立報修工單'+(bk.fields.workerId?'＋排程':''));
    const uid=exist?.lineUid;
    const pushTxt=`📋 已收到您的報修\n\n案件：${rid}\n問題：${f.type} - ${f.issue.trim()||'異常問題'}\n客服將盡快安排師傅 🔧`;
    updateDB(prev=>{
      let customers=prev.customers||[];
      if(isNew) customers=[...customers,{wfId,name:f.name.trim(),phone:f.phone.trim(),address:f.address,zip:f.zip,
        regType:'manual',regDate:today(),tags:['待整理'],repairIds:[rid],complaintIds:[]}];
      else customers=customers.map(x=>x.wfId===wfId?{...x,repairIds:[...(x.repairIds||[]),rid]}:x);
      const convs=(prev.conversations||[]).map(cv=>(uid&&cv.id===uid)
        ?{...cv,msgs:[...(cv.msgs||[]),{id:'p'+Date.now(),from:'bot',text:pushTxt,time:now()}],lastMsg:'已建立報修單',lastTime:now()}:cv);
      return {...prev,repairs:{...prev.repairs,[rid]:newRepair},customers,conversations:convs};
    });
    pushLineTo(uid,pushTxt);
    toast('📋 已立案',`${f.name} 報修單 ${rid} 已建立${isNew?'（新客編 '+wfId+'）':''}`,'ok');
    onClose();
  };

  const subcats=WORK_CATEGORIES[cat]||[];
  return(
    <div className="mo" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mob" style={{maxWidth:560,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <h3 style={{marginBottom:10,flexShrink:0}}>🧾 新增工單</h3>
        <div style={{flex:1,overflowY:'auto',minHeight:0}}>

        {/* 工單類別（安裝 / 維修） */}
        <div className="mf"><label>工單類別</label>
          <div style={{display:'flex',gap:6}}>
            {[['install','🛠️ 安裝工單'],['repair','🔧 維修工單']].map(([k,l])=>(
              <button key={k} onClick={()=>setF(p=>({...p,category:k,category2:'',workHours:k==='install'?2:1}))}
                style={{flex:1,padding:'8px',borderRadius:6,border:`1px solid ${cat===k?'var(--brand)':'var(--g200)'}`,
                  background:cat===k?'var(--brand)':'#fff',color:cat===k?'#fff':'var(--g600)',
                  fontSize:12.5,fontWeight:700,cursor:'pointer',opacity:1}}>{l}</button>
            ))}
          </div>
        </div>
        <div className="mf"><label>類別細項</label>
          <select value={f.category2} onChange={e=>set('category2',e.target.value)}>
            <option value="">— 請選擇 —</option>
            {subcats.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>

        {/* 客戶 + 地址 + 區號 */}
        {lc&&<div style={{background:'var(--g50)',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:12}}>
          <div style={{fontWeight:700,fontSize:13}}>{lc.name}　<span style={{fontFamily:'JetBrains Mono',fontSize:10,color:'var(--g400)'}}>{lc.wfId}</span></div>
          <div style={{color:'var(--g500)'}}>{lc.address||'—'}</div>
        </div>}
        {!lc&&<>
          <div className="mf2">
            <div className="mf"><label>客戶姓名 <span style={{color:'var(--err)'}}>*</span></label><input value={f.name} onChange={e=>set('name',e.target.value)}/></div>
            <div className="mf"><label>電話</label><input value={f.phone} onChange={e=>set('phone',e.target.value)}/></div>
          </div>
          <div className="mf"><label>地址 <span style={{color:'var(--err)'}}>*</span></label>
            <div style={{display:'flex',gap:6,alignItems:'stretch'}}>

            <input type="checkbox" checked={f.landlordConfirmed} onChange={e=>set('landlordConfirmed',e.target.checked)}/>

          </label>
        )}
        <div className="mf"><label>社區特殊需求</label>
          <input value={f.communityNote} onChange={e=>set('communityNote',e.target.value)} placeholder="例：需門禁卡、施工時段限制、社區報備..."/>
        </div>

        {/* 安裝專屬 */}
        {cat==='install'&&<>
          <div className="mf"><label>購買通路</label><select value={f.channel} onChange={e=>{set('channel',e.target.value);if(e.target.value!=='builder'){set('groupId','');set('projectId','');}}}>{Object.entries(CHANNELS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
          {f.channel==='builder'&&(
            <div className="mf2">
              <div className="mf"><label>所屬集團</label>
                <select value={f.groupId||''} onChange={e=>{set('groupId',e.target.value);set('projectId','');}}>
                  <option value="">— 選集團 —</option>
                  {(db.groups||[]).map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
              </div>
              <div className="mf"><label>所屬建案</label>
                <select value={f.projectId||''} onChange={e=>set('projectId',e.target.value)} disabled={!f.groupId}>
                  <option value="">— 選建案 —</option>
                  {(db.projects||[]).filter(p=>p.groupId===f.groupId).map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
                </select>
              </div>
            </div>
          )}
          <div className="mf2">
            <div className="mf"><label>產品序號</label><input value={f.serialNo} onChange={e=>set('serialNo',e.target.value)}/></div>
            <div className="mf"><label>指派鎖店師傅</label><select value={f.locksmithId} onChange={e=>set('locksmithId',e.target.value)}>{LOCKSMITHS.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select></div>
          </div>
        </>}

        {/* 維修專屬 */}
        {cat==='repair'&&<>
          <div className="mf2">
            <div className="mf"><label>問題類別</label>
              <select value={f.type} onChange={e=>set('type',e.target.value)}>{['電子鎖','水電工程','廚具設備','弱電工程','油漆工程'].map(v=><option key={v}>{v}</option>)}</select>
            </div>
            <div className="mf"><label>修繕空間</label>
              <select value={f.space} onChange={e=>set('space',e.target.value)}>{['大門','客廳','臥室','廚房','前陽台','後陽台','其他'].map(v=><option key={v}>{v}</option>)}</select>
            </div>
          </div>
          <div className="mf"><label>問題描述 <span style={{color:'var(--err)'}}>*</span></label>
            <input value={f.issue} onChange={e=>set('issue',e.target.value)} placeholder="例：耗電過快、按鍵失靈、無法開鎖"/>
          </div>
          <div className="mf2">
            <div className="mf"><label>緊急度</label>
              <select value={f.urgency} onChange={e=>set('urgency',e.target.value)}><option value="normal">⬜ 一般</option><option value="urgent">🚨 緊急</option></select>
            </div>
            <div className="mf"><label>處理單位</label>
              <select value={f.handlingUnit} onChange={e=>set('handlingUnit',e.target.value)}><option>原廠工務</option><option>配合鎖店</option></select>
            </div>
          </div>
        </>}

        {/* 台數 / 工時 */}
        <div className="mf2">
          <div className="mf"><label>台數</label><input type="number" min="1" value={f.qty} onChange={e=>set('qty',e.target.value)}/></div>
          <div className="mf"><label>預估工時（小時）</label><input type="number" step="0.5" min="0.5" value={f.workHours} onChange={e=>set('workHours',e.target.value)}/></div>
        </div>

        <button type="button" onClick={()=>setSchedOpen(o=>!o)}
          style={{margin:'2px 0 8px',padding:'6px 12px',background:schedOpen?'var(--brand)':'#EDE9FE',color:schedOpen?'#fff':'#5B21B6',border:'none',borderRadius:6,fontSize:12,fontWeight:700,cursor:'pointer'}}>
          📅 {schedOpen?'收合排程畫面':'開啟排程畫面（直接派師傅/時段）'}
        </button>
        {schedOpen&&(
          <div style={{border:'1px solid var(--g200)',borderRadius:8,padding:10,marginBottom:10}}>
            <SlotPicker workers={workers} bookings={db.bookings} region={region} setRegion={setRegion}
              workerId={sw} setWorkerId={setSw} date={sd} setDate={setSd} start={start} setStart={setStart} span={span}/>
            <div style={{background:'var(--g50)',borderRadius:6,padding:8,fontSize:11.5,color:'var(--g500)',marginTop:8}}>
              本單預估工時 {f.workHours||span} 小時 → 佔 {span} 格；建立工單時一併佔用該師傅時段（未選則僅建單、之後再排）。
            </div>
          </div>
        )}

        {/* 風險旗標 */}
        <div className="mf"><label>風險旗標</label>
          <div style={{display:'flex',gap:14,flexWrap:'wrap',fontSize:12}}>
            <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={f.hiRisk} onChange={e=>set('hiRisk',e.target.checked)}/>⚠️ 高風險維修</label>
            <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={f.hardJob} onChange={e=>set('hardJob',e.target.checked)}/>🔧 困難施工</label>
            <label style={{display:'flex',alignItems:'center',gap:5,cursor:'pointer'}}><input type="checkbox" checked={f.bomber} onChange={e=>set('bomber',e.target.checked)}/>💣 轟炸戶</label>
          </div>
        </div>

        <div className="mf"><label>備註</label>
          <textarea value={f.note} onChange={e=>set('note',e.target.value)} rows={2}
            style={{width:'100%',border:'1px solid var(--g200)',borderRadius:5,padding:'7px 10px',fontSize:12,outline:'none',resize:'vertical',fontFamily:'inherit'}}
            placeholder="團購優惠、聯絡資訊、特殊說明..."/>
        </div>

        {/* 購買 / 收費品項（金流依據） */}
        <div className="mf"><label>🛒 購買 / 收費品項（品名 × 數量 × 金額）</label>
          <ChargeTable rows={chargeRows} setRows={setChargeRows}/>
        </div>

        </div>{/* end scrollable area */}

        <div className="mact" style={{flexShrink:0,borderTop:'1px solid var(--g100)',paddingTop:12,marginTop:0}}><button className="cancel" onClick={onClose}>取消</button><button className="confirm" onClick={submit}>建立工單</button></div>

        {addrPicker&&<AddressPicker
          initial={{city:f.addrCity,dist:f.addrDist,road:f.addrRoad,bldg:f.site}}
          onClose={()=>setAddrPicker(false)}
          onConfirm={(a)=>{ setF(p=>({...p,zip:a.zip,address:a.address,site:a.site,unit:a.unit,addrCity:a.city,addrDist:a.dist,addrRoad:a.road})); setAddrPicker(false); }}/>}
      </div>
    </div>
  );
}

// ─── CRM Page ───
function CRMPage(){
  const {db,updateDB,toast,newIds,crmTarget,setCrmTarget,setPage,currentUser,highlightedOrderId,setHighlightedOrderId} = useContext(Ctx);
  const [q,setQ] = useState('');
  const [res,setRes] = useState(null);
  const [sel,setSel] = useState(null);
  const [caseModal,setCaseModal] = useState(false);
  const [editModal,setEditModal] = useState(false);
  const [editForm,setEditForm] = useState(null);
  const [ctModal,setCtModal] = useState(false);
  const [ctForm,setCtForm] = useState({callChannel:CALL_CHANNELS[0],department:COMPLAINT_DEPARTMENTS[0],cat1:'',cat2:'',cat3:'',process:'',status:'pending'});
  const [expandedCt,setExpandedCt] = useState(null); // 客訴展開
  const [followText,setFollowText] = useState('');
  const [followingCtId,setFollowingCtId] = useState(null);
  const [projModal,setProjModal] = useState(false);
  const [projForm,setProjForm] = useState({groupId:'',projectId:''}); // 歸屬建案
  const [editAddrPicker,setEditAddrPicker] = useState(false);
  // 維修派工 + 結案
  const [dispatchRepair,setDispatchRepair] = useState(null);
  const [closingRepair,setClosingRepair] = useState(null);
  // 安裝排程 + 驗收
  const [schedInstall,setSchedInstall] = useState(null);
  const [verifyInstall,setVerifyInstall] = useState(null);
  // 共用 SlotPicker 狀態
  const [dispRegion,setDispRegion] = useState('central');
  const [dispSw,setDispSw] = useState('');
  const [dispSd,setDispSd] = useState(todayISO());
  const [dispStart,setDispStart] = useState(null);
  const [dispChargeRows,setDispChargeRows] = useState([]);
  const [dispHiRisk,setDispHiRisk] = useState(false);
  const [dispHardJob,setDispHardJob] = useState(false);
  const [dispBomber,setDispBomber] = useState(false);
  const hlRef = useRef(null);

  const customers = db.customers||[];
  // 只有搜尋後才顯示結果清單
  const list = res!==null ? res : [];


  useEffect(()=>{
    if(newIds.length>0){
      const newest = customers.find(c=>newIds.includes(c.wfId));
      if(newest) setSel(newest);
    }
  },[newIds.join(',')]);

  // Keep sel in sync with DB
  useEffect(()=>{
    if(sel){ const updated=customers.find(c=>c.wfId===sel.wfId); if(updated) setSel(updated); }
  },[db.version]);

  // 首頁搜尋跳轉：自動選定指定客戶並開啟完整詳情頁
  // 依賴 customers，確保新建客戶同步進來後能找到
  useEffect(()=>{
    if(crmTarget){
      const c=customers.find(x=>x.wfId===crmTarget);
      if(c){ setSel(c); setQ(''); setRes(null); setCrmTarget(null); window.history.replaceState(null,'',location.pathname+location.search+'#crm/'+c.wfId); }
      // 找不到時保留 crmTarget，等 customers 更新後再觸發
    }
  },[crmTarget,customers]);

  // 高亮工單卡片：自動捲動，3 秒後取消高亮
  useEffect(()=>{
    if(!highlightedOrderId||!hlRef.current) return;
    hlRef.current.scrollIntoView({behavior:'smooth',block:'center'});
    const t=setTimeout(()=>setHighlightedOrderId(null),3000);
    return ()=>clearTimeout(t);
  },[highlightedOrderId,sel]);

  // 案件專屬網址：開啟維修/安裝排程畫面時，網址自動反映該案件（可直接從網址列複製分享）；
  // 關閉排程後還原成客戶網址。分享出去的 #repair/#install 連結由 App 的 hash 解析定位＋高亮。
  useEffect(()=>{
    const base=location.pathname+location.search;
    if(dispatchRepair) window.history.replaceState(null,'',base+'#repair/'+dispatchRepair.id);
    else if(schedInstall) window.history.replaceState(null,'',base+'#install/'+schedInstall.id);
    else if(sel) window.history.replaceState(null,'',base+'#crm/'+sel.wfId);
  },[dispatchRepair,schedInstall,sel]);

  const doSearch=()=>{
    const lq=q.trim().toLowerCase();
    if(!lq){ setRes(null); return; }
    setRes(customers.filter(c=>
      (c.name||'').includes(lq)||(c.phone||'').includes(lq)||
      (c.wfId||'').toLowerCase().includes(lq)||(c.serialNo||'').toLowerCase().includes(lq)
    ));
  };

  const stars = n=>[1,2,3,4,5].map(i=><span key={i} className={i<=Math.round(n||0)?'sy':'se'}>★</span>);
  const getRepairs = c=>(c.repairIds||[]).map(rid=>db.repairs?.[rid]).filter(Boolean);

  const isInWarranty=(c)=> !!(c && c.productId && c.installDate && pctW(c.installDate, c.warrantyMonths||36)>0);

  const openCase=(c)=>{ setCaseModal(true); };

  const lineUidByPhone=phone=>(db.customers||[]).find(x=>x.phone===phone&&x.lineUid)?.lineUid;

  // ── 維修派工 ──
  const openRepairDispatch=r=>{
    setDispatchRepair(r);
    setDispSw(''); setDispStart(null); setDispChargeRows([]);
    setDispRegion('central'); setDispSd(todayISO());
    setDispHiRisk(false); setDispHardJob(false); setDispBomber(!!r.flagBomber);
  };
  const doRepairDispatch=async()=>{
    if(!dispatchRepair) return;
    if(!dispSw){ toast('請選擇師傅','先選區域與師傅','warn'); return; }
    if(dispStart==null){ toast('請選擇時段','點一個未佔用的時段','warn'); return; }
    const workers=db.workers||[];
    const w=workers.find(x=>x.id===dispSw)||WORKERS.find(x=>x.id===dispSw);
    const span=Math.max(1,Math.ceil(Number(dispatchRepair.workHours)||1));
    const ok=await bookSlots(dispSw,dispSd,dispStart,span,'repair',dispatchRepair.id);
    if(!ok){ toast('時段衝突','該師傅此時段已被預約，請改其他時段','err'); return; }
    const cu=(db.customers||[]).find(c=>c.wfId===dispatchRepair.wfId);
    const uid=cu?.lineUid;
    const charges=normCharges(dispChargeRows); const ctotal=chargesTotal(dispChargeRows);
    const slotTxt=`${dispSd} ${String(dispStart).padStart(2,'0')}:00-${String(dispStart+span).padStart(2,'0')}:00`;
    const pushMsg={id:'p'+Date.now(),from:'bot',
      text:`🚗 派工通知\n\n師傅：${w?.name}\n預約：${slotTxt}\n師傅出發前將再次通知 📱`,time:now()};
    updateDB(prev=>{
      const cur=prev.repairs[dispatchRepair.id];
      const nr={...prev.repairs,[dispatchRepair.id]:pushHist({...cur,status:'dispatched',workerId:dispSw,scheduledDate:slotTxt,
        schedDate:dispSd,schedStart:dispStart,schedSpan:span,arrivalPushed:true,charges,chargeTotal:ctotal,
        slaLevel:dispHiRisk?'high':cur.slaLevel,flagBomber:dispBomber,
        note:[cur.note,dispHiRisk?'⚠️高風險維修':'',dispHardJob?'困難施工':'',dispBomber?'💣轟炸戶':''].filter(Boolean).join(' / ')},currentUser?.name,`派工：${w?.name}｜${slotTxt}`)};
      const nc=(prev.conversations||[]).map(c=>(uid&&c.id===uid)
        ?{...c,msgs:[...(c.msgs||[]),pushMsg],lastMsg:'師傅通知已送出',lastTime:now()}:c);
      return {...prev,repairs:nr,conversations:nc};
    });
    pushLineTo(uid, pushMsg.text);
    toast('🚗 派工完成',`${w?.name}｜${slotTxt}${uid?'，已推播住戶':'（客戶未綁定 LINE）'}`,'ok');
    setDispatchRepair(null);
  };
  const finishRepairClose=(r,d)=>{
    const chargeLine=(d.charges&&d.charges.length)?`\n費用：$${d.total}`:'\n本次維修免費（保固內）';
    const wkName=(db.workers||[]).find(w=>w.id===r.workerId)?.name||WORKERS.find(w=>w.id===r.workerId)?.name||'—';
    const closeMsg={id:'p'+Date.now(),from:'bot',time:now(),
      text:`✅ 維修完成結案\n\n案件：${r.id}\n問題：${r.type} — ${r.issue}${chargeLine}\n師傅：${wkName}\n簽收單號：${d.receiptNo}\n\n感謝您的使用 🙏 期待再為您服務\n⭐ 歡迎為本次服務評分`};
    const ccu=(db.customers||[]).find(c=>c.wfId===r.wfId);
    const cuid=ccu?.lineUid;
    updateDB(prev=>({...prev,
      repairs:{...prev.repairs,[r.id]:pushHist({...prev.repairs[r.id],
        status:'done',photos:d.photos,signature:d.signature,
        charges:d.charges,chargeTotal:d.total,workNote:d.note,
        warrantyJudgment:d.warrantyJudgment,excludeReason:d.excludeReason,
        auditNote:d.auditNote||'',receiptNo:d.receiptNo,
        completedDate:today()},currentUser?.name,`完工結案｜簽收單號 ${d.receiptNo}`)},
      conversations:(prev.conversations||[]).map(c=>(cuid&&c.id===cuid)
        ?{...c,msgs:[...(c.msgs||[]),closeMsg],lastMsg:'維修完成結案',lastTime:now()}:c)
    }));
    pushLineTo(cuid, closeMsg.text);
    toast('✅ 已結案',`電子工單已簽收，簽收單號 ${d.receiptNo}`,'ok');
    setTimeout(()=>toast('📨 CSAT 已推播','滿意度問卷已發送住戶','ok'),1500);
    setClosingRepair(null);
  };

  // ── 安裝排程 ──
  const openInstallSchedule=o=>{
    setSchedInstall(o); setDispRegion('central'); setDispSw(''); setDispSd(todayISO()); setDispStart(null);
  };
  const doInstallSchedule=async()=>{
    if(!dispSw){ toast('請選擇師傅','先選區域與師傅','warn'); return; }
    if(dispStart==null){ toast('請選擇時段','安裝佔 2 小時，選未佔用的起始格','warn'); return; }
    const workers=db.workers||[];
    const w=workers.find(x=>x.id===dispSw)||WORKERS.find(x=>x.id===dispSw);
    const span=Math.max(1,Math.ceil(Number(schedInstall.workHours)||2));
    await releaseSlots(schedInstall.id);
    const ok=await bookSlots(dispSw,dispSd,dispStart,span,'install',schedInstall.id);
    if(!ok){ toast('時段衝突',`該師傅此 ${span} 小時已被佔用，請改時段`,'err'); return; }
    const slotTxt=`${dispSd} ${String(dispStart).padStart(2,'0')}:00-${String(dispStart+span).padStart(2,'0')}:00`;
    updateDB(prev=>{
      let next={...prev.installs[schedInstall.id],workerId:dispSw,schedDate:dispSd,schedStart:dispStart,schedSpan:span};
      next=pushHist(next,currentUser?.name,`排程：${w?.name}｜${slotTxt}`);
      return {...prev,installs:{...prev.installs,[schedInstall.id]:next}};
    });
    const uid=lineUidByPhone(schedInstall.phone);
    if(uid) pushLineTo(uid,`📅 安裝預約已排定\n\n師傅：${w?.name}\n時間：${slotTxt}\n當日出發前將再通知您 📱`);
    toast('📅 已排程',`${w?.name}｜${slotTxt}`,'ok');
    setSchedInstall(null);
  };

  // ── 安裝狀態推進 ──
  const arriveInstall=o=>{
    const uid=lineUidByPhone(o.phone);
    updateDB(prev=>{
      let next={...prev.installs[o.id],status:'arrived',arrivalPushed:!!uid};
      next=pushHist(next,currentUser?.name,'標記到場');
      return {...prev,installs:{...prev.installs,[o.id]:next}};
    });
    if(uid) pushLineTo(uid,`🚪 安裝通知\n\n您預約的安裝師傅已抵達現場，即將開始安裝。`);
    toast(uid?'📱 已推播':'📍 已標記到場',uid?'「師傅已抵達」通知已送達住戶 LINE':'客戶尚未綁定 LINE，未發送推播',uid?'ok':'warn');
  };
  const installedDone=o=>{
    updateDB(prev=>{
      let next={...prev.installs[o.id],status:'installed'};
      next=pushHist(next,currentUser?.name,'施工完成（待驗收）');
      return {...prev,installs:{...prev.installs,[o.id]:next}};
    });
    toast('🔧 施工完成','請進行完工驗收','ok');
  };
  const failInstall=o=>{
    updateDB(prev=>{
      let next={...prev.installs[o.id],status:'failed'};
      next=pushHist(next,currentUser?.name,'標記無法安裝');
      return {...prev,installs:{...prev.installs,[o.id]:next}};
    });
    toast('❌ 無法安裝','已回報客服（退款 / 換型號）','err');
  };
  const finishInstallVerify=(o,d)=>{
    const months=PRODUCTS[o.productId]?.warranty||36;
    const warrantyEnd=addMonthsStr(months);
    let wfId=o.wfId;
    updateDB(prev=>{
      let customers=prev.customers||[];
      if(wfId&&customers.some(c=>c.wfId===wfId)){
        customers=customers.map(c=>c.wfId!==wfId?c:{...c,
          name:o.name,phone:o.phone,address:o.address||c.address,channel:o.channel||c.channel,
          productId:o.productId,serialNo:o.serialNo,installDate:today(),warrantyMonths:months,warrantyEnd,
          tags:[...new Set([...(c.tags||[]).filter(t=>t!=='待安裝'),'保固中'])]});
      }
      return {...prev,
        installs:{...prev.installs,[o.id]:pushHist({...prev.installs[o.id],status:'done',photos:d.photos,signature:d.signature,verify:d.verify,taught:d.taught,workNote:d.note,completedDate:today(),wfId,warrantyEnd},currentUser?.name,`完工驗收｜保固至 ${warrantyEnd}`)},
        customers};
    });
    const uid=lineUidByPhone(o.phone);
    if(uid) pushLineTo(uid,`✅ 安裝完成\n\n您的 ${PRODUCTS[o.productId]?.name||'門鎖'} 已安裝驗收完成，保固自今日起算至 ${warrantyEnd}。感謝您的使用 🙏`);
    toast('✅ 安裝完成','保固開始計算（安裝日起算）','ok');
    setTimeout(()=>toast('🎉 客編保固已更新',`${o.name} 保固至 ${warrantyEnd}`,'ok'),1400);
    setVerifyInstall(null);
  };

  const openComplaint=(c)=>{
    setCtForm({callChannel:CALL_CHANNELS[0],department:COMPLAINT_DEPARTMENTS[0],cat1:'',cat2:'',cat3:'',process:'',status:'pending'});
    setCtModal(true);
  };

  const createComplaint=async()=>{
    const c=customers.find(x=>x.wfId===sel?.wfId);
    if(!c){ toast('請先選擇客戶','','warn'); return; }
    if(!ctForm.cat1){ toast('請選擇判斷原因1','主類不可空白','warn'); return; }
    const cid=(await sb.rpc('next_case_no',{p_prefix:'C'})).data || ('CT-'+Date.now());
    const ts=today()+' '+now();
    const newCt={
      id:cid, wfId:c.wfId, name:c.name, phone:c.phone,
      date:today(), createdAt:ts, createdBy:currentUser?.name||'CRM 客服',
      callChannel:ctForm.callChannel, department:ctForm.department,
      cat1:ctForm.cat1, cat2:ctForm.cat2, cat3:ctForm.cat3,
      process:ctForm.process,
      status:ctForm.status,
      closedDate:ctForm.status==='closed'?today():null,
      timeline:[{ts,note:'客訴單建立'+(ctForm.process?`，處理過程：${ctForm.process}`:'')}],
    };
    updateDB(prev=>{
      const custs=(prev.customers||[]).map(x=>x.wfId===c.wfId
        ?{...x,complaintIds:[...(x.complaintIds||[]),cid]}:x);
      return {...prev,complaints:{...(prev.complaints||{}),[cid]:newCt},customers:custs};
    });
    toast('📞 客訴建立',`${c.name} 客訴單 ${cid} 已建立`,'ok');
    setCtModal(false);
  };

  const addFollowup=(ctId,note)=>{
    if(!note.trim()) return;
    const ts=today()+' '+now();
    updateDB(prev=>{
      const ct=prev.complaints?.[ctId];
      if(!ct) return prev;
      const updated={...ct,
        status: ct.status==='pending'?'following':ct.status,
        timeline:[...(ct.timeline||[]),{ts,by:currentUser?.name,note:note.trim()}],
      };
      return {...prev,complaints:{...(prev.complaints||{}),[ctId]:updated}};
    });
    toast('🖊️ 追蹤備註已新增','','ok');
    setFollowText('');
    setFollowingCtId(null);
  };

  const closeComplaint=(ctId)=>{
    const ts=today()+' '+now();
    updateDB(prev=>{
      const ct=prev.complaints?.[ctId];
      if(!ct) return prev;
      return {...prev,complaints:{...(prev.complaints||{}),[ctId]:{
        ...ct,status:'closed',closedDate:today(),
        timeline:[...(ct.timeline||[]),{ts,by:currentUser?.name,note:'結案'}],
      }}};
    });
    toast('✅ 客訴已結案','','ok');
  };

  const toInputDate=(s)=>{ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return ''; const d2=new Date(d.getTime()-d.getTimezoneOffset()*60000); return d2.toISOString().slice(0,10); };
  const computeEnd=(install,months)=>{ if(!install||!months) return null; const d=new Date(install); if(isNaN(d)) return null; d.setMonth(d.getMonth()+Number(months)); return d.toLocaleDateString('zh-TW'); };

  const openEdit=(c)=>{
    setEditForm({name:c.name||'',phone:c.phone||'',email:c.email||'',zip:c.zip||'',
      address:(c.address&&c.address!=='待填寫')?c.address:'',channel:c.channel||'',
      groupId:c.groupId||'',projectId:c.projectId||'',
      productId:c.productId||'',serialNo:c.serialNo||'',installDate:toInputDate(c.installDate),
      warrantyMonths:c.warrantyMonths||''});
    setEditModal(true);
  };

  const saveEdit=()=>{
    const wf=sel?.wfId; if(!wf||!editForm) return;
    const months = editForm.warrantyMonths ? Number(editForm.warrantyMonths)
      : (editForm.productId ? (PRODUCTS[editForm.productId]?.warranty||null) : null);
    const installLocale = editForm.installDate ? new Date(editForm.installDate).toLocaleDateString('zh-TW') : null;
    const warrantyEnd = (installLocale && months) ? computeEnd(editForm.installDate, months) : null;
    updateDB(prev=>({...prev,customers:(prev.customers||[]).map(c=>{
      if(c.wfId!==wf) return c;
      let tags=(c.tags||[]).filter(t=>!['待安裝','保固中','保固已到期'].includes(t));
      if(months&&warrantyEnd){ tags.push(new Date(warrantyEnd)>new Date()?'保固中':'保固已到期'); }
      else { tags.push('待安裝'); }
      return {...c, name:editForm.name||c.name, phone:editForm.phone, email:editForm.email, zip:editForm.zip||c.zip,
        address:editForm.address||'待填寫', channel:editForm.channel||'',
        groupId:editForm.groupId||null, projectId:editForm.projectId||null,
        productId:editForm.productId||null, serialNo:editForm.serialNo||'',
        installDate:installLocale, warrantyMonths:months, warrantyEnd, tags};
    })}));
    toast('✅ 已更新','客戶資料已儲存，保固查詢將帶到新資料','ok');
    setEditModal(false);
  };

  // ── MD 5：把客戶歸屬到 集團/建案（寫 groupId/projectId）──
  const openProj=(c)=>{ setProjForm({groupId:c.groupId||'',projectId:c.projectId||''}); setProjModal(true); };
  const saveProj=()=>{
    const wf=sel?.wfId; if(!wf) return;
    const g=projForm.groupId||null, pj=projForm.projectId||null;
    updateDB(prev=>({...prev,customers:(prev.customers||[]).map(c=>{
      if(c.wfId!==wf) return c;
      let tags=(c.tags||[]);
      if(pj && !tags.includes('建案客戶')) tags=[...tags,'建案客戶'];
      return {...c, groupId:g, projectId:pj, tags};
    })}));
    const pjName=(db.projects||[]).find(p=>p.id===pj)?.name;
    toast('🏢 已歸屬',pj?`已歸屬至建案「${pjName}」`:'已清除建案歸屬','ok');
    setProjModal(false);
  };

    if(crmTarget) return null; // 跳轉中，等 effect 選定客戶
    return (

        <div style={{fontSize:32}}>🔍</div>
        <div style={{fontSize:14,fontWeight:600}}>請從首頁搜尋客戶後進入完整資料</div>
        <button onClick={()=>setPage('home')} style={{padding:'8px 18px',background:'var(--brand)',color:'#fff',border:'none',borderRadius:7,fontSize:13,fontWeight:700,cursor:'pointer'}}>← 回首頁查詢</button>
      </div>
    );
  }

  // Layer 2: Detail
  const cur = customers.find(c=>c.wfId===sel.wfId)||sel;
  const p = pctW(cur.installDate, cur.warrantyMonths||36);
  const ch = CHANNELS[cur.channel];
  const repairs = getRepairs(cur);
  const STEPLABEL={pending:'待到場',arrived:'已到場',installed:'待驗收',done:'已完成',failed:'無法安裝'};
  const curInstalls=Object.values(db.installs||{}).filter(o=>o.wfId===cur.wfId).sort((a,b)=>(b.createdTs||0)-(a.createdTs||0));

  return(
    <div className="crm-layer2" style={{position:'relative',zIndex:1}}>
      <Watermark text={currentUser?.name}/>
      <button className="crm-back" onClick={()=>{setSel(null);setPage('home');}}>← 返回首頁</button>
      
      <div className="card">
                <div className="c-ph">
                  <div className="c-av">{(cur.name||'?')[0]}</div>
                  <div style={{flex:1}}>
                    <div className="c-name">{cur.name}</div>
                    <div className="c-wfid">{cur.wfId}</div>
                    <div style={{display:'flex',gap:3,marginTop:4,flexWrap:'wrap'}}>
                      {(cur.tags||[]).map(t=><span key={t} className={`ctag ${t==='保固中'?'ok':t==='保固已到期'?'exp':t==='新客'?'new':t==='建案客戶'?'builder':'vip'}`}>{t}</span>)}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:5,flexShrink:0,flexWrap:'wrap'}}>
                    <button style={{padding:'5px 11px',background:'#EFF6FF',color:'var(--accent)',border:'none',borderRadius:5,fontSize:11,fontWeight:700,cursor:'pointer'}} onClick={()=>openEdit(cur)}>編輯資料</button>
