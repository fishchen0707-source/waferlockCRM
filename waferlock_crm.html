<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAFERLOCK CRM 客戶資料</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0F2744;--accent:#38BDF8;--ok:#10B981;--warn:#F59E0B;--err:#EF4444;--purple:#8B5CF6;
  --w:#fff;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g600:#475569;--g700:#334155;--g800:#1E293B;
}
body{font-family:'Noto Sans TC',sans-serif;background:#EEF2F7;color:var(--g800);min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:2px}
.nav{position:fixed;top:0;left:0;right:0;height:48px;background:var(--brand);z-index:999;display:flex;align-items:center;padding:0 14px;gap:4px}
.nav-logo{color:#fff;font-weight:700;font-size:13px;margin-right:10px;display:flex;align-items:center;gap:6px}
.nav-logo span{background:var(--accent);color:var(--brand);font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px}
.nbtn{padding:5px 12px;border-radius:5px;font-size:11.5px;font-weight:500;border:none;color:rgba(255,255,255,.65);background:transparent;transition:all .15s}
.nbtn.on{background:var(--accent);color:var(--brand);font-weight:700}
.nbtn:hover:not(.on){background:rgba(255,255,255,.1);color:#fff}
.nbadge{background:var(--err);color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;margin-left:3px}
.sync-area{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5)}
.sdot{width:6px;height:6px;border-radius:50%}
.sdot.live{background:var(--ok);animation:blink 2s infinite}
.sdot.off{background:var(--g400)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.page{padding-top:48px;min-height:100vh}
.toasts{position:fixed;top:56px;right:12px;z-index:9999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:#fff;border-radius:8px;padding:9px 13px;box-shadow:0 4px 12px rgba(0,0,0,.15);border-left:3px solid var(--accent);min-width:210px;font-size:12px;animation:tin .25s ease}
.toast.ok{border-color:var(--ok)}.toast.err{border-color:var(--err)}.toast.warn{border-color:var(--warn)}
.toast-t{font-weight:700;font-size:12.5px;margin-bottom:1px}
@keyframes tin{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes newglow{0%,100%{box-shadow:none}50%{box-shadow:0 0 0 3px rgba(16,185,129,.4)}}
.new-glow{animation:newglow 1s ease 4}
.new-badge{position:absolute;top:7px;right:7px;background:var(--ok);color:#fff;font-size:8px;font-weight:800;padding:1px 5px;border-radius:8px;animation:blink .8s infinite}
/* CRM */
.crmlayout{display:flex;height:calc(100vh - 48px)}
.crmsb{width:270px;background:#fff;border-right:1px solid var(--g200);display:flex;flex-direction:column;flex-shrink:0}
.crm-sa{padding:12px}
.crm-sa h3{font-size:13.5px;font-weight:700;margin-bottom:8px}
.crm-si{width:100%;border:1px solid var(--g200);border-radius:5px;padding:7px 10px;font-size:12px;outline:none;margin-bottom:5px;font-family:inherit}
.crm-si:focus{border-color:var(--accent)}
.crm-sb-btn{width:100%;background:var(--accent);color:var(--brand);border:none;border-radius:5px;padding:7px;font-size:12px;font-weight:700}
.crm-list{flex:1;overflow-y:auto;border-top:1px solid var(--g100)}
.ci{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--g100);transition:background .12s;position:relative}
.ci:hover{background:var(--g50)}.ci.on{background:#EFF6FF;border-left:3px solid var(--accent)}
.ci-name{font-size:12.5px;font-weight:700;margin-bottom:1px}
.ci-meta{font-size:11px;color:var(--g500)}
.ci-wfid{font-size:9.5px;color:var(--g400);font-family:'JetBrains Mono',monospace;margin-top:1px}
.ci-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.ctag{font-size:9.5px;padding:1px 5px;border-radius:8px;font-weight:700}
.ctag.ok{background:#D1FAE5;color:#065F46}.ctag.exp{background:#FEE2E2;color:#991B1B}
.ctag.new{background:#DBEAFE;color:#1E40AF}.ctag.builder{background:#FEF3C7;color:#92400E}.ctag.vip{background:#EDE9FE;color:#5B21B6}
.crmmain{flex:1;overflow-y:auto;padding:18px;background:#EEF2F7}
/* CRM Redesign */
.crm-layer1{padding:40px 20px;display:flex;flex-direction:column;align-items:center;max-width:1000px;margin:0 auto}
.crm-search-hero{width:100%;max-width:600px;margin-bottom:30px;text-align:center}
.crm-search-hero h2{font-size:22px;font-weight:700;margin-bottom:16px;color:var(--brand)}
.crm-big-search{width:100%;padding:14px 22px;font-size:15px;border:2px solid var(--g200);border-radius:30px;outline:none;transition:border-color .2s;box-shadow:0 4px 12px rgba(0,0,0,.05);font-family:inherit}
.crm-big-search:focus{border-color:var(--accent)}
.crm-site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;width:100%}
.site-card{background:#fff;border-radius:12px;padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid var(--g200);position:relative}
.site-card:hover{transform:translateY(-3px);box-shadow:0 8px 16px rgba(0,0,0,.08);border-color:var(--accent)}
.site-card .sc-name{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.site-card .sc-addr{font-size:12px;color:var(--g600);margin-bottom:10px;line-height:1.5;min-height:36px}
.site-card .sc-meta{font-size:11px;color:var(--g400);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--g100);padding-top:10px}
.crm-layer2{padding:20px;max-width:1100px;margin:0 auto}
.crm-back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:#fff;border:1px solid var(--g200);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;color:var(--g700);transition:background .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.crm-back:hover{background:var(--g50)}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.c-ph{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.c-av{width:52px;height:52px;background:linear-gradient(135deg,var(--brand),#1E4080);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;flex-shrink:0}
.c-name{font-size:18px;font-weight:700;margin-bottom:2px}
.c-wfid{font-size:10.5px;color:var(--g400);font-family:'JetBrains Mono',monospace}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.iitem label{font-size:10px;color:var(--g400);font-weight:700;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:2px}
.iitem span{font-size:12.5px}
.ch-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:10.5px;font-weight:700}
.ch-badge.online{background:#DBEAFE;color:#1E40AF}.ch-badge.offline{background:#D1FAE5;color:#065F46}.ch-badge.builder{background:#FEF3C7;color:#92400E}
.wbar{background:var(--g100);border-radius:3px;height:5px;margin:3px 0}
.wfill{height:100%;border-radius:3px}
.wfill.ok{background:var(--ok)}.wfill.warn{background:var(--warn)}.wfill.bad{background:var(--err)}
.sec-t{font-size:12.5px;font-weight:700;color:var(--g700);margin:0 0 8px;display:flex;align-items:center;gap:5px}
.rcard{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:3px solid var(--g300)}
.rcard.pending{border-color:var(--warn)}.rcard.dispatched{border-color:var(--accent)}.rcard.done{border-color:var(--ok)}.rcard.urgent{border-color:var(--err);background:#FFF8F8}
.rch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px}
.rid{font-size:9.5px;color:var(--g400);font-family:'JetBrains Mono',monospace;margin-top:1px}
.sb{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px}
.sb.pending{background:#FEF3C7;color:#92400E}.sb.dispatched{background:#DBEAFE;color:#1E40AF}
.sb.done{background:#D1FAE5;color:#065F46}.sb.urgent{background:#FEE2E2;color:#991B1B}
.rb{display:grid;grid-template-columns:1fr 1fr;gap:5px;font-size:11px}
.rb span{color:var(--g500)}.rb strong{color:var(--g800)}
.stars{display:flex;gap:1px;font-size:13px}
.sy{color:#F59E0B}.se{color:var(--g300)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--g400)}
/* Repair admin */
.rapage{padding:18px}
.ra-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ra-hdr h2{font-size:17px;font-weight:700}
.rtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.rtab{padding:6px 13px;border-radius:5px;font-size:11.5px;font-weight:600;cursor:pointer;border:1px solid var(--g200);background:#fff;white-space:nowrap;transition:all .15s}
.rtab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.tc{display:inline-block;color:#fff;font-size:9px;padding:1px 4px;border-radius:6px;margin-left:3px}
.tc.pend{background:var(--warn)}.tc.dis{background:var(--accent)}.tc.done{background:var(--ok)}.tc.urg{background:var(--err)}
.rtable{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.rth{display:grid;grid-template-columns:90px 105px 80px 1fr 65px 115px 95px 60px 110px;background:var(--g700);color:#fff;font-size:10.5px;font-weight:700;padding:9px 12px;gap:0}
.rtr{display:grid;grid-template-columns:90px 105px 80px 1fr 65px 115px 95px 60px 110px;padding:10px 12px;border-bottom:1px solid var(--g100);font-size:11.5px;align-items:center;gap:0;transition:background .1s}
.rtr:hover{background:var(--g50)}
.rtr.urg-row{animation:urgpulse 2s ease-in-out infinite}
@keyframes urgpulse{0%,100%{background:transparent}50%{background:#FFF5F5}}
.cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px}
.dpbtn{padding:3px 9px;background:var(--accent);color:var(--brand);border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer}
.donebtn{padding:3px 9px;background:var(--ok);color:#fff;border:none;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer}
.pulse-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:var(--g100);padding:3px 8px;border-radius:8px;color:var(--g500)}
.pdot{width:5px;height:5px;background:var(--ok);border-radius:50%;animation:blink 2s infinite}
.urg-alert{background:#FEE2E2;border:1px solid var(--err);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:center;justify-content:center;padding:16px}
.mob{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.mob h3{font-size:15px;font-weight:700;margin-bottom:14px}
.mf{margin-bottom:10px}
.mf label{display:block;font-size:11px;color:var(--g500);font-weight:600;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.mf input,.mf select{width:100%;border:1px solid var(--g200);border-radius:5px;padding:7px 10px;font-size:12.5px;outline:none;font-family:inherit}
.mf input:focus,.mf select:focus{border-color:var(--accent)}
.mf2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mact{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mact button{padding:7px 16px;border-radius:5px;font-size:12.5px;border:none;font-weight:600;cursor:pointer}
.mact .cancel{background:var(--g100);color:var(--g600)}
.mact .confirm{background:var(--accent);color:var(--brand)}
/* Work order (電子工單) */
.wo-sec{margin-bottom:12px}
.wo-sec>label{display:block;font-size:11px;color:var(--g500);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.sigpad{border:1px dashed var(--g300);border-radius:6px;width:100%;background:var(--g50);touch-action:none;cursor:crosshair}
.sig-clear{margin-top:4px;padding:3px 10px;background:var(--g100);color:var(--g600);border:none;border-radius:4px;font-size:10.5px;font-weight:600}
.photo-add{display:inline-block;padding:6px 12px;background:#EFF6FF;color:var(--accent);border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer}
.photo-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.thumb{width:54px;height:54px;border-radius:6px;background-size:cover;background-position:center;position:relative;border:1px solid var(--g200)}
.thumb span{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:var(--err);color:#fff;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.charge-row{display:flex;gap:6px;align-items:center;margin-bottom:5px;font-size:12px}
.charge-row .ci-del{color:var(--err);cursor:pointer;font-weight:700}
.charge-add{display:flex;gap:6px;margin-top:5px}
.charge-add input{flex:1;border:1px solid var(--g200);border-radius:5px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.charge-add button{padding:6px 12px;background:var(--g700);color:#fff;border:none;border-radius:5px;font-size:11.5px;font-weight:600}
.wo-total{text-align:right;font-size:13px;font-weight:700;margin-top:6px}
.wo-check{display:flex;align-items:center;gap:7px;font-size:12.5px;padding:6px 8px;border-radius:5px;background:var(--g50);margin-bottom:5px;cursor:pointer}
.wo-check input{width:16px;height:16px}
/* Install module */
.ical{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.icard{background:#fff;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:3px solid var(--g300)}
.icard.pending{border-color:var(--warn)}.icard.arrived{border-color:var(--accent)}.icard.installed{border-color:var(--purple)}.icard.done{border-color:var(--ok)}.icard.failed{border-color:var(--err)}
.istep{display:flex;gap:4px;margin:10px 0}
.istep .dot{flex:1;height:4px;border-radius:2px;background:var(--g200)}
.istep .dot.on{background:var(--accent)}
.iact{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.iact button{padding:6px 12px;border:none;border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer}
.iact .primary{background:var(--accent);color:var(--brand)}
.iact .danger{background:#FEE2E2;color:var(--err)}
/* 客訴單 (Complaint Ticket) */
.ct-sec{margin-bottom:16px}
.ct-sec-title{font-size:12px;font-weight:700;color:var(--g600);margin-bottom:8px;padding:6px 0;border-bottom:1px solid var(--g200);display:flex;align-items:center;gap:6px}
.ctcard{background:#fff;border-radius:9px;padding:12px;border-left:3px solid var(--g300);box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:8px;transition:box-shadow .15s}
.ctcard:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
.ctcard.pending{border-color:var(--warn)}.ctcard.following{border-color:var(--purple)}.ctcard.closed{border-color:var(--ok)}
.ct-sb{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.ct-sb.pending{background:#FEF3C7;color:#92400E}
.ct-sb.following{background:#EDE9FE;color:#5B21B6}
.ct-sb.closed{background:#D1FAE5;color:#065F46}
.ct-timeline{margin-top:8px;padding:8px;background:var(--g50);border-radius:6px;border:1px solid var(--g100)}
.ct-tl-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;font-size:11px}
.ct-tl-item:last-child{margin-bottom:0}
.ct-tl-dot{width:7px;height:7px;border-radius:50%;background:var(--g300);flex-shrink:0;margin-top:3px}
.ct-tl-dot.ok{background:var(--ok)}
.ct-tl-time{color:var(--g400);font-size:10px;white-space:nowrap;flex-shrink:0}
.ct-follow-input{width:100%;border:1px dashed var(--g300);border-radius:5px;padding:6px 9px;font-size:11.5px;outline:none;resize:vertical;font-family:inherit;min-height:50px;background:var(--g50)}
.ct-follow-input:focus{border-color:var(--purple);background:#fff}
/* 客訴單列表頁 */
.ctpage{padding:18px 20px;max-width:1200px;margin:0 auto}
.ct-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ct-hdr h2{font-size:17px;font-weight:700}
.cttabs{display:flex;gap:4px;margin-bottom:12px;border-bottom:1px solid var(--g200);padding-bottom:1px}
.cttab{padding:6px 16px;border:none;background:none;font-size:12px;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:4px}
.cttab.on{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.ct-table{width:100%;border-collapse:collapse;font-size:11.5px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ct-table th{background:var(--g50);padding:8px 12px;text-align:left;font-size:10.5px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--g200)}
.ct-table td{padding:9px 12px;border-bottom:1px solid var(--g100);vertical-align:top}
.ct-table tr:last-child td{border-bottom:none}
.ct-table tr:hover td{background:var(--g50)}
.ct-expand{background:var(--g50);border-bottom:2px solid var(--g200)}
.ct-expand td{padding:12px 16px}
.ct-process-box{background:#fff;border:1px solid var(--g200);border-radius:6px;padding:10px;font-size:12px;color:var(--g700);margin-bottom:8px;line-height:1.6}
.ct-add-follow{display:flex;gap:6px;margin-top:8px}
.ct-add-follow textarea{flex:1;border:1px solid var(--g300);border-radius:5px;padding:7px;font-size:12px;outline:none;resize:vertical;font-family:inherit;min-height:44px}
.ct-add-follow textarea:focus{border-color:var(--purple)}
.ct-close-btn{padding:6px 14px;background:var(--ok);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.ct-follow-btn{padding:6px 14px;background:var(--purple);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
/* 全頁工單 + 排程 */
.fullsheet{position:fixed;inset:0;background:var(--g100);z-index:6000;overflow-y:auto}
.fs-top{position:sticky;top:0;background:var(--brand);color:#fff;display:flex;align-items:center;gap:10px;padding:12px 16px;z-index:2}
.fs-top h3{font-size:15px;font-weight:700}.fs-top .sp{margin-left:auto;display:flex;gap:8px}
.fs-body{max-width:860px;margin:0 auto;padding:16px}
.fs-card{background:#fff;border-radius:10px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.fs-card h4{font-size:13px;font-weight:700;color:var(--g700);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.region-tabs,.wk-list{display:flex;gap:6px;flex-wrap:wrap}
.region-tabs button{padding:7px 16px;border:1px solid var(--g200);border-radius:7px;background:#fff;font-size:13px;font-weight:600;cursor:pointer}
.region-tabs button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.wk-chip{padding:8px 12px;border:1px solid var(--g200);border-radius:8px;background:#fff;font-size:12.5px;cursor:pointer;text-align:left}
.wk-chip.on{border-color:var(--accent);background:#EFF6FF}
.wk-chip .t{font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}

const EMPTY_DB = {customers:[],repairs:{},complaints:{},installs:{},conversations:[],workers:[],bookings:[],wfCounter:0,version:0};

async function loadFromSupabase(){
  try{
    const [custsRes,repairsRes,ctRes,installRes,convRes,cfgRes,wkRes,bkRes] = await Promise.all([
      sb.from('customers').select('*'),
      sb.from('repairs').select('*'),
      sb.from('complaints').select('*'),
      sb.from('installs').select('*'),
      sb.from('conversations').select('*'),
      sb.from('config').select('*'),
      sb.from('workers').select('*'),
      sb.from('bookings').select('*'),
    ]);
    const customers = (custsRes.data||[]).map(dbToCust);
    const repairs = Object.fromEntries((repairsRes.data||[]).map(r=>[r.id,dbToRepair(r)]));
    const complaints = Object.fromEntries((ctRes.data||[]).map(r=>[r.id,dbToCt(r)]));
    const installs = Object.fromEntries((installRes.data||[]).map(r=>[r.id,dbToInstall(r)]));
    const conversations = (convRes.data||[]).map(dbToConv);
    const workers = (wkRes.data||[]).filter(w=>w.active!==false).map(dbToWorker);
    const bookings = (bkRes.data||[]).map(dbToBooking);
    const wfCounter = parseInt((cfgRes.data||[]).find(c=>c.key==='wf_counter')?.value||'0');
    return {customers,repairs,complaints,installs,conversations,workers,bookings,wfCounter,version:0};
  }catch(e){ console.error('loadFromSupabase error:',e); return EMPTY_DB; }
}

async function syncToSupabase(prev,next){
  try{
    const changedCusts=(next.customers||[]).filter(c=>{
      const old=(prev.customers||[]).find(p=>p.wfId===c.wfId);
      return !old||JSON.stringify(old)!==JSON.stringify(c);
    });
    if(changedCusts.length>0) await sb.from('customers').upsert(changedCusts.map(custToDb));
    const changedRepairs=Object.values(next.repairs||{}).filter(r=>{
      const old=(prev.repairs||{})[r.id];
      return !old||JSON.stringify(old)!==JSON.stringify(r);
    });
    if(changedRepairs.length>0) await sb.from('repairs').upsert(changedRepairs.map(repairToDb));
    const changedCts=Object.values(next.complaints||{}).filter(ct=>{
      const old=(prev.complaints||{})[ct.id];
      return !old||JSON.stringify(old)!==JSON.stringify(ct);
    });
    if(changedCts.length>0) await sb.from('complaints').upsert(changedCts.map(ctToDb));
    const changedInstalls=Object.values(next.installs||{}).filter(o=>{
      const old=(prev.installs||{})[o.id];
      return !old||JSON.stringify(old)!==JSON.stringify(o);
    });
    if(changedInstalls.length>0) await sb.from('installs').upsert(changedInstalls.map(installToDb));
    const changedConvs=(next.conversations||[]).filter(c=>{
      const old=(prev.conversations||[]).find(p=>p.id===c.id);
      return !old||JSON.stringify(old)!==JSON.stringify(c);
    });
    if(changedConvs.length>0) await sb.from('conversations').upsert(changedConvs.map(convToDb));
    if(next.wfCounter!==prev.wfCounter){
      await sb.from('config').upsert({key:'wf_counter',value:String(next.wfCounter)});
    }
  }catch(e){ console.error('syncToSupabase error:',e); }
}

function SignaturePad({onChange}){
  const ref=useRef(null);
  const drawing=useRef(false);
  const pos=e=>{const c=ref.current,r=c.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
  const start=e=>{drawing.current=true;const ctx=ref.current.getContext('2d');const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const move=e=>{if(!drawing.current)return;const ctx=ref.current.getContext('2d');const p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#0F2744';ctx.lineWidth=2;ctx.lineCap='round';ctx.stroke();e.preventDefault();};
  const end=()=>{if(!drawing.current)return;drawing.current=false;onChange(ref.current.toDataURL());};
  const clear=()=>{const c=ref.current;c.getContext('2d').clearRect(0,0,c.width,c.height);onChange(null);};
  return(<div>
    <canvas ref={ref} width={392} height={110} className="sigpad"
      onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
      onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
    <button type="button" className="sig-clear" onClick={clear}>清除簽名</button>
  </div>);
}

function PhotoUpload({photos,setPhotos}){
  const onFiles=e=>{
    const files=[...e.target.files];
    Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);})))
      .then(imgs=>setPhotos(p=>[...p,...imgs]));
    e.target.value='';
  };
  return(<div>
    <label className="photo-add">📷 上傳照片<input type="file" accept="image/*" multiple style={{display:'none'}} onChange={onFiles}/></label>
    <div className="photo-thumbs">
      {photos.map((src,i)=>(
        <div key={i} className="thumb" style={{backgroundImage:`url(${src})`}}>
          <span onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))}>×</span>
        </div>
      ))}
    </div>
  </div>);
}

// ─── 排程時段選擇器（維修 span=1 / 安裝 span=2）───
function SlotPicker({workers,bookings,region,setRegion,workerId,setWorkerId,date,setDate,start,setStart,span}){
  const list = workersByRegion(workers,region);
  const occ = workerId ? occupiedHours(bookings,workerId,date) : new Set();
  const canStart = (h)=>{ for(let i=0;i<span;i++){ if(h+i>21) return false; if(occ.has(h+i)) return false; } return true; };
  return (<>
    <div className="fs-card"><h4>① 區域</h4>
      <div className="region-tabs">{REGIONS.map(([v,l])=>
        <button key={v} className={region===v?'on':''} onClick={()=>{setRegion(v);setWorkerId('');setStart(null);}}>{l}</button>)}</div>
    </div>
    <div className="fs-card"><h4>② 指派師傅（{REGION_LABEL[region]||'—'}）</h4>
      <div className="wk-list">{list.length?list.map(w=>
        <button key={w.id} className={`wk-chip ${workerId===w.id?'on':''}`} onClick={()=>{setWorkerId(w.id);setStart(null);}}>
          {w.name}<span className={`t ${w.type==='internal'?'in':'ex'}`}>{w.type==='internal'?'原廠工務':'配合鎖店'}</span>
        </button>):<div style={{color:'var(--g400)',fontSize:12}}>此區尚無師傅</div>}</div>
    </div>
    <div className="fs-card"><h4>③ 日期 / ④ 時段（{span===2?'安裝佔 2 小時，選起始格':'維修佔 1 小時'}）</h4>
      <input type="date" value={date} onChange={e=>{setDate(e.target.value);setStart(null);}}
        style={{border:'1px solid var(--g200)',borderRadius:6,padding:'7px 10px',fontSize:13}}/>
      {!workerId
        ? <div style={{color:'var(--g400)',fontSize:12,marginTop:8}}>請先選師傅</div>
        : <div className="slotgrid">{SLOT_HOURS.map(h=>{
            const taken=occ.has(h); const ok=canStart(h); const selected=start!=null&&h>=start&&h<start+span;
            return <div key={h}
              className={`slot ${selected?'sel':''} ${taken?'taken':''}`}
              style={(!taken&&!ok)?{opacity:.35,cursor:'not-allowed'}:{}}
              onClick={()=>{ if(ok) setStart(h); }}>{hourLabel(h)}</div>;
          })}</div>}
    </div>
  </>);
}

// ─── 收費品項（數量×單價 + 贈品）───
function ChargeTable({rows,setRows}){
  const total = rows.reduce((s,r)=>s+(r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)),0);
  const upd=(i,k,v)=>setRows(p=>p.map((r,j)=>j===i?{...r,[k]:v}:r));
  return (<>
    <table className="ctbl"><thead><tr><th>品項</th><th>數量</th><th>單價</th><th>小計</th><th>贈品</th><th></th></tr></thead>
    <tbody>{rows.map((r,i)=><tr key={i}>
      <td><input value={r.item} onChange={e=>upd(i,'item',e.target.value)} placeholder="如：更換鋰電池"/></td>
      <td><input className="num" type="number" value={r.qty} onChange={e=>upd(i,'qty',e.target.value)}/></td>
      <td><input className="num" type="number" value={r.gift?0:r.price} disabled={r.gift} onChange={e=>upd(i,'price',e.target.value)}/></td>
      <td>$ {r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)}</td>
      <td style={{textAlign:'center'}}><input type="checkbox" checked={!!r.gift} onChange={e=>upd(i,'gift',e.target.checked)}/></td>
      <td className="del" onClick={()=>setRows(p=>p.filter((_,j)=>j!==i))}>×</td>
    </tr>)}</tbody></table>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
      <button onClick={()=>setRows(p=>[...p,{item:'',qty:1,price:0,gift:false}])}
        style={{padding:'6px 12px',background:'var(--g100)',border:'none',borderRadius:6,fontSize:12,fontWeight:600,cursor:'pointer'}}>＋ 新增品項</button>
      <div style={{fontWeight:700}}>合計 $ {total}</div>
    </div>
  </>);
}
const chargesTotal = rows => rows.reduce((s,r)=>s+(r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)),0);
const normCharges = rows => rows.filter(r=>r.item&&r.item.trim()).map(r=>({item:r.item.trim(),qty:Number(r.qty)||0,price:r.gift?0:(Number(r.price)||0),gift:!!r.gift,amount:r.gift?0:(Number(r.qty)||0)*(Number(r.price)||0)}));

// ─── Repair Admin Page ───
function RepairPage(){
  const {db,updateDB,toast,currentUser} = useContext(Ctx);

  const [region,setRegion] = useState('central');

  const [chargeRows,setChargeRows] = useState([]);

  const [hardJob,setHardJob] = useState(false);
  const [tick,setTick] = useState(0);
  const [closing,setClosing] = useState(null);
  const workers = db.workers||[];

  useEffect(()=>{const t=setInterval(()=>setTick(p=>p+1),30000);return()=>clearInterval(t);},[]);

  const all = Object.values(db.repairs||{});

    all:all.length,
    pending:all.filter(r=>r.status==='pending').length,
    dispatched:all.filter(r=>r.status==='dispatched').length,
    done:all.filter(r=>r.status==='done').length,
    urgent:all.filter(r=>r.urgency==='urgent'&&r.status!=='done').length,

  const list = all.filter(r=>{

    return r.status===tab;

  const openDispatch=(r)=>{ setDisp(r); setSw(''); setStart(null); setChargeRows([]); setRegion('central'); setSd(todayISO()); setHiRisk(false); setHardJob(false); };

    if(!disp) return;
    if(!sw){ toast('請選擇師傅','先選區域與師傅','warn'); return; }
    if(start==null){ toast('請選擇時段','點一個未佔用的時段','warn'); return; }

    const uid=cu?.lineUid;

    updateDB(prev=>{
      const cur=prev.repairs[disp.id];
      const nr={...prev.repairs,[disp.id]:pushHist({...cur,status:'dispatched',workerId:sw,scheduledDate:slotTxt,
        schedDate:sd,schedStart:start,schedSpan:1,arrivalPushed:true,charges,chargeTotal:ctotal,
        slaLevel:hiRisk?'high':cur.slaLevel,
        note:[cur.note,hiRisk?'⚠️高風險維修':'',hardJob?'困難施工':''].filter(Boolean).join(' / ')},currentUser?.name,`派工：${w?.name}｜${slotTxt}`)};
      const nc=(prev.conversations||[]).map(c=>(uid&&c.id===uid)

      return {...prev,repairs:nr,conversations:nc};

        </div>
      </div>

      {cnt.urgent>0&&(
        <div className="urg-alert">
          <span style={{fontSize:18}}>🚨</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,color:'var(--err)',fontSize:13}}>{cnt.urgent} 件緊急案件待處理</div>
            <div style={{fontSize:11.5,color:'#7F1D1D'}}>請立即點選「緊急案件」分頁</div>
          </div>

      <div className="rtabs">

        {list.map(r=>(

            <div className="cell" style={{fontSize:10.5}}>

      {disp&&(

          <div className="fs-top">
            <h3>{disp.urgency==='urgent'?'🚨 緊急派工工單':'🚗 派工工單'}　<span style={{fontFamily:'monospace',fontWeight:400,fontSize:12}}>{disp.id}</span></h3>
            <div className="sp">
              <button className="cancel" style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer'}} onClick={()=>setDisp(null)}>取消</button>
              <button className="confirm" style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer'}} onClick={doDispatch}>確認派工 + 推播</button>

            <div className="fs-card"><h4>施工註記</h4>

// ─── 安裝工單 Page ───
function InstallPage(){
  const {db,updateDB,toast,currentUser}=useContext(Ctx);
  const [creating,setCreating]=useState(false);
  const [verifying,setVerifying]=useState(null);
  const [f,setF]=useState({name:'',phone:'',address:'',channel:'lock_shop',productId:'L376',serialNo:'',locksmithId:'S1'});
  const [sched,setSched]=useState(null);
  const [region,setRegion]=useState('central');
  const [sw,setSw]=useState('');
  const [sd,setSd]=useState(todayISO());
  const [start,setStart]=useState(null);
  const workers=db.workers||[];

  const installs=Object.values(db.installs||{}).sort((a,b)=>(b.createdTs||0)-(a.createdTs||0));
  const STEPLABEL={pending:'待到場',arrived:'已到場',installed:'待驗收',done:'已完成',failed:'無法安裝'};
  const stepIdx={pending:0,arrived:1,installed:2,done:3};

  const createOrder=()=>{
    if(!f.name.trim()||!f.phone.trim()){alert('請填寫客戶姓名與電話');return;}
    const id='IW'+Date.now();
    let newWf=null;
    updateDB(prev=>{
      // 案件發生即發客編：電話查既有客戶，無則建立新客編（保固欄位待安裝完工後補）
      let customers=prev.customers||[];
      const exist=customers.find(c=>c.phone===f.phone.trim());
      let wfId;
      if(exist){ wfId=exist.wfId; }
      else{
        wfId='WF'+String(Date.now()).slice(-8); newWf=wfId;
        customers=[...customers,{wfId,name:f.name.trim(),phone:f.phone.trim(),address:f.address,channel:f.channel,
          productId:f.productId,serialNo:f.serialNo,regType:'auto',regDate:today(),
          installDate:null,warrantyMonths:null,warrantyEnd:null,tags:['待安裝'],repairIds:[],complaintIds:[]}];
      }
      return {...prev,customers,
        installs:{...prev.installs,[id]:pushHist({id,...f,wfId,status:'pending',createdDate:today(),createdTs:Date.now(),arrivalPushed:false},currentUser?.name,'建立安裝工單')}};
    });
    toast('📋 安裝工單已建立',newWf?`${f.name}｜已建立客編 ${newWf}`:`${f.name}｜歸入既有客編`,'ok');
    setCreating(false);
    setF({name:'',phone:'',address:'',channel:'lock_shop',productId:'L376',serialNo:'',locksmithId:'S1'});
  };
  const setStatus=(id,patch,msg,action)=>{
    updateDB(prev=>{
      let next={...prev.installs[id],...patch};
      if(action) next=pushHist(next,currentUser?.name,action);
      return {...prev,installs:{...prev.installs,[id]:next}};
    });
    if(msg)toast(msg.t,msg.b,msg.type||'ok');
  };
  const lineUidByPhone=(phone)=>(db.customers||[]).find(x=>x.phone===phone && x.lineUid)?.lineUid;
  const arrive=o=>{
    const uid=lineUidByPhone(o.phone);
    setStatus(o.id,{status:'arrived',arrivalPushed:!!uid},
      uid?{t:'📱 已推播',b:'「師傅已抵達」通知已送達住戶 LINE'}
         :{t:'📍 已標記到場',b:'客戶尚未綁定 LINE，未發送推播',type:'warn'},'標記到場');
    if(uid) pushLineTo(uid, `🚪 安裝通知\n\n您預約的安裝師傅已抵達現場，即將開始安裝。`);
  };
  const installed=o=>setStatus(o.id,{status:'installed'},{t:'🔧 施工完成',b:'請進行完工驗收'},'施工完成（待驗收）');
  const fail=o=>setStatus(o.id,{status:'failed'},{t:'❌ 無法安裝',b:'已回報客服（退款 / 換型號）',type:'err'},'標記無法安裝');

  const openSchedule=(o)=>{ setSched(o); setRegion('central'); setSw(''); setSd(todayISO()); setStart(null); };
  const doSchedule=async()=>{
    if(!sw){ toast('請選擇師傅','先選區域與師傅','warn'); return; }
    if(start==null){ toast('請選擇時段','安裝佔 2 小時，選未佔用的起始格','warn'); return; }
    const w=workers.find(x=>x.id===sw)||WORKERS.find(x=>x.id===sw);
    await releaseSlots(sched.id); // 重排先釋放舊格
    const ok=await bookSlots(sw,sd,start,2,'install',sched.id);
    if(!ok){ toast('時段衝突','該師傅此 2 小時已被佔用，請改時段','err'); return; }
    const slotTxt=`${sd} ${String(start).padStart(2,'0')}:00-${String(start+2).padStart(2,'0')}:00`;
    setStatus(sched.id,{workerId:sw,schedDate:sd,schedStart:start,schedSpan:2},{t:'📅 已排程',b:`${w?.name}｜${slotTxt}`},`排程：${w?.name}｜${slotTxt}`);
    const uid=lineUidByPhone(sched.phone);
    if(uid) pushLineTo(uid, `📅 安裝預約已排定\n\n師傅：${w?.name}\n時間：${slotTxt}\n當日出發前將再通知您 📱`);
    setSched(null);
  };

  const finishVerify=(o,d)=>{
    const months=PRODUCTS[o.productId]?.warranty||36;
    const warrantyEnd=addMonthsStr(months);
    let wfId=o.wfId;
    updateDB(prev=>{
      let customers=prev.customers||[];
      const has=wfId && customers.some(c=>c.wfId===wfId);
      if(has){
        // 更新既有客編：補上保固登錄欄位、待安裝→保固中
        customers=customers.map(c=>c.wfId!==wfId?c:{...c,
          name:o.name,phone:o.phone,address:o.address||c.address,channel:o.channel||c.channel,
          productId:o.productId,serialNo:o.serialNo,installDate:today(),warrantyMonths:months,warrantyEnd,
          tags:[...new Set([...(c.tags||[]).filter(t=>t!=='待安裝'),'保固中'])]});
      }else{
        // 舊資料 fallback：無客編則新建
        wfId='WF'+String(Date.now()).slice(-8);
        customers=[...customers,{wfId,name:o.name,phone:o.phone,address:o.address,channel:o.channel,productId:o.productId,serialNo:o.serialNo,regType:'auto',regDate:today(),installDate:today(),warrantyMonths:months,warrantyEnd,tags:['保固中','新客'],repairIds:[],complaintIds:[]}];
      }
      return {...prev,
        installs:{...prev.installs,[o.id]:pushHist({...prev.installs[o.id],status:'done',photos:d.photos,signature:d.signature,verify:d.verify,taught:d.taught,workNote:d.note,completedDate:today(),wfId,warrantyEnd},currentUser?.name,`完工驗收｜保固至 ${warrantyEnd}`)},
        customers};
    });
    const uid=lineUidByPhone(o.phone);

function ComplaintPage(){
  const {db,updateDB,toast,currentRole,currentUser} = useContext(Ctx);
  const [tab,setTab] = useState('all');
  const [expandedId,setExpandedId] = useState(null);
  const [followText,setFollowText] = useState('');
  
  const complaints = Object.values(db.complaints||{}).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  const filtered = complaints.filter(c=>{
    if(currentRole!=='管理員(全知)' && c.department!==currentRole) return false;
    if(tab==='pending') return c.status==='pending';
    if(tab==='following') return c.status==='following';
    if(tab==='closed') return c.status==='closed';
    return true;
  });

  const addFollowup=(ctId,note)=>{
    if(!note.trim()) return;
    const ts=today()+' '+now();
    updateDB(prev=>{
      const ct=prev.complaints?.[ctId];
      if(!ct) return prev;
      const updated={...ct,
        status: ct.status==='pending'?'following':ct.status,
        timeline:[...(ct.timeline||[]),{ts,by:currentUser?.name,note:note.trim()}],
      };
      return {...prev,complaints:{...(prev.complaints||{}),[ctId]:updated}};
    });
    toast('🖊️ 追蹤備註已新增','','ok');
    setFollowText('');
  };

  const closeComplaint=(ctId)=>{
    const ts=today()+' '+now();
    updateDB(prev=>{
      const ct=prev.complaints?.[ctId];
      if(!ct) return prev;
      return {...prev,complaints:{...(prev.complaints||{}),[ctId]:{
        ...ct,status:'closed',closedDate:today(),
        timeline:[...(ct.timeline||[]),{ts,by:currentUser?.name,note:'結案'}],
      }}};
    });
    toast('✅ 客訴已結案','','ok');
  };

  return(
    <div className="ctpage">
      <div className="ct-hdr">
        <h2>📞 客訴單列表</h2>
        <div style={{fontSize:12,color:'var(--g500)'}}>共 {complaints.length} 筆紀錄</div>
      </div>
      
      <div className="cttabs">
        <button className={`cttab ${tab==='all'?'on':''}`} onClick={()=>setTab('all')}>全部</button>
        <button className={`cttab ${tab==='pending'?'on':''}`} onClick={()=>setTab('pending')}>待追蹤</button>
        <button className={`cttab ${tab==='following'?'on':''}`} onClick={()=>setTab('following')}>追蹤中</button>
        <button className={`cttab ${tab==='closed'?'on':''}`} onClick={()=>setTab('closed')}>已結案</button>
      </div>

      {filtered.length===0
        ? <div className="empty"><div style={{fontSize:30,opacity:.3}}>📞</div><div style={{fontSize:13,marginTop:10}}>尚無符合條件的客訴單</div></div>
        : <table className="ct-table">
            <thead>
              <tr>
                <th>客戶</th>
                <th>來電管道</th>
                <th>歸屬部門</th>
                <th>判斷原因</th>
                <th>建立時間</th>
                <th>狀態</th>
                <th style={{textAlign:'right'}}>操作</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(ct=>{
                const isExp = expandedId===ct.id;
                return(
                  <React.Fragment key={ct.id}>
                    <tr style={{cursor:'pointer'}} onClick={()=>setExpandedId(isExp?null:ct.id)}>
                      <td>
                        <div style={{fontWeight:700}}>{ct.name}</div>
                        <div style={{fontSize:10,color:'var(--g400)',fontFamily:'monospace'}}>{ct.wfId}</div>
                      </td>
                      <td>{ct.callChannel}</td>
                      <td>
                        <div style={{fontSize:11,background:'var(--g100)',padding:'2px 6px',borderRadius:6,display:'inline-block'}}>{ct.department||'—'}</div>
                      </td>
                      <td>
                        <div style={{fontWeight:600}}>{ct.cat1}</div>
                        <div style={{fontSize:10,color:'var(--g500)'}}>{ct.cat2}{ct.cat3?` › ${ct.cat3}`:''}</div>
                      </td>
                      <td>
                        <div>{ct.date}</div>
                        <div style={{fontSize:10,color:'var(--g400)'}}>{ct.createdAt.split(' ')[1]}</div>
                      </td>
                      <td><span className={`ct-sb ${ct.status}`}>{COMPLAINT_STATUS_LABEL[ct.status]}</span></td>
                      <td style={{textAlign:'right'}}>
                        <button style={{padding:'4px 8px',background:'var(--g100)',border:'none',borderRadius:4,fontSize:10.5,fontWeight:600,cursor:'pointer',color:'var(--g600)'}}>
                          {isExp?'收起':'展開'}
                        </button>
                      </td>
                    </tr>
                    {isExp&&(
                      <tr className="ct-expand">
                        <td colSpan={7}>
                          <div style={{display:'flex',gap:16}}>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11,color:'var(--g500)',fontWeight:700,marginBottom:4}}>處理過程 / 來電摘要</div>
                              <div className="ct-process-box">
                                {ct.process||<span style={{color:'var(--g400)',fontStyle:'italic'}}>無詳細說明</span>}
                              </div>
                              <div style={{fontSize:11,color:'var(--g500)',fontWeight:700,marginBottom:4}}>聯絡電話</div>
                              <div style={{fontSize:12,marginBottom:10}}>{ct.phone}</div>
                            </div>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11,color:'var(--g500)',fontWeight:700,marginBottom:4}}>追蹤歷程</div>
                              <div className="ct-timeline" style={{maxHeight:150,overflowY:'auto',background:'#fff'}}>
                                {(ct.timeline||[]).length===0?<div style={{fontSize:11,color:'var(--g400)',textAlign:'center',padding:'10px 0'}}>無追蹤紀錄</div>:ct.timeline.map((tl,i)=>(
                                  <div key={i} className="ct-tl-item">
                                    <div className={`ct-tl-dot ${i===ct.timeline.length-1?'ok':''}`}/>
                                    <div className="ct-tl-time">{tl.ts}</div>
                                    <div style={{flex:1,color:'var(--g700)'}}>{tl.note}</div>
                                  </div>
                                ))}
                              </div>
                              {ct.status!=='closed'&&(
                                <div className="ct-add-follow">
                                  <textarea value={followText} onChange={e=>setFollowText(e.target.value)} placeholder="輸入追蹤備註..."/>
                                  <div style={{display:'flex',flexDirection:'column',gap:4}}>
                                    <button className="ct-follow-btn" onClick={()=>{addFollowup(ct.id,followText);}}>新增備註</button>
                                    <button className="ct-close-btn" onClick={()=>{if(confirm('確定要結案嗎？')) closeComplaint(ct.id);}}>結案</button>
                                  </div>
                                </div>
                              )}
                            </div>
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
      }
    </div>
  );
}

const CASE_STATUS={
  pending:  {label:'待處理',bg:'#FEF3C7',fg:'#B45309'},
  dispatched:{label:'已派工',bg:'#DBEAFE',fg:'#1D4ED8'},
  arrived:  {label:'已到場',bg:'#EDE9FE',fg:'#6D28D9'},
  installed:{label:'待驗收',bg:'#CFFAFE',fg:'#0E7490'},
  done:     {label:'已完成',bg:'#D1FAE5',fg:'#065F46'},
  failed:   {label:'失敗',  bg:'#FEE2E2',fg:'#991B1B'},
  following:{label:'追蹤中',bg:'#DBEAFE',fg:'#1D4ED8'},
  closed:   {label:'已結案',bg:'#D1FAE5',fg:'#065F46'},
};
const maskName=name=>{
  if(!name)return'—';
  if(name.length<=2)return name[0]+'*';
  return name[0]+'*'.repeat(name.length-2)+name[name.length-1];
};
const maskPhone=phone=>{
  if(!phone)return'—';
  if(phone.length<7)return phone;
  return phone.slice(0,4)+'***'+phone.slice(-3);
};

function CaseDetailPanel({c,onClose,onOpenFull}){
  const {db}=useContext(Ctx);
  const customers=db.customers||[];
  const repairs=db.repairs||{};
  const installs=db.installs||{};
  const complaints=db.complaints||{};
  const cust=customers.find(x=>x.wfId===c.wfId)||(c.phone?customers.find(x=>x.phone===c.phone):null);
  const keyWf=cust?cust.wfId:c.wfId;
  const keyPhone=cust?cust.phone:c.phone;
  const match=r=>(keyWf&&r.wfId===keyWf)||(keyPhone&&r.phone===keyPhone);
  const custRepairs=Object.values(repairs).filter(match);
  const custInstalls=Object.values(installs).filter(match);
  const custComplaints=Object.values(complaints).filter(match);
  const p=cust?pctW(cust.installDate,cust.warrantyMonths||36):0;
  const prod=cust?PRODUCTS[cust.productId]:null;
  const timeline=[
    ...custInstalls.map(o=>({...o,_k:'i',_date:o.createdDate||'',_label:'安裝件'})),
    ...custRepairs.map(r=>({...r,_k:'r',_date:r.date||'',_label:'維修件'})),
    ...custComplaints.map(ct=>({...ct,_k:'c',_date:ct.date||'',_label:'客訴件'})),
  ].sort((a,b)=>b._date.localeCompare(a._date));
  const ST=CASE_STATUS;
  // 案件異動紀錄（repair/install 用 history；complaint 用 timeline）
  const fmtTs=ts=>{ if(!ts)return'—'; if(typeof ts==='number'||/^\d+$/.test(String(ts))){const d=new Date(Number(ts)); return d.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});} return String(ts); };
  const hist = c._type==='complaint'
    ? (c.timeline||[]).map(t=>({ts:t.ts,by:t.by,action:t.note}))
    : (c.history||[]);
  return(
    <div style={{width:360,background:'#fff',borderLeft:'1px solid #E2E8F0',overflowY:'auto',flexShrink:0,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'12px 16px',borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',justifyContent:'space-between',background:'#0F2744'}}>
        <div><div style={{fontSize:10.5,color:'rgba(255,255,255,.45)',marginBottom:2}}>{c._type==='customer'?'客戶總覽':'案件詳情'}</div><div style={{fontSize:13,fontWeight:700,color:'#fff'}}>{c._type==='customer'?(cust?.name||c.name||c.id):c.id}</div></div>
        <button onClick={onClose} style={{background:'rgba(255,255,255,.12)',border:'none',borderRadius:6,padding:'5px 11px',cursor:'pointer',fontSize:14,color:'#fff'}}>✕</button>
      </div>
      {c._type!=='customer'&&(
      <div style={{padding:'13px 16px',background:'#F8FAFC',borderBottom:'1px solid #E2E8F0'}}>
        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
          <span style={{background:c._type==='install'?'#EDE9FE':c._type==='complaint'?'#FEF3C7':'#E0F2FE',color:c._type==='install'?'#5B21B6':c._type==='complaint'?'#B45309':'#0369A1',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>
            {c._type==='install'?'安裝件':c._type==='complaint'?'客訴件':'維修件'}
          </span>
          {ST[c.status]&&<span style={{background:ST[c.status].bg,color:ST[c.status].fg,fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>{ST[c.status].label}</span>}
          {c.urgency==='urgent'&&<span style={{background:'#FEE2E2',color:'#991B1B',fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9}}>🚨 緊急</span>}
        </div>
        {c._type==='repair'&&<div style={{fontSize:12,color:'#334155'}}><b>{c.type}</b> — {c.issue}</div>}
        {c._type==='install'&&<div style={{fontSize:12,color:'#334155'}}>安裝 {PRODUCTS[c.productId]?.name||c.productId||'門鎖'}</div>}
        {c._type==='complaint'&&<div style={{fontSize:12,color:'#334155'}}>{c.cat1}{c.cat2?` / ${c.cat2}`:''}</div>}
        <div style={{fontSize:11,color:'#94A3B8',marginTop:4}}>📍 {c.address||c.building||c.district||'—'}</div>
        <div style={{fontSize:11,color:'#94A3B8',marginTop:2}}>
          📅 {c.date||c.createdDate||'—'}
          {c.schedDate&&<span style={{marginLeft:8}}>🗓️ 約工 {c.schedDate}{c.schedStart!=null?` ${String(c.schedStart).padStart(2,'0')}:00`:''}</span>}
        </div>
      </div>
      )}
      {cust?(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0'}}>
          <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:8,letterSpacing:.5}}>客戶資料</div>
          <div style={{fontSize:12.5,lineHeight:1.9,color:'#334155'}}>
            <div>👤 <b>{cust.name}</b>　{cust.phone}</div>
            <div>🏠 {cust.address||cust.district||'—'}</div>
            {prod&&<div>📦 {prod.name}</div>}
            {cust.serialNo&&<div style={{fontFamily:'monospace',fontSize:11,color:'#64748B'}}>SN: {cust.serialNo}</div>}
            {cust.installDate&&<div>📅 安裝 {cust.installDate}</div>}
          </div>
          {cust.installDate&&(
            <div style={{marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                <span style={{color:'#64748B'}}>保固進度</span>
                <span style={{fontWeight:700,color:p>50?'#10B981':p>20?'#F59E0B':'#EF4444'}}>{p}% 剩餘</span>
              </div>
              <div style={{background:'#E2E8F0',borderRadius:9,height:6}}>
                <div style={{background:p>50?'#10B981':p>20?'#F59E0B':'#EF4444',width:p+'%',height:'100%',borderRadius:9}}/>
              </div>
              <div style={{fontSize:10,color:'#94A3B8',marginTop:3}}>保固至 {cust.warrantyEnd||'—'}</div>
            </div>
          )}
          {onOpenFull&&<button onClick={()=>onOpenFull(cust.wfId)}
            style={{width:'100%',marginTop:12,background:'#0F2744',color:'#fff',border:'none',borderRadius:7,padding:'8px',fontSize:12,fontWeight:700,cursor:'pointer'}}>📋 查看完整客戶資料 →</button>}
        </div>
      ):(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0'}}>
          <div style={{fontSize:10,color:'#94A3B8',marginBottom:4}}>尚無保固登錄資料</div>
          <div style={{fontSize:12.5,color:'#334155'}}><b>{c.name}</b>　{c.phone}</div>
        </div>
      )}
      {c._type!=='customer'&&hist.length>0&&(
        <div style={{padding:'13px 16px',borderBottom:'1px solid #E2E8F0',background:'#F8FAFC'}}>
          <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:8,letterSpacing:.5}}>📝 本案異動紀錄（{hist.length}）</div>
          {hist.slice().reverse().map((h,i)=>(
            <div key={i} style={{display:'flex',gap:8,fontSize:11.5,padding:'5px 0',borderBottom:i<hist.length-1?'1px dashed #E2E8F0':'none'}}>
              <span style={{color:'#94A3B8',whiteSpace:'nowrap',fontVariantNumeric:'tabular-nums'}}>{fmtTs(h.ts)}</span>
              <span style={{flex:1,color:'#334155'}}>{h.action||'—'}</span>
              <span style={{color:'#0F2744',fontWeight:600,whiteSpace:'nowrap'}}>{h.by||'—'}</span>
            </div>
          ))}
        </div>
      )}
      <div style={{padding:'13px 16px',flex:1}}>
        <div style={{fontSize:10,color:'#64748B',fontWeight:700,marginBottom:12,letterSpacing:.5}}>所有歷程（{timeline.length} 件）</div>
        {timeline.length===0?<div style={{color:'#94A3B8',fontSize:12}}>無歷程紀錄</div>:timeline.map((item,i)=>{
          const col=item._k==='i'?'#7C3AED':item._k==='c'?'#F59E0B':'#0EA5E9';
          const st=ST[item.status]||{};
          return(
            <div key={item.id+'-'+i} style={{borderLeft:`3px solid ${col}`,paddingLeft:12,marginBottom:14,position:'relative'}}>
              <div style={{position:'absolute',left:-6,top:3,width:9,height:9,borderRadius:'50%',background:col}}/>
              <div style={{fontSize:11,fontWeight:700,color:col,marginBottom:2}}>{item._label} {item.id}</div>
              <div style={{fontSize:11,color:'#475569'}}>
                {item._date}
                {item._k==='r'&&item.type&&<span style={{marginLeft:6}}>{item.type}</span>}
                {item._k==='r'&&item.issue&&<span style={{marginLeft:4,color:'#64748B'}}>— {item.issue.slice(0,20)}{item.issue.length>20?'…':''}</span>}
                {item._k==='c'&&item.cat1&&<span style={{marginLeft:6,color:'#64748B'}}>{item.cat1}</span>}
              </div>
              {st.label&&<span style={{background:st.bg,color:st.fg,fontSize:9.5,fontWeight:700,padding:'1px 6px',borderRadius:8,marginTop:2,display:'inline-block'}}>{st.label}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HomePage(){
  const {db,setPage,setCrmTarget}=useContext(Ctx);
  const [search,setSearch]=useState('');
  const [typeFilter,setTypeFilter]=useState('all');
  const [dept,setDept]=useState('all');
  const [selected,setSelected]=useState(null);
  const [results,setResults]=useState(null); // null=案件池模式, array=客戶搜尋結果
  const installs=Object.values(db.installs||{});
  const repairs=Object.values(db.repairs||{});
  const complaints=Object.values(db.complaints||{});
  const DONE_STATUS=['done','closed','failed'];
  const isOpen=c=>!DONE_STATUS.includes(c.status);
  const allCases=[
    ...installs.filter(isOpen).map(o=>({...o,_type:'install',_date:o.createdTs||0})),
    ...repairs.filter(isOpen).map(r=>({...r,_type:'repair',_date:new Date(r.date||0).getTime()||0})),
    ...complaints.filter(isOpen).map(ct=>({...ct,_type:'complaint',_date:new Date(ct.date||0).getTime()||0})),
  ].sort((a,b)=>b._date-a._date);
  const filtered=allCases.filter(c=>{
    if(typeFilter!=='all'&&c._type!==typeFilter)return false;
    if(dept!=='all'&&c._type==='complaint'&&c.department!==dept)return false;
    return true;
  });
  const openCustomer=wfId=>{ setCrmTarget(wfId); setPage('crm'); };
  const doSearch=()=>{
    const term=search.trim();
    if(!term){ setResults(null); return; }
    const lo=term.toLowerCase();
    const customers=db.customers||[];
    const cntCases=c=>[
      ...installs.filter(o=>(c.wfId&&o.wfId===c.wfId)||(c.phone&&o.phone===c.phone)),
      ...repairs.filter(r=>(c.wfId&&r.wfId===c.wfId)||(c.phone&&r.phone===c.phone)),
      ...complaints.filter(t=>(c.wfId&&t.wfId===c.wfId)||(c.phone&&t.phone===c.phone)),
    ].length;
    // 1. 已登錄客戶（模糊比對 姓名/電話/編號/序號/地址）
    const matched=customers.filter(c=>
      (c.name||'').toLowerCase().includes(lo)||(c.phone||'').includes(term)||
      (c.wfId||'').toLowerCase().includes(lo)||(c.serialNo||'').toLowerCase().includes(lo)||
      (c.address||'').includes(term)
    ).map(c=>({...c,_registered:true,_caseCount:cntCases(c)}));
    // 2. 未登錄但有案件的電話（去重，建立候選）
    const known=new Set(matched.map(c=>c.phone));
    const allRaw=[
      ...installs.map(o=>({...o,_type:'install'})),
      ...repairs.map(r=>({...r,_type:'repair'})),
      ...complaints.map(t=>({...t,_type:'complaint'})),
    ];
    const extra={};
    allRaw.forEach(c=>{
      const hit=(c.phone||'').includes(term)||(c.name||'').includes(term)||
        (c.id||'').toLowerCase().includes(lo)||(c.address||'').includes(term)||(c.building||'').includes(term);
      if(!hit)return;
      const key=c.phone||c.id;
      if(known.has(c.phone))return;
      if(!extra[key]) extra[key]={wfId:null,name:c.name,phone:c.phone,address:c.address||c.building||c.district,_registered:false,_caseCount:0,_anchor:c};
      extra[key]._caseCount++;
    });
    setResults([...matched,...Object.values(extra)]);
  };
  const typeLabelMap={install:'安裝件',repair:'維修件',complaint:'客訴件'};
  const typeBg={install:'#EDE9FE',repair:'#E0F2FE',complaint:'#FEF3C7'};
  const typeFg={install:'#5B21B6',repair:'#0369A1',complaint:'#B45309'};
  const typeBar={install:'#7C3AED',repair:'#0EA5E9',complaint:'#F59E0B'};
  const ST=CASE_STATUS;
  const pend=allCases.filter(c=>c.status==='pending').length;
  const urg=repairs.filter(r=>r.urgency==='urgent'&&r.status!=='done').length;
  return(
    <div style={{display:'flex',height:'calc(100vh - 48px)',overflow:'hidden'}}>
      <div style={{width:'20%',minWidth:190,maxWidth:260,background:'#1E293B',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'14px 12px',borderBottom:'1px solid #334155'}}>
          <div style={{fontSize:9.5,color:'rgba(255,255,255,.35)',fontWeight:700,letterSpacing:.5,marginBottom:7}}>🔍 客戶查詢</div>
          <input value={search} onChange={e=>setSearch(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch()} placeholder="輸入電話 / 姓名 / 案號"
            style={{width:'100%',background:'#334155',border:'1px solid #475569',borderRadius:7,padding:'7px 10px',color:'#F1F5F9',fontSize:12,outline:'none',boxSizing:'border-box',marginBottom:7}}/>
          <button onClick={doSearch}
            style={{width:'100%',background:'#38BDF8',color:'#0F2744',border:'none',borderRadius:7,padding:'7px',fontSize:12,fontWeight:700,cursor:'pointer'}}>🔍 搜尋客戶</button>
          {results!==null&&<button onClick={()=>{setSearch('');setResults(null);}}
            style={{width:'100%',background:'transparent',color:'#94A3B8',border:'1px solid #475569',borderRadius:7,padding:'5px',fontSize:11,fontWeight:600,cursor:'pointer',marginTop:6}}>← 返回案件列表</button>}
        </div>
        <div style={{padding:'8px 0',borderBottom:'1px solid #334155'}}>
          <div style={{padding:'4px 12px',fontSize:9.5,color:'#475569',fontWeight:700,letterSpacing:1,marginBottom:2}}>案件類型</div>
          {[['all','🗂️ 全部案件',allCases.length],['install','🛠️ 安裝件',installs.filter(isOpen).length],['repair','🔧 維修件',repairs.filter(isOpen).length],['complaint','📞 客訴件',complaints.filter(isOpen).length]].map(([v,l,cnt])=>(
            <div key={v} onClick={()=>setTypeFilter(v)}
              style={{padding:'9px 12px',cursor:'pointer',fontSize:12.5,display:'flex',alignItems:'center',justifyContent:'space-between',
                fontWeight:typeFilter===v?700:400,background:typeFilter===v?'#334155':'transparent',
                color:typeFilter===v?'#38BDF8':'#94A3B8',borderLeft:typeFilter===v?'3px solid #38BDF8':'3px solid transparent',transition:'all .12s'}}>
              <span>{l}</span>
              {cnt>0&&<span style={{background:typeFilter===v?'rgba(56,189,248,.2)':'rgba(255,255,255,.05)',color:typeFilter===v?'#38BDF8':'#64748B',fontSize:9.5,padding:'1px 6px',borderRadius:9,fontWeight:700}}>{cnt}</span>}
            </div>
          ))}
        </div>
        <div style={{padding:'8px 0',flex:1,overflowY:'auto'}}>
          <div style={{padding:'4px 12px',fontSize:9.5,color:'#475569',fontWeight:700,letterSpacing:1,marginBottom:2}}>處理部門</div>
          {['all',...COMPLAINT_DEPARTMENTS].map(d=>(
            <div key={d} onClick={()=>setDept(d)}
              style={{padding:'9px 12px',cursor:'pointer',fontSize:12.5,
                background:dept===d?'#334155':'transparent',color:dept===d?'#38BDF8':'#94A3B8',
                borderLeft:dept===d?'3px solid #38BDF8':'3px solid transparent',transition:'all .12s'}}>
              {d==='all'?'全部部門':d}
            </div>
          ))}
        </div>
        <div style={{padding:'12px',borderTop:'1px solid #334155',fontSize:11,color:'#64748B',lineHeight:1.8}}>
          {urg>0&&<div style={{color:'#EF4444',fontWeight:700,marginBottom:2}}>🚨 緊急 {urg} 件</div>}
          <div>待處理 <b style={{color:'#F59E0B'}}>{pend}</b> 件</div>
          <div>篩選結果 <b style={{color:'#38BDF8'}}>{filtered.length}</b> 件</div>
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',background:'#F0F4F8',display:'flex',flexDirection:'column'}}>
        {results!==null?(
          // ── 搜尋結果：候選客戶列表 ──
          <>
            <div style={{padding:'13px 20px',background:'#fff',borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
              <h2 style={{fontSize:16,fontWeight:700,color:'#0F2744',margin:0}}>🔍 搜尋結果</h2>
              <span style={{fontSize:11.5,color:'#64748B',background:'#F1F5F9',padding:'2px 10px',borderRadius:9}}>{results.length} 位客戶</span>
              <span style={{fontSize:11,color:'#64748B'}}>關鍵字「{search}」</span>
            </div>
            <div style={{padding:'12px 20px',flex:1}}>
              {results.length===0&&(
                <div style={{textAlign:'center',color:'#94A3B8',padding:'80px 0',fontSize:14}}>
                  <div style={{fontSize:32,marginBottom:12}}>🔍</div>
                  <div>查無符合「{search}」的客戶</div>
                </div>
              )}
              {results.map((c,i)=>{
                const prod=PRODUCTS[c.productId];
                const inWar=c.installDate&&pctW(c.installDate,c.warrantyMonths||36)>0;
                return(
                  <div key={(c.wfId||c.phone||i)+''} onClick={()=>c._registered?openCustomer(c.wfId):setSelected(c._anchor)}
                    style={{background:'#fff',borderRadius:10,padding:'13px 18px',cursor:'pointer',
                      boxShadow:'0 1px 3px rgba(0,0,0,.06)',borderLeft:`4px solid ${c._registered?'#10B981':'#94A3B8'}`,
                      display:'flex',alignItems:'center',gap:14,marginBottom:8,transition:'box-shadow .12s'}}
                    onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 12px rgba(0,0,0,.12)'}
                    onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.06)'}>
                    <div style={{width:42,height:42,borderRadius:'50%',background:c._registered?'linear-gradient(135deg,#0F2744,#1E4080)':'#94A3B8',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,flexShrink:0}}>
                      {(c.name||'?')[0]}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,color:'#1E293B',marginBottom:2,display:'flex',alignItems:'center',gap:8}}>
                        {c.name||'未具名'}
                        {!c._registered&&<span style={{background:'#F1F5F9',color:'#94A3B8',fontSize:9.5,fontWeight:700,padding:'1px 7px',borderRadius:8}}>未登錄保固</span>}
                        {inWar&&<span style={{background:'#D1FAE5',color:'#065F46',fontSize:9.5,fontWeight:700,padding:'1px 7px',borderRadius:8}}>保固中</span>}
                      </div>
                      <div style={{fontSize:12,color:'#64748B',display:'flex',gap:14,flexWrap:'wrap'}}>
                        <span>📱 {c.phone||'—'}</span>
                        {(c.address||c.district)&&<span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:320}}>🏠 {c.address||c.district}</span>}
                      </div>
                      {(prod||c.serialNo)&&<div style={{fontSize:10.5,color:'#94A3B8',marginTop:3}}>
                        {prod&&<span>📦 {prod.name}　</span>}
                        {c.serialNo&&<span style={{fontFamily:'monospace'}}>SN: {c.serialNo}</span>}
                      </div>}
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:11,color:'#64748B'}}>歷程 <b style={{color:'#0F2744',fontSize:14}}>{c._caseCount}</b> 件</div>
                      <div style={{fontSize:11,color:'#38BDF8',fontWeight:700,marginTop:3}}>查看完整資料 →</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        ):(
          // ── 案件池：客訴單列表 ──
          <>
        <div style={{padding:'13px 20px',background:'#fff',borderBottom:'1px solid #E2E8F0',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <h2 style={{fontSize:16,fontWeight:700,color:'#0F2744',margin:0}}>📋 客訴單列表</h2>
          <span style={{fontSize:11.5,color:'#64748B',background:'#F1F5F9',padding:'2px 10px',borderRadius:9}}>{filtered.length} 筆</span>
        </div>
        <div style={{padding:'12px 20px',flex:1}}>
          {filtered.length===0&&(
            <div style={{textAlign:'center',color:'#94A3B8',padding:'80px 0',fontSize:14}}>
              <div style={{fontSize:32,marginBottom:12}}>📭</div>
              <div>無符合條件的案件</div>
            </div>
          )}
          {filtered.map(c=>{
            const addr=c.address||c.building||c.district||'—';
            const s=ST[c.status]||{label:c.status||'—',bg:'#F1F5F9',fg:'#64748B'};
            return(
              <div key={c.id} onClick={()=>setSelected(selected?.id===c.id?null:c)}
                style={{background:'#fff',borderRadius:10,padding:'11px 16px',cursor:'pointer',
                  boxShadow:selected?.id===c.id?'0 0 0 2px #38BDF8':'0 1px 3px rgba(0,0,0,.06)',
                  borderLeft:`4px solid ${typeBar[c._type]}`,
                  display:'flex',alignItems:'center',gap:14,marginBottom:7,transition:'box-shadow .12s'}}
                onMouseEnter={e=>{if(selected?.id!==c.id)e.currentTarget.style.boxShadow='0 3px 10px rgba(0,0,0,.1)'}}
                onMouseLeave={e=>{if(selected?.id!==c.id)e.currentTarget.style.boxShadow='0 1px 3px rgba(0,0,0,.06)'}}>
                <span style={{background:typeBg[c._type],color:typeFg[c._type],fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:9,whiteSpace:'nowrap',flexShrink:0}}>
                  {typeLabelMap[c._type]}
                </span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,color:'#1E293B',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginBottom:2}}>{addr}</div>
                  <div style={{fontSize:11.5,color:'#64748B',display:'flex',gap:12}}>
                    <span>{maskName(c.name)}</span>
                    <span>{maskPhone(c.phone)}</span>
                    {c._type==='repair'&&c.type&&<span style={{color:'#94A3B8'}}>{c.type}</span>}
                    {c._type==='complaint'&&c.cat1&&<span style={{color:'#94A3B8'}}>{c.cat1}</span>}
                  </div>
                </div>
                <div style={{fontSize:10.5,color:'#94A3B8',textAlign:'right',flexShrink:0}}>
                  <div style={{fontFamily:'monospace',fontSize:10,marginBottom:2}}>{c.id}</div>
                  <div>{c.date||c.createdDate||'—'}</div>
                  {c.urgency==='urgent'&&<div style={{color:'#EF4444',fontWeight:700}}>🚨</div>}
                </div>
                <span style={{background:s.bg,color:s.fg,fontSize:10,fontWeight:700,padding:'3px 9px',borderRadius:9,whiteSpace:'nowrap',flexShrink:0,textAlign:'center',minWidth:52}}>
                  {s.label}
                </span>
              </div>
            );
          })}
        </div>
          </>
        )}
      </div>
      {selected&&<CaseDetailPanel c={selected} onClose={()=>setSelected(null)} onOpenFull={openCustomer}/>}
    </div>
  );
}

// ─── 登入畫面 ───
function LoginScreen({onLogin}){
  const [acc,setAcc]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const go=async()=>{
    if(!acc.trim()||!pin.trim()){setErr('請輸入帳號與密碼');return;}
    setBusy(true);setErr('');
    const {data}=await sb.from('crm_users').select('*').eq('account',acc.trim()).eq('pin',pin.trim()).eq('active',true).maybeSingle();
    setBusy(false);
    if(!data){setErr('帳號或密碼錯誤');return;}
    onLogin({id:data.id,name:data.name,role:data.role});
  };
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#0F2744'}}>
      <div style={{background:'#fff',borderRadius:14,padding:'34px 30px',width:330,boxShadow:'0 12px 40px rgba(0,0,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:22}}>
          <div style={{fontSize:22,fontWeight:800,color:'#0F2744'}}>🔒 WAFERLOCK CRM</div>
          <div style={{fontSize:12.5,color:'#64748B',marginTop:4}}>請輸入帳號與密碼登入</div>
        </div>
        <label style={{fontSize:11.5,fontWeight:700,color:'#475569'}}>帳號</label>
        <input value={acc} onChange={e=>setAcc(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="例：admin"
          style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none',margin:'4px 0 12px',boxSizing:'border-box'}}/>
        <label style={{fontSize:11.5,fontWeight:700,color:'#475569'}}>密碼</label>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="••••"
          style={{width:'100%',border:'1px solid #E2E8F0',borderRadius:8,padding:'9px 12px',fontSize:13,outline:'none',margin:'4px 0 6px',boxSizing:'border-box'}}/>
        {err&&<div style={{color:'#EF4444',fontSize:12,margin:'6px 0'}}>{err}</div>}
        <button onClick={go} disabled={busy}
          style={{width:'100%',marginTop:14,background:'#38BDF8',color:'#0F2744',border:'none',borderRadius:8,padding:'11px',fontSize:14,fontWeight:800,cursor:'pointer',opacity:busy?.6:1}}>
          {busy?'登入中…':'登入'}
        </button>
      </div>
    </div>
  );
}

// ─── 派工處理中心（合併 安裝/報修/客訴）───
function DispatchCenter(){
  const {db,currentRole}=useContext(Ctx);
  const [sub,setSub]=useState('repair');
  const installPending=Object.values(db.installs||{}).filter(o=>o.status!=='done'&&o.status!=='failed').length;
  const repairPending=Object.values(db.repairs||{}).filter(r=>r.status==='pending').length;
  const complaintPending=Object.values(db.complaints||{}).filter(c=>{
    if(c.status==='closed')return false;
    if(currentRole!=='管理員(全知)'&&c.department!==currentRole)return false;
    return true;
  }).length;
  const tabs=[['repair','🔧 報修處理',repairPending,'var(--warn)'],['install','🛠️ 安裝工單',installPending,'var(--accent)'],['complaint','📞 客訴處理',complaintPending,'var(--purple)']];
  return(
    <div>
      <div style={{display:'flex',gap:6,padding:'10px 18px',background:'#fff',borderBottom:'1px solid var(--g200)',position:'sticky',top:0,zIndex:5}}>
        {tabs.map(([k,l,n,col])=>(
          <button key={k} onClick={()=>setSub(k)}
            style={{padding:'7px 16px',borderRadius:7,border:'none',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6,
              background:sub===k?'var(--brand)':'var(--g100)',color:sub===k?'#fff':'var(--g600)',transition:'all .12s'}}>
            {l}
            {n>0&&<span style={{background:col,color:'#fff',fontSize:10,fontWeight:800,padding:'1px 7px',borderRadius:9}}>{n}</span>}
          </button>
        ))}
      </div>
      {sub==='repair'&&<RepairPage/>}
      {sub==='install'&&<InstallPage/>}
      {sub==='complaint'&&<ComplaintPage/>}
    </div>
  );
}

function App(){
  const [page,setPage] = useState('home');
  const [crmTarget,setCrmTarget] = useState(null); // 首頁搜尋→跳 CRM 指定客戶 wfId
  const [currentUser,setCurrentUser] = useState(()=>{try{return JSON.parse(localStorage.getItem('wl_crm_user'))||null;}catch(e){return null;}});
  const [adminView,setAdminView] = useState('管理員(全知)'); // admin 切換視角
  const isAdmin = currentUser?.role==='admin';
  const currentRole = isAdmin ? adminView : (currentUser?.role||'管理員(全知)');
  const doLogin=(u)=>{ setCurrentUser(u); localStorage.setItem('wl_crm_user',JSON.stringify(u)); };
  const doLogout=()=>{ localStorage.removeItem('wl_crm_user'); setCurrentUser(null); };
  const [db,setDB] = useState(EMPTY_DB);
  const [loading,setLoading] = useState(true);
  const [toasts,setToasts] = useState([]);
  const [synced,setSynced] = useState(false);
  const [newIds,setNewIds] = useState([]);
  const prevDbRef = useRef(EMPTY_DB);

  const toast = useCallback((title,body,type='ok')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,title,body,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3500);
  },[]);

  // 初始載入
  useEffect(()=>{
    loadFromSupabase().then(data=>{
      setDB(data);
      prevDbRef.current = data;
      setLoading(false);
      setSynced(true);
    });
  },[]);

  const updateDB = useCallback(updater=>{
    setDB(prev=>{
      const next = typeof updater==='function' ? updater(prev) : updater;
      const withVer = {...next, version:(next.version||0)+1};
      syncToSupabase(prevDbRef.current, withVer).then(()=>setSynced(true));
      prevDbRef.current = withVer;
      return withVer;
    });
  },[]);

  // Supabase Realtime 跨分頁與跨裝置同步
  useEffect(()=>{
    const channel = sb.channel('db-realtime')
      .on('postgres_changes',{event:'*',schema:'public'},()=>{
        loadFromSupabase().then(data=>{
          setDB(prev=>{
            const prevSet=new Set((prev.customers||[]).map(c=>c.wfId));
            const added=(data.customers||[]).filter(c=>!prevSet.has(c.wfId));
            if(added.length>0){
              setNewIds(p=>[...p,...added.map(c=>c.wfId)]);
              toast('🎉 新客戶保固登錄',added.map(c=>c.name).join('、')+' 已完成登錄','ok');
              setTimeout(()=>setNewIds(p=>p.filter(id=>!added.map(c=>c.wfId).includes(id))),6000);
            }
            const prevRids=new Set(Object.keys(prev.repairs||{}));
            const newRids=Object.keys(data.repairs||{}).filter(id=>!prevRids.has(id));
            if(newRids.length>0){
              const r=data.repairs[newRids[0]];
              if(r) toast(r.urgency==='urgent'?'🚨 緊急報修':'📋 新報修案件',`${r.name} — ${r.issue}`,r.urgency==='urgent'?'err':'warn');
            }
            const prevCtIds=new Set(Object.keys(prev.complaints||{}));
            const newCtIds=Object.keys(data.complaints||{}).filter(id=>!prevCtIds.has(id));
            if(newCtIds.length>0){
              const ct=data.complaints[newCtIds[0]];
              if(ct) toast('📞 新客訴單',`${ct.name} — ${ct.cat1}`,'ok');
            }
            prevDbRef.current = data;
            return data;
          });
          setSynced(true);
        });
      })
      .subscribe(status=>setSynced(status==='SUBSCRIBED'));
    return ()=>sb.removeChannel(channel);
  },[toast]);

  if(loading) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',gap:16,color:'var(--g500)'}}>
      <div style={{fontSize:32}}>🔄</div>
      <div style={{fontSize:14,fontWeight:600}}>連接 Supabase 雲端資料庫中...</div>
    </div>
  );

  if(!currentUser) return <LoginScreen onLogin={doLogin}/>;

  const all = Object.values(db.repairs||{});
  const pendingCnt = all.filter(r=>r.status==='pending').length;
  const urgentCnt = all.filter(r=>r.urgency==='urgent'&&r.status!=='done').length;
  const installPending = Object.values(db.installs||{}).filter(o=>o.status!=='done'&&o.status!=='failed').length;
  const complaintPending = Object.values(db.complaints||{}).filter(c=>{
    if(c.status==='closed') return false;
    if(currentRole!=='管理員(全知)' && c.department!==currentRole) return false;
    return true;
  }).length;

  return(
    <Ctx.Provider value={{db,updateDB,toast,newIds,currentRole,currentUser,setPage,crmTarget,setCrmTarget}}>
      <nav className="nav">
        <div className="nav-logo">🔒 WAFERLOCK <span>CRM</span></div>
        <button className={`nbtn ${page==='home'||page==='crm'?'on':''}`} onClick={()=>setPage('home')}>🏠 首頁 / 客戶查詢</button>
        <button className={`nbtn ${page==='dispatch'?'on':''}`} onClick={()=>setPage('dispatch')}>
          🛠️ 派工處理
          {(installPending+pendingCnt+complaintPending)>0&&<span className="nbadge" style={{background:urgentCnt>0?'var(--err)':'var(--accent)',color:urgentCnt>0?'#fff':'var(--brand)'}}>{installPending+pendingCnt+complaintPending}</span>}
        </button>
        <button className={`nbtn ${page==='schedule'?'on':''}`} onClick={()=>setPage('schedule')}>📅 工務時刻表</button>
        <div className="sync-area">
          {isAdmin
            ? <select value={adminView} onChange={e=>setAdminView(e.target.value)} style={{fontSize:11,padding:'2px 4px',borderRadius:4,marginRight:10}}>
                <option value="管理員(全知)">👑 管理員(全知)</option>
                {COMPLAINT_DEPARTMENTS.map(d=><option key={d} value={d}>🏢 {d}</option>)}
              </select>
            : <span style={{fontSize:11,marginRight:10}}>🏢 {currentRole}</span>}
          <span style={{fontSize:11,fontWeight:700,marginRight:8}}>👤 {currentUser.name}</span>
          <button onClick={doLogout} style={{padding:'3px 8px',background:'rgba(255,255,255,.12)',border:'1px solid rgba(255,255,255,.25)',borderRadius:4,color:'#fff',fontSize:10,cursor:'pointer',marginRight:10}}>登出</button>
          <div className={`sdot ${synced?'live':'off'}`}/>
          <span>{synced?'即時同步中':'離線模式'}</span>
          <span style={{fontSize:9,marginLeft:2}}>v{db.version||0}</span>
        </div>
        <button onClick={async ()=>{
          if(confirm('確定清除所有資料嗎？(此動作將清空 Supabase 雲端資料)')){
            setLoading(true);
            try {
              await Promise.all([
                sb.from('customers').delete().neq('wf_id', ''),
                sb.from('repairs').delete().neq('id', ''),
                sb.from('complaints').delete().neq('id', ''),
                sb.from('installs').delete().neq('id', ''),
                sb.from('conversations').delete().neq('id', ''),
                sb.from('config').delete().neq('key', ''),
              ]);
            } catch(e) { console.error(e); }
            window.location.reload();
          }
        }}
          style={{padding:'3px 8px',background:'rgba(239,68,68,.15)',border:'1px solid rgba(239,68,68,.3)',borderRadius:4,color:'#FCA5A5',fontSize:10,cursor:'pointer',marginLeft:6}}>
          重置
        </button>
      </nav>
      <div className="page">
        {page==='home'&&<HomePage/>}
        {page==='crm'&&<CRMPage/>}
        {page==='dispatch'&&<DispatchCenter/>}
        {page==='schedule'&&<SchedulePage/>}
      </div>
      <Toasts items={toasts}/>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
