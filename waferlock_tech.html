<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>WAFERLOCK 師傅端</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans TC',-apple-system,sans-serif}
body{background:#EEF2F7;color:#1E293B;max-width:560px;margin:0 auto;min-height:100vh}
.top{position:sticky;top:0;background:#0F2744;color:#fff;padding:11px 14px;display:flex;align-items:center;gap:8px;z-index:10}
.top b{font-size:15px}.top .sp{margin-left:auto;font-size:12px;color:#A8C0E0}
.lo{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
.tabs{display:flex;background:#fff;border-bottom:1px solid #E2E8F0;position:sticky;top:46px;z-index:9}
.tab{flex:1;text-align:center;padding:11px 0;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#0F2744;border-color:#38BDF8}
.tab .n{display:inline-block;min-width:18px;background:#EF4444;color:#fff;font-size:10px;border-radius:9px;padding:0 5px;margin-left:3px}
.wrap{padding:12px}
.card{background:#fff;border-radius:11px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:3px solid #CBD5E1}
.card.urgent{border-color:#EF4444;background:#FFF8F8}
.cno{font-size:11px;color:#94A3B8;font-family:monospace}
.cname{font-size:15px;font-weight:700;margin:2px 0}
.crow{font-size:12.5px;color:#475569;line-height:1.8}
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:9px;margin-right:5px}
.b-urg{background:#FEE2E2;color:#991B1B}.b-in{background:#D1FAE5;color:#065F46}.b-out{background:#FEF3C7;color:#92400E}
.btn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.btn.go{background:#38BDF8;color:#0F2744}.btn.done{background:#10B981;color:#fff}.btn.gray{background:#F1F5F9;color:#475569}
.empty{text-align:center;color:#94A3B8;font-size:13px;padding:40px 0}
.login{padding:40px 22px}
.login h1{font-size:20px;margin-bottom:4px}.login p{color:#64748B;font-size:13px;margin-bottom:20px}
label{display:block;font-size:12px;font-weight:600;color:#475569;margin:12px 0 4px}
input,select,textarea{width:100%;border:1px solid #E2E8F0;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#38BDF8}
/* modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:18px}
.sheet h3{font-size:16px;margin-bottom:12px}
.sec{font-size:12px;font-weight:700;color:#475569;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.3px}
.sig{border:1px dashed #CBD5E1;border-radius:8px;width:100%;background:#F8FAFC;touch-action:none}
.thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.thumb{width:58px;height:58px;border-radius:7px;background-size:cover;background-position:center;border:1px solid #E2E8F0;position:relative}
.thumb span{position:absolute;top:-7px;right:-7px;width:20px;height:20px;background:#EF4444;color:#fff;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.photo-add{display:inline-block;padding:8px 14px;background:#EFF6FF;color:#0284C7;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}
.crow2{display:flex;gap:6px;align-items:center;margin-bottom:5px;font-size:13px}
.crow2 .del{color:#EF4444;cursor:pointer;font-weight:700}
.cadd{display:flex;gap:6px;margin-top:5px}.cadd input{flex:1}
.total{text-align:right;font-weight:700;margin-top:6px}
.pm{display:flex;gap:6px;flex-wrap:wrap}
.pm button{flex:1;min-width:70px;padding:9px;border:1px solid #E2E8F0;border-radius:8px;background:#fff;font-size:13px;cursor:pointer}
.pm button.on{background:#0F2744;color:#fff;border-color:#0F2744}
.act{display:flex;gap:8px;margin-top:16px}
.act button{flex:1;padding:12px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.act .cancel{background:#F1F5F9;color:#475569}.act .ok{background:#10B981;color:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL='https://nkyanyjgfrmovjoqevro.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5reWFueWpnZnJtb3Zqb3FldnJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2ODIxMTMsImV4cCI6MjA5NzI1ODExM30.LPnQyceYS7Z1-rlqUtXm3B8dGBOqnmnavTV-PAOSPZ8';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const $=s=>document.querySelector(s);
const today=()=>new Date().toLocaleDateString('zh-TW');
let worker=JSON.parse(localStorage.getItem('wl_tech')||'null');
let tab='avail', cases={avail:[],mine:[],done:[],installs:[],doneInstalls:[]}, custMap={}, rep=null;
const PRODUCT_NAMES={L376:'L376 智能電子鎖',L396:'L396 進階電子鎖',L600:'L600 人臉辨識旗艦',L901:'L901 掌靜脈頂規',L900:'L900 旗艦款'};
const INSTALL_STATUS={pending:'待到場',arrived:'已到場',installed:'施工完成(待驗收)',done:'已完成',failed:'無法安裝'};

function pctW(install,months){if(!install||!months)return null;const s=new Date(install);if(isNaN(s))return null;const e=new Date(s);e.setMonth(e.getMonth()+months);const n=new Date();if(n>e)return 0;return Math.max(0,Math.min(100,Math.round((1-(n-s)/(e-s))*100)));}
function warrantyBadge(r){ if(r.warranty_in===true)return '<span class="badge b-in">保固內</span>'; if(r.warranty_in===false)return '<span class="badge b-out">保固外</span>'; return ''; }
async function pushCustomer(wfId,text,sender={name:'維夫拉克客服'}){ const c=custMap[wfId]; if(c&&c.line_uid&&String(c.line_uid).startsWith('U')){ sb.functions.invoke('line-push',{body:{to:c.line_uid,text,sender}}).catch(e=>console.error(e)); } }
async function pushByPhone(phone,text,sender={name:'維夫拉克客服'}){ if(!phone)return; const {data}=await sb.from('customers').select('line_uid').eq('phone',phone).maybeSingle(); if(data?.line_uid&&String(data.line_uid).startsWith('U')){ sb.functions.invoke('line-push',{body:{to:data.line_uid,text,sender}}).catch(e=>console.error(e)); } }

// ───── 登入 ─────
function renderLogin(){
  $('#root').innerHTML=`<div class="login">
    <h1>🔧 WAFERLOCK 師傅端</h1><p>請輸入您的帳號與密碼</p>
    <label>帳號</label><input id="acc" placeholder="例：ren"/>
    <label>密碼</label><input id="pin" type="password" placeholder="••••"/>
    <button class="btn go" style="margin-top:18px" onclick="doLogin()">登入</button>
    <div id="lerr" style="color:#EF4444;font-size:13px;margin-top:10px"></div>
  </div>`;
}
async function doLogin(){
  const acc=$('#acc').value.trim(), pin=$('#pin').value.trim();
  const {data}=await sb.from('workers').select('*').eq('account',acc).eq('pin',pin).eq('active',true).maybeSingle();
  if(!data){ $('#lerr').textContent='帳號或密碼錯誤'; return; }
  worker={id:data.id,name:data.name}; localStorage.setItem('wl_tech',JSON.stringify(worker));
  renderApp(); loadCases();
}
function logout(){ localStorage.removeItem('wl_tech'); worker=null; renderLogin(); }

// ───── 主畫面 ─────
function renderApp(){
  $('#root').innerHTML=`
    <div class="top"><b>🔧 師傅端</b><span class="sp">${worker.name}</span><button class="lo" onclick="logout()">登出</button></div>
    <div class="tabs">
      <div class="tab ${tab==='avail'?'on':''}" onclick="setTab('avail')">可接案<span class="n" id="n-avail" style="display:none"></span></div>
      <div class="tab ${tab==='mine'?'on':''}" onclick="setTab('mine')">進行中<span class="n" id="n-mine" style="display:none"></span></div>
      <div class="tab ${tab==='done'?'on':''}" onclick="setTab('done')">已完成</div>
    </div>
    <div class="wrap" id="list"></div>`;
  renderList();
}
function setTab(t){ tab=t; renderApp(); }

async function loadCases(){
  if(!worker) return;
  const [a,m,d,mi,di]=await Promise.all([
    sb.from('repairs').select('*').eq('status','pending').is('worker_id',null).order('date',{ascending:false}),
    sb.from('repairs').select('*').eq('worker_id',worker.id).eq('status','dispatched').order('date',{ascending:false}),
    sb.from('repairs').select('*').eq('worker_id',worker.id).eq('status','done').order('completed_date',{ascending:false}).limit(20),
    sb.from('installs').select('*').eq('worker_id',worker.id).in('status',['pending','arrived','installed']).order('created_ts',{ascending:false}),
    sb.from('installs').select('*').eq('worker_id',worker.id).eq('status','done').order('completed_date',{ascending:false}).limit(10),
  ]);
  cases={avail:a.data||[],mine:m.data||[],done:d.data||[],installs:mi.data||[],doneInstalls:di.data||[]};
  const wfIds=[...new Set([...cases.avail,...cases.mine,...cases.done].map(r=>r.wf_id).filter(Boolean))];
  if(wfIds.length){ const {data}=await sb.from('customers').select('wf_id,name,phone,address,line_uid,product_id,install_date,warranty_months,warranty_end').in('wf_id',wfIds); (data||[]).forEach(c=>custMap[c.wf_id]=c); }
  renderApp();
}

function caseCard(r,kind){
  const c=custMap[r.wf_id]||{};
  const urg=r.urgency==='urgent';
  return `<div class="card ${urg?'urgent':''}">
    <div class="cno">${r.id}</div>
    <div class="cname">${r.name||c.name||'—'} ${urg?'<span class="badge b-urg">緊急</span>':''}${warrantyBadge(r)}</div>
    <div class="crow">🔧 ${r.type||''} － ${r.issue||''}</div>
    ${kind!=='avail'?`<div class="crow">📞 ${r.phone||c.phone||'—'}</div><div class="crow">🏠 ${r.building||c.address||'地址待補'}</div>`:`<div class="crow">📍 ${r.district||''}${r.area||''}</div>`}
    ${r.desc?`<div class="crow">📝 ${r.desc}</div>`:''}
    ${kind==='avail'?`<button class="btn go" onclick="accept('${r.id}')">接案</button>`:''}
    ${kind==='mine'?`<button class="btn done" onclick="openReport('${r.id}')">現場回報 / 結案</button>`:''}
    ${kind==='done'?`<div class="crow" style="color:#10B981;font-weight:700;margin-top:6px">✅ ${r.completed_date||''}　${r.charge_total>0?'$'+r.charge_total+(r.paid?'（已收）':'（未收）'):'免費'}　${r.receipt_no||''}</div>`:''}
  </div>`;
}
function renderList(){
  const map={avail:'可接案',mine:'進行中',done:'已完成'};
  $('#n-avail')&&toggleBadge('n-avail',cases.avail.length);
  $('#n-mine')&&toggleBadge('n-mine',cases.mine.length+cases.installs.length);
  let html='';
  if(tab==='mine'){
    const all=[...cases.mine.map(r=>({...r,_k:'r'})),...cases.installs.map(o=>({...o,_k:'i'}))];
    html=all.length?all.map(x=>x._k==='i'?installCard(x,'mine'):caseCard(x,'mine')).join(''):`<div class="empty">目前沒有進行中案件</div>`;
  } else if(tab==='done'){
    const rc=cases.done.map(r=>caseCard(r,'done')).join('');
    const ic=cases.doneInstalls.map(o=>installCard(o,'done')).join('');
    html=(rc+ic)||`<div class="empty">目前沒有已完成案件</div>`;
  } else {
    const arr=cases[tab]||[];
    html=arr.length?arr.map(r=>caseCard(r,tab)).join(''):`<div class="empty">目前沒有${map[tab]}案件</div>`;
  }
  $('#list').innerHTML=html;
}
function toggleBadge(id,n){ const el=$('#'+id); if(!el)return; if(n>0){el.style.display='inline-block';el.textContent=n;}else el.style.display='none'; }

function installCard(o,kind){
  const prod=PRODUCT_NAMES[o.product_id]||o.product_id||'門鎖';
  const sLabel=INSTALL_STATUS[o.status]||o.status;
  const sched=o.sched_date?`📅 ${o.sched_date} ${String(o.sched_start||9).padStart(2,'0')}:00-${String((o.sched_start||9)+2).padStart(2,'0')}:00`:'';
  const hasDocs=o.photos&&o.photos.length>0&&o.signature;
  return `<div class="card" style="border-left-color:#7C3AED">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
      <span class="cno">${o.id}</span>
      <span style="background:#EDE9FE;color:#5B21B6;font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700">安裝</span>
    </div>
    <div class="cname">${o.name||'—'}</div>
    <div class="crow">📞 ${o.phone||'—'}</div>
    <div class="crow">🏠 ${o.address||'地址待補'}</div>
    <div class="crow">📦 ${prod}${o.serial_no?` (${o.serial_no})`:''}</div>
    ${sched?`<div class="crow" style="color:#7C3AED;font-weight:600">${sched}</div>`:''}
    <div class="crow" style="font-weight:700;color:#5B21B6">狀態：${sLabel}</div>
    ${kind==='mine'&&o.status==='pending'?`<button class="btn go" style="background:#7C3AED;color:#fff;margin-top:10px" onclick="arriveInstall('${o.id}')">📍 標記到場（推播通知）</button>`:''}
    ${kind==='mine'&&o.status==='arrived'?`<button class="btn done" style="margin-top:10px" onclick="installedInstall('${o.id}')">🔧 標記施工完成</button>`:''}
    ${kind==='mine'&&o.status==='installed'&&!hasDocs?`<button class="btn done" style="background:#7C3AED;margin-top:10px" onclick="openInstallReport('${o.id}')">📸 上傳照片 + 客戶簽名</button>`:''}
    ${kind==='mine'&&o.status==='installed'&&hasDocs?`<div style="margin-top:8px;font-size:12px;color:#10B981;font-weight:700">✅ 已上傳照片與簽名，等待 CRM 完工驗收</div>`:''}
    ${kind==='done'?`<div class="crow" style="color:#10B981;font-weight:700;margin-top:6px">✅ 安裝完成 ${o.completed_date||''}</div>`:''}
  </div>`;
}

// ───── 接案 ─────
async function accept(id){
  await sb.from('repairs').update({worker_id:worker.id,status:'dispatched',scheduled_date:today()+' 師傅接案',arrival_pushed:false}).eq('id',id);
  const r=cases.avail.find(x=>x.id===id);
  if(r) pushCustomer(r.wf_id, `🧰 ${worker.name} 已接下您的案件（${r.id}），將盡快與您聯繫並前往處理。`);
  tab='mine'; await loadCases();
}

// ───── 安裝動作 ─────
async function arriveInstall(id){
  const o=cases.installs.find(x=>x.id===id); if(!o)return;
  await sb.from('installs').update({status:'arrived'}).eq('id',id);
  pushByPhone(o.phone,`🚪 安裝通知\n\n您預約的安裝師傅（${worker.name}）已抵達現場，即將開始安裝 🔧`);
  await loadCases();
}
async function installedInstall(id){
  await sb.from('installs').update({status:'installed'}).eq('id',id);
  await loadCases();
}

// ───── 現場回報 ─────
let photos=[], sig=null, charges=[], pay='cash', paid=false, wj='out', excl='';
function openReport(id){
  rep=cases.mine.find(x=>x.id===id); if(!rep)return;
  photos=[]; sig=null; charges=[]; pay=(rep.warranty_in?'free':'cash'); paid=false; wj=(rep.warranty_in?'in':'out'); excl='';
  const c=custMap[rep.wf_id]||{};
  const d=document.createElement('div'); d.className='mo'; d.id='repmo';
  d.onclick=e=>{if(e.target===d)closeReport();};
  d.innerHTML=`<div class="sheet">
    <h3>📋 現場回報 — ${rep.id}</h3>
    <div style="background:#F8FAFC;border-radius:8px;padding:10px;font-size:13px">
      <b>${rep.name||c.name}</b> ${warrantyBadge(rep)}<br>📞 ${rep.phone||c.phone}<br>🏠 ${rep.building||c.address}<br>🔧 ${rep.type} － ${rep.issue}
    </div>
    <div class="sec">現場照片</div>
    <label class="photo-add">📷 拍照 / 選擇<input id="ph" type="file" accept="image/*" capture="environment" multiple style="display:none"></label>
    <div class="thumbs" id="thumbs"></div>
    <div class="sec">處理說明</div>
    <textarea id="wnote" rows="2" placeholder="維修內容摘要"></textarea>
    <div class="sec">保固判定</div>
    <select id="wj" onchange="onWj()" style="width:100%;border:1px solid #E2E8F0;border-radius:8px;padding:10px;font-size:14px">
      <option value="in">保固內 — 免費</option>
      <option value="out">保固外 — 需收費</option>
      <option value="in_excluded">保內但不保固 — 需收費（如電池漏液）</option>
    </select>
    <input id="excl" placeholder="不保固原因（如：鹼性電池漏液腐蝕主板）" style="display:none;margin-top:6px;width:100%;border:1px solid #EF4444;border-radius:8px;padding:9px 11px;font-size:13px">
    <div class="sec">收費品項（數量×單價，可勾贈品）</div>
    <div id="charges"></div>
    <div class="cadd"><input id="ci" placeholder="品項"><input id="cq" type="number" value="1" style="max-width:52px" title="數量"><input id="cp" type="number" placeholder="單價" style="max-width:74px"><label style="display:flex;align-items:center;gap:3px;font-size:12px;white-space:nowrap"><input type="checkbox" id="cg">贈</label><button class="btn go" style="width:auto;margin:0;padding:9px 12px" onclick="addCharge()">加</button></div>
    <div class="total" id="total"></div>
    <div class="sec">收款方式</div>
    <div class="pm" id="pm">
      <button data-v="cash" onclick="setPay('cash')">現金</button>
      <button data-v="transfer" onclick="setPay('transfer')">轉帳</button>
      <button data-v="card" onclick="setPay('card')">刷卡</button>
      <button data-v="free" onclick="setPay('free')">免費</button>
    </div>
    <label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="paid" style="width:18px"> 已收款</label>
    <div class="sec">客戶簽名驗收</div>
    <canvas id="sig" class="sig" width="500" height="150"></canvas>
    <div style="text-align:right"><button class="btn gray" style="width:auto;margin-top:4px;padding:5px 12px" onclick="clearSig()">清除簽名</button></div>
    <div class="act"><button class="cancel" onclick="closeReport()">取消</button><button class="ok" onclick="submitReport()">送出 + 結案</button></div>
    <div id="rerr" style="color:#EF4444;font-size:13px;margin-top:8px"></div>
  </div>`;
  document.body.appendChild(d);
  $('#ph').addEventListener('change',onPhotos);
  initSig($('#sig'));
  $('#wj').value=wj; onWj(); renderCharges();
}
function onWj(){
  wj=$('#wj').value;
  $('#excl').style.display = wj==='in_excluded' ? 'block' : 'none';
  if(wj==='in') setPay('free'); else if(pay==='free') setPay('cash');
}
function closeReport(){ const m=$('#repmo'); if(m)m.remove(); rep=null; }
function onPhotos(e){
  const files=[...e.target.files];
  Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);}))).then(imgs=>{photos.push(...imgs);renderThumbs();});
  e.target.value='';
}
function renderThumbs(){ $('#thumbs').innerHTML=photos.map((s,i)=>`<div class="thumb" style="background-image:url(${s})"><span onclick="rmPhoto(${i})">×</span></div>`).join(''); }
function rmPhoto(i){ photos.splice(i,1); renderThumbs(); }
function addCharge(){ const it=$('#ci').value.trim(); if(!it)return; const qty=Number($('#cq').value)||1, gift=$('#cg').checked, price=gift?0:(Number($('#cp').value)||0); charges.push({item:it,qty,price,gift,amount:gift?0:qty*price}); $('#ci').value='';$('#cq').value='1';$('#cp').value='';$('#cg').checked=false; renderCharges(); }
function rmCharge(i){ charges.splice(i,1); renderCharges(); }
function renderCharges(){ $('#charges').innerHTML=charges.map((c,i)=>`<div class="crow2"><span style="flex:1">${c.item} ${c.gift?'<b style=\"color:#10B981\">[贈]</b>':`×${c.qty} @$${c.price}`}</span><span>$${c.amount}</span><span class="del" onclick="rmCharge(${i})">×</span></div>`).join(''); const t=charges.reduce((s,c)=>s+(c.amount||0),0); $('#total').textContent=t?('合計 $'+t):''; }
function setPay(v){ pay=v; document.querySelectorAll('#pm button').forEach(b=>b.classList.toggle('on',b.dataset.v===v)); }
function clearSig(){ const c=$('#sig'); c.getContext('2d').clearRect(0,0,c.width,c.height); sig=null; }
function initSig(cv,onEnd){
  let dr=false; const ctx=cv.getContext('2d');
  const pos=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)};};
  const st=e=>{dr=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);e.preventDefault();};
  const mv=e=>{if(!dr)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#0F2744';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();e.preventDefault();};
  const en=()=>{if(dr){dr=false;const s=cv.toDataURL();if(onEnd)onEnd(s);else sig=s;}};
  cv.addEventListener('mousedown',st);cv.addEventListener('mousemove',mv);window.addEventListener('mouseup',en);
  cv.addEventListener('touchstart',st);cv.addEventListener('touchmove',mv);cv.addEventListener('touchend',en);
}
async function submitReport(){
  const total=charges.reduce((s,c)=>s+(c.amount||0),0);
  const exclVal=$('#excl').value.trim();
  if(photos.length===0){ $('#rerr').textContent='請至少拍一張現場照片'; return; }
  if(!sig){ $('#rerr').textContent='請讓客戶簽名'; return; }
  if(wj==='in_excluded' && !exclVal){ $('#rerr').textContent='「保內但不保固」需填寫原因'; return; }
  if(wj!=='in' && total<=0){ $('#rerr').textContent='需收費案件請填寫收費品項'; return; }
  $('.act .ok')&&($('.act .ok').disabled=true);
  let receipt=null;
  try{ const {data}=await sb.rpc('next_case_no',{p_prefix:'SR'}); receipt=data; }catch(e){ receipt='SR'+Date.now(); }
  await sb.from('repairs').update({
    status:'done', photos, signature:sig, charges, charge_total:total,
    payment_method:pay, paid:pay==='free'?true:$('#paid').checked,
    warranty_judgment:wj, exclude_reason:exclVal,
    work_note:$('#wnote').value.trim(), receipt_no:receipt, completed_date:today()
  }).eq('id',rep.id);
  const chargeLine = total>0 ? `\n費用：$${total}（${ {cash:'現金',transfer:'轉帳',card:'刷卡'}[pay]||'—' }）` : '\n本次免費（保固內）';
  pushCustomer(rep.wf_id, `✅ 維修完成結案\n\n案件：${rep.id}\n問題：${rep.type} － ${rep.issue}${chargeLine}\n師傅：${worker.name}\n簽收單號：${receipt}\n\n感謝您的使用 🙏 ⭐ 歡迎評分`);
  closeReport(); tab='done'; await loadCases();
}

// ───── 安裝回報 modal ─────
let instRep=null, instPhotos=[], instSig=null;
function openInstallReport(id){
  instRep=cases.installs.find(x=>x.id===id); if(!instRep)return;
  instPhotos=[]; instSig=null;
  const prod=PRODUCT_NAMES[instRep.product_id]||instRep.product_id||'門鎖';
  const d=document.createElement('div'); d.className='mo'; d.id='instrmo';
  d.onclick=e=>{if(e.target===d)closeInstallReport();};
  d.innerHTML=`<div class="sheet">
    <h3>📸 安裝回報 — ${instRep.id}</h3>
    <div style="background:#F8FAFC;border-radius:8px;padding:10px;font-size:13px;margin-bottom:6px">
      <b>${instRep.name}</b><br>📞 ${instRep.phone}<br>🏠 ${instRep.address||'—'}<br>📦 ${prod}${instRep.serial_no?` (${instRep.serial_no})`:''}
    </div>
    <div class="sec">現場安裝照片（至少 1 張）</div>
    <label class="photo-add">📷 拍照 / 選擇<input id="iph" type="file" accept="image/*" capture="environment" multiple style="display:none"></label>
    <div class="thumbs" id="ithumbs"></div>
    <div class="sec">師傅施工說明</div>
    <textarea id="iwnote" rows="2" placeholder="安裝過程說明、教學內容、注意事項…"></textarea>
    <div class="sec">客戶簽名確認安裝完成</div>
    <canvas id="isig" class="sig" width="500" height="150"></canvas>
    <div style="text-align:right"><button class="btn gray" style="width:auto;margin-top:4px;padding:5px 12px" onclick="clearInstSig()">清除簽名</button></div>
    <div class="act"><button class="cancel" onclick="closeInstallReport()">取消</button><button class="ok" onclick="submitInstallReport()">送出回報</button></div>
    <div id="ierr" style="color:#EF4444;font-size:13px;margin-top:8px"></div>
  </div>`;
  document.body.appendChild(d);
  $('#iph').addEventListener('change',e=>{
    const files=[...e.target.files];
    Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(f);}))).then(imgs=>{instPhotos.push(...imgs);renderInstThumbs();});
    e.target.value='';
  });
  initSig($('#isig'),s=>instSig=s);
}
function closeInstallReport(){ const m=$('#instrmo'); if(m)m.remove(); instRep=null; }
function renderInstThumbs(){ $('#ithumbs').innerHTML=instPhotos.map((s,i)=>`<div class="thumb" style="background-image:url(${s})"><span onclick="rmInstPhoto(${i})">×</span></div>`).join(''); }
function rmInstPhoto(i){ instPhotos.splice(i,1); renderInstThumbs(); }
function clearInstSig(){ const c=$('#isig'); c.getContext('2d').clearRect(0,0,c.width,c.height); instSig=null; }
async function submitInstallReport(){
  if(instPhotos.length===0){ $('#ierr').textContent='請至少上傳一張安裝照片'; return; }
  if(!instSig){ $('#ierr').textContent='請讓客戶簽名確認'; return; }
  const btn=$('#instrmo .ok'); if(btn) btn.disabled=true;
  await sb.from('installs').update({
    photos:instPhotos, signature:instSig,
    work_note:$('#iwnote').value.trim(),
  }).eq('id',instRep.id);
  const prod=PRODUCT_NAMES[instRep.product_id]||instRep.product_id||'門鎖';
  pushByPhone(instRep.phone,`🔧 安裝師傅已完成施工並請您簽名確認。\n師傅：${worker.name}\n安裝項目：${prod}\n\n後續保固登錄將由客服確認，感謝 🙏`);
  closeInstallReport();
  await loadCases();
}

// 啟動 + 每 20 秒刷新
if(worker){ renderApp(); loadCases(); } else { renderLogin(); }
setInterval(()=>{ if(worker && !$('#repmo')) loadCases(); }, 20000);
</script>
